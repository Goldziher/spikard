[package]
name = "spikard-alef-ext"
version = "0.15.6-rc.24"
edition = "2024"
authors = ["Na'aman Hirschfeld <nhirschfeld@gmail.com>"]
license = "MIT"
repository = "https://github.com/Goldziher/spikard"
description = "Alef HTTP extension for the spikard polyglot framework"
publish = false

[dependencies]
alef = { git = "https://github.com/kreuzberg-dev/alef", rev = "17e0d038c6671862603ca561d821b792f70f7b71" }
anyhow = "1"
heck = "0.5"
minijinja = "2"
serde = { version = "1.0", features = ["derive"] }
toml = "1.1"
tracing = "0.1"

[lints]
workspace = true
