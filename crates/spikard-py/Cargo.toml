[package]
name = "spikard-py"
version = "0.13.0"
edition = "2024"

[lib]
name = "_spikard"
crate-type = ["cdylib"]

[dependencies]
spikard = { path = "../../crates/spikard" }
pyo3 = { version = "0.23", features = ["extension-module"] }
pyo3-async-runtimes = { version = "0.23", features = ["tokio-runtime"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
