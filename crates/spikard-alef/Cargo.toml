[package]
name = "spikard-alef"
version = "0.15.6-rc.24"
edition = "2024"
authors = ["Na'aman Hirschfeld <nhirschfeld@gmail.com>"]
license = "MIT"
repository = "https://github.com/Goldziher/spikard"
description = "Alef CLI for spikard — registers the HTTP extension and delegates to alef"
publish = false

[[bin]]
name = "spikard-alef"
path = "src/main.rs"

[dependencies]
alef = { git = "https://github.com/kreuzberg-dev/alef", rev = "17e0d038c6671862603ca561d821b792f70f7b71" }
spikard-alef-ext = { path = "../spikard-alef-ext" }

[lints]
workspace = true
