[package]
name = "spikard-php"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[package.metadata.cargo-machete]
ignored = ["anyhow", "axum-test", "hyper"]

[lib]
name = "spikard_php"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib"]

[features]
default = []
extension-module = [
    "dep:ext-php-rs",
    "dep:spikard-http",
    "dep:axum",
    "dep:axum-test",
    "dep:urlencoding",
    "dep:bytes",
    "dep:spikard-bindings-shared",
    "dep:tonic",
]

[dependencies]
anyhow = "1.0"
async-stream = "0.3"
axum = { workspace = true, optional = true }
axum-test = { version = "20", optional = true }
bytes = { version = "1", optional = true }
ext-php-rs = { version = "0.15", features = [
    "runtime",
], default-features = false, optional = true }
futures = "0.3"
http = { workspace = true }
http-body-util = "0.1"
hyper = "1"
once_cell = "1.21"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
spikard = { workspace = true }
spikard-bindings-shared = { path = "../spikard-bindings-shared", optional = true }
spikard-core = { workspace = true }
spikard-http = { path = "../spikard-http", optional = true, features = ["di"] }
tokio = { workspace = true, features = [
    "rt",
    "rt-multi-thread",
    "macros",
    "sync",
] }
tonic = { version = "0.14", optional = true }
tower = { workspace = true }
tracing = "0.1"
url = "2"
urlencoding = { version = "2.1", optional = true }

[lints]
workspace = true
