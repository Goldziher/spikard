[package]
name = "spikard-php"
version = "0.14.0"
edition = "2024"
license = "MIT"
description = "Rust-centric multi-language HTTP framework with polyglot bindings"
readme = false
keywords = ["http", "web", "framework", "polyglot", "rust"]
categories = ["text-processing"]

# `serde_json` and `tokio` are emitted unconditionally above so the manifest
# is stable across regens, but for umbrella crates with no async fns and no
# JSON-marshalled return types they are genuinely unused. List them here so
# `cargo machete` doesn't flag the no-async-no-json case as a real finding.
[package.metadata.cargo-machete]
ignored = ["serde_json", "tokio"]

[lib]
crate-type = ["cdylib"]

[features]
extension-module = []

[dependencies]
ext-php-rs = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
spikard = { path = "../spikard", features = ["di"] }
spikard-core = { path = "../spikard-core" }
spikard-graphql = { path = "../spikard-graphql" }
spikard-http = { path = "../spikard-http" }
tokio = { version = "1", features = ["full"] }
