[package]
name = "spikard-php"
version = "0.15.6-rc.4"
edition = "2024"
license = "MIT"
description = "Rust-centric multi-language HTTP framework with polyglot bindings"
readme = false
keywords = ["http", "web", "framework", "polyglot", "rust"]
categories = ["text-processing"]

# `ahash` is conditionally referenced: only when the umbrella crate exposes
# `AHashMap<Cow<str>, _>` parameters (the conditional `__*_ahash` shim rebuilds).
# `futures-util` is similarly conditional on streaming adapters being declared.
[package.metadata.cargo-machete]
ignored = ["tokio", "ahash"]

[lib]
crate-type = ["cdylib"]

[features]
extension-module = []

[dependencies]
ext-php-rs = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
spikard = { version = "0.15.6-rc.4", path = "../spikard", features = ["di"] }
spikard-core = { path = "../spikard-core", version = "0.15.6-rc.4" }
spikard-graphql = { path = "../spikard-graphql", version = "0.15.6-rc.4" }
spikard-http = { path = "../spikard-http", version = "0.15.6-rc.4" }
tokio = { version = "1", features = ["full"] }
