[package]
name = "spikard-php"
version = "0.15.6-rc.4"
edition = "2024"
license = "MIT"
description = "Rust-centric multi-language HTTP framework with polyglot bindings"
readme = false
keywords = ["http", "web", "framework", "polyglot", "rust"]
categories = ["text-processing"]

[lib]
crate-type = ["cdylib"]

[dependencies]
spikard = { version = "0.15.6-rc.4", path = "../spikard", features = ["di"] }
ext-php-rs = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
spikard-core = { path = "../spikard-core", version = "0.15.6-rc.4" }
spikard-graphql = { path = "../spikard-graphql", version = "0.15.6-rc.4" }
spikard-http = { path = "../spikard-http", version = "0.15.6-rc.4" }

# `ahash` and `futures-util` are conditionally included but not directly used in PHP code.
[package.metadata.cargo-machete]
ignored = ["tokio", "ahash"]

[features]
extension-module = []
