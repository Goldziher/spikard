[package]
name = "spikard-ffi"
version = "0.14.0"
edition = "2021"
license = "MIT"
description = "Rust-centric multi-language HTTP framework with polyglot bindings"
readme = false
keywords = ["http", "web", "framework", "polyglot", "rust"]
categories = ["text-processing"]
repository = "https://github.com/Goldziher/spikard"

[package.metadata.cargo-machete]
# tokio is pulled in for its runtime/macros at link time but the generated
# FFI source never `use`s it directly — cargo-machete would otherwise flag it.
ignored = ["tokio"]

[lib]
crate-type = ["cdylib", "staticlib"]

[features]
default = []

[dependencies]
serde_json = "1"
spikard = { path = "../spikard", features = ["di"] }
spikard-core = { path = "../spikard-core" }
spikard-graphql = { path = "../spikard-graphql" }
spikard-http = { path = "../spikard-http" }
tokio = { version = "1", features = ["full"] }

[build-dependencies]
cbindgen = "0.29"

[dev-dependencies]
tempfile = "3"
