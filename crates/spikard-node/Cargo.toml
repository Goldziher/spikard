[package]
name = "spikard-node"
version = "0.14.0"
edition = "2024"
license = "MIT"
description = "Rust-centric multi-language HTTP framework with polyglot bindings"
readme = false
keywords = ["http", "web", "framework", "polyglot", "rust"]
categories = ["text-processing"]

[package.metadata.cargo-machete]
ignored = ["anyhow", "futures", "napi-build", "serde_json", "tokio"]

[lib]
crate-type = ["cdylib"]

[dependencies]
anyhow = "1.0"
futures = "0.3"
napi = { version = "3", features = ["async"] }
napi-derive = "3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
spikard = { path = "../spikard", features = ["di"] }
spikard-core = { path = "../spikard-core" }
spikard-graphql = { path = "../spikard-graphql" }
spikard-http = { path = "../spikard-http" }
tokio = { features = ["full"], version = "1" }

[build-dependencies]
napi-build = "2"

[lints]
workspace = true
