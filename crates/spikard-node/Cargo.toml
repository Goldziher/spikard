[package]
name = "spikard-node"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "High-performance Node.js bindings for Spikard HTTP framework via napi-rs"
keywords = ["nodejs", "napi", "http", "framework", "typescript"]
categories = ["api-bindings", "web-programming::http-server"]
documentation = "https://docs.rs/spikard-node"
readme = "README.md"

[package.metadata.cargo-machete]
ignored = [
    "async-trait",
    "cookie",
    "http-body-util",
    "rustc-hash",
    "serde",
    "serde_qs",
    "simd-json",
    "spikard",
    "spikard-graphql",
    "url",
    "urlencoding",
]

[lib]
crate-type = ["cdylib"]

[features]
default = ["di"]
di = ["spikard/di", "spikard-http/di"]
graphql = ["spikard-graphql"]
grpc = []

[target.'cfg(all(any(windows, unix), target_arch = "x86_64", not(target_env = "musl")))'.dependencies]
mimalloc-rust = "0.2"

[dependencies]
async-stream = "0.3"
async-trait = "0.1"
axum = { workspace = true }
axum-test = "20"
bytes = "1.11"
cookie = "0.18"
futures-util = "0.3"
http = { workspace = true }
http-body-util = "0.1"
napi = { version = "3.8", default-features = false, features = [
    "napi8",
    "async",
    "serde-json",
] }
napi-derive = "3.5"
once_cell = "1.21"
rustc-hash = "2.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_qs = "1.1"
simd-json = "0.17"
spikard.workspace = true
spikard-bindings-shared = { path = "../spikard-bindings-shared" }
spikard-core = { path = "../spikard-core" }
spikard-graphql = { path = "../spikard-graphql", optional = true }
spikard-http = { path = "../spikard-http", features = ["di"] }
tokio = { workspace = true }
tonic = { version = "0.14", features = ["transport", "codegen", "gzip"] }
tower = "0.5"
tracing.workspace = true
url = "2.5"
urlencoding = "2.1"

[build-dependencies]
napi-build = "2.3"

[lints]
workspace = true
