[package]
name = "spikard-node"
version = "0.13.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
spikard = { path = "../../crates/spikard" }
napi = { version = "3", features = ["async"] }
napi-derive = "3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }

[build-dependencies]
napi-build = "2"
