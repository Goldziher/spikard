# Configuration for the lychee link checker.
# https://github.com/lycheeverse/lychee

# Root directory for resolving relative paths in the built site
root_dir = "site"

# Exclude common patterns that produce false positives
exclude = [
    # Localhost / loopback addresses
    "localhost",
    "127\\.0\\.0\\.1",
    "0\\.0\\.0\\.0",

    # Placeholder / example domains
    "example\\.com",
    "example\\.org",
    "api\\.example\\.com",

    # Template variables (e.g. ${var}, {{ var }})
    "\\$\\{",
    "\\{\\{",

    # GitHub edit links (require auth)
    "github\\.com/.*/edit/",

    # GitHub raw links for new/renamed files (404 until pushed)
    "github\\.com/.*/raw/",

    # Docs site self-references (404 until deployed)
    "spikard\\.dev",
    "docs\\.spikard\\.kreuzberg\\.dev",

    # Registry pages that are rate-limited or 404 until first publish
    "pypi\\.org/project/",
    "crates\\.io/crates/",
    "npmjs\\.com/package/",
    "rubygems\\.org/gems/",
    "packagist\\.org/packages/",
    "hex\\.pm/packages/",
    "nuget\\.org/packages/",
    "central\\.sonatype\\.com/artifact/",
    "search\\.maven\\.org/artifact/",
    "pub\\.dev/packages/",

    # Discord invite links (require auth)
    "discord\\.gg/",

    # Taskfile.dev installation page — Cloudflare frequently resets connections from GHA runners
    "taskfile\\.dev/installation",
]

# Accept these HTTP status codes as valid
accept = [200, 204, 301, 302, 429]

# Connection timeout in seconds
timeout = 30

# Max retries per link
max_retries = 3

# Max concurrent requests
max_concurrency = 10

# Do not check email addresses
include_mail = false

# Do not require HTTPS
require_https = false

# Cache results to speed up repeated runs
cache = true
