# rumdl — Rust-based markdown linter
# https://github.com/rvben/rumdl

respect-gitignore = true
exclude = ["node_modules", "target", "dist", "vendor", "e2e"]

# MD012: Multiple consecutive blank lines (minijinja templates emit extra blanks)
# MD013: Line length (feature lists and code blocks can be long)
# MD024: Allow duplicate heading names
# MD033: Inline HTML (badge shields use <div>/<img>/<a> tags)
# MD036: Emphasis as heading (intentional style in READMEs)
# MD041: First line H1 not required for all docs
# MD046: Code block style
# MD051: Link fragment checking
# MD076: Blank lines between list items
disable = [
  "MD012",
  "MD013",
  "MD024",
  "MD033",
  "MD036",
  "MD041",
  "MD046",
  "MD051",
  "MD076",
]

# MD024: Allow duplicate heading names if they are not siblings
[MD024]
siblings_only = true
