
[coverage]
minimum = 80
fail-under = 80.0

[output]
out = ["Stdout", "Html", "Lcov"]
html-dir = "target/tarpaulin"
lcov-file = "target/tarpaulin/lcov.info"

[run]
timeout = "300s"
verbose = false

exclude-files = [
  "**/tests/**",
  "**/*_test.rs",
  "**/benches/**",
  "**/*_bench.rs",
  "**/src/main.rs",
  "**/src/bin/**",

  "**/generated/**",

  "**/crates/spikard-cli/src/**",
  "**/crates/spikard-codegen/src/**",
  "**/crates/spikard-graphql/src/**",
  "**/crates/spikard-py/src/**",
  "**/crates/spikard-node/src/**",
  "**/crates/spikard-rb/src/**",
  "**/crates/spikard-php/src/**",
  "**/crates/spikard-elixir/src/**",

  "**/examples/**",
  "**/tools/**",

  "**/packages/**",
]

exclude-crates = ["spikard-php", "spikard-elixir"]
