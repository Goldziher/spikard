name: Publish pub.dev

# pub.dev OIDC trusted publishing rejects tokens originating from `release`
# events; only `push` and `workflow_dispatch` are accepted.
#
# The spikard Dart package ships prebuilt server natives staged under
# lib/src/native/<rid>/ (linux/macos/windows). Those are produced by the main
# publish.yaml workflow, so we cannot rebuild them here. Instead publish.yaml's
# trigger-pubdev job dispatches this workflow with the run_id of that run, and
# this workflow downloads the dart-package-assembled artifact from it.
#
# One-time setup: on pub.dev → spikard package → Admin → Automated publishing,
# set the workflow path to `.github/workflows/publish-pubdev.yaml`.

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID of publish.yaml that produced the dart-package-assembled artifact"
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish-pub:
    name: Publish pub.dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dart-package-assembled
          path: packages/dart
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: xberg-io/actions/publish-pub@v1
        with:
          package-dir: packages/dart
