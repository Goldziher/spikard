name: Publish pub.dev

# ~keep pub.dev OIDC trusted publishing rejects tokens originating from `release`
# ~keep events; only `push` and `workflow_dispatch` are accepted.

# ~keep The spikard Dart package ships prebuilt server natives staged under
# ~keep lib/src/native/<rid>/ (linux/macos/windows). Those are produced by the main
# ~keep publish.yaml workflow, so we cannot rebuild them here. Instead publish.yaml's
# ~keep trigger-pubdev job dispatches this workflow with the run_id of that run, and
# ~keep this workflow downloads the dart-package-assembled artifact from it.

# ~keep One-time setup: on pub.dev → spikard package → Admin → Automated publishing,
# ~keep set the workflow path to `.github/workflows/publish-pubdev.yaml`.

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID of publish.yaml that produced the dart-package-assembled artifact"
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish-pub:
    name: Publish pub.dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dart-package-assembled
          path: packages/dart
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: xberg-io/actions/publish-pub@v1
        with:
          package-dir: packages/dart
