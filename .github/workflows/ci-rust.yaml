name: CI Rust

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "tools/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/config.toml"
      - ".task/languages/rust.yml"
      - ".github/workflows/ci-rust.yaml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "tools/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/config.toml"
      - ".task/languages/rust.yml"
      - ".github/workflows/ci-rust.yaml"

concurrency:
  group: ci-rust-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  BUILD_PROFILE: ci
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Free disk space
        if: runner.os == 'Linux'
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1
        with:
          show-initial: "false"
          show-final: "true"

      - name: Setup Python
        uses: kreuzberg-dev/actions/setup-python-env@v1
        with:
          python-version: "3.14"

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: rust-${{ matrix.os }}
          use-sccache: "true"

      - name: Setup Node
        uses: kreuzberg-dev/actions/setup-node-workspace@v1
        with:
          node-version: "24"

      - name: Setup PHP
        uses: kreuzberg-dev/actions/setup-php@v1
        with:
          php-version: "8.4"
          tools: phpstan

      - name: Setup Elixir
        uses: kreuzberg-dev/actions/setup-elixir@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.308.0
        with:
          ruby-version: "3.4"
          bundler-cache: true
          working-directory: packages/ruby

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Run clippy
        run: task rust:lint:check

      - name: Run Rust tests
        run: task rust:test:ci

      - name: Check no-default-features
        run: cargo check -p spikard --no-default-features
