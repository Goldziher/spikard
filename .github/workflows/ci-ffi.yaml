name: CI FFI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/spikard-ffi/**'
      - 'crates/spikard/**/*.rs'
      - 'crates/spikard-core/**/*.rs'
      - 'crates/spikard-http/**/*.rs'
      - 'crates/spikard-graphql/**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/config.toml'
      - '.github/workflows/ci-ffi.yaml'
      - '.github/actions/setup-rust/**'
  pull_request:
    branches: [main]
    paths:
      - 'crates/spikard-ffi/**'
      - 'crates/spikard/**/*.rs'
      - 'crates/spikard-core/**/*.rs'
      - 'crates/spikard-http/**/*.rs'
      - 'crates/spikard-graphql/**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/config.toml'
      - '.github/workflows/ci-ffi.yaml'
      - '.github/actions/setup-rust/**'

concurrency:
  group: ci-spikard-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUST_BACKTRACE: short
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0

defaults:
  run:
    shell: bash

jobs:
  build-ffi:
    name: Build FFI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: ffi-${{ matrix.target }}

      - name: Add cross-compile target
        shell: bash
        run: rustup target add ${{ matrix.target }}

      - name: Build FFI library
        run: cargo build -p spikard-ffi --release --target ${{ matrix.target }}

      - name: Verify header is up to date
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cargo build -p spikard-ffi --release
          git diff --exit-code crates/spikard-ffi/include/spikard.h

      - name: Upload FFI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ffi-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/libspikard_ffi.*
            target/${{ matrix.target }}/release/spikard_ffi.*
            crates/spikard-ffi/include/spikard.h
          retention-days: 7
          if-no-files-found: warn
