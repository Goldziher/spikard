name: CI Wasm

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/spikard-wasm/**'
      - 'crates/spikard-core/**'
      - 'crates/spikard/**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/config.toml'
      - '.github/workflows/ci-wasm.yaml'
      - '.github/actions/setup-rust/**'
  pull_request:
    branches: [main]
    paths:
      - 'crates/spikard-wasm/**'
      - 'crates/spikard-core/**'
      - 'crates/spikard/**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/config.toml'
      - '.github/workflows/ci-wasm.yaml'
      - '.github/actions/setup-rust/**'

concurrency:
  group: ci-spikard-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUST_BACKTRACE: short
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0

defaults:
  run:
    shell: bash

jobs:
  check-wasm:
    name: Check Wasm (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: wasm-check-${{ matrix.os }}

      - name: Add wasm32 target
        shell: bash
        run: rustup target add wasm32-unknown-unknown

      - name: Check (host target)
        run: cargo check -p spikard-wasm

      - name: Check (wasm32-unknown-unknown, default features)
        run: cargo check -p spikard-wasm --target wasm32-unknown-unknown

      - name: Check (wasm32-unknown-unknown, no default features)
        run: cargo check -p spikard-wasm --no-default-features --target wasm32-unknown-unknown

      - name: Clippy
        run: cargo clippy -p spikard-wasm -- -D warnings

      - name: Test (host)
        run: cargo test -p spikard-wasm

  build-wasm:
    name: Build Wasm
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: wasm-build

      - name: Add wasm32 target
        shell: bash
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        shell: bash
        run: cargo install wasm-pack --locked

      - name: Build release (cargo)
        run: cargo build -p spikard-wasm --target wasm32-unknown-unknown --release

      - name: Build wasm-pack bundle (nodejs target)
        working-directory: crates/spikard-wasm
        run: wasm-pack build --target nodejs --release

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v7
        with:
          name: spikard-wasm-pkg
          path: crates/spikard-wasm/pkg/
          retention-days: 7
          if-no-files-found: error
