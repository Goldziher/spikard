name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "templates/**"
      - "crates/**"
      - "packages/**"
      - "alef.toml"
      - "Taskfile.yaml"
      - ".task/**"
      - ".github/workflows/docs.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-prose:
    name: Lint prose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup textlint
        uses: kreuzberg-dev/actions/setup-textlint@v1

      - name: Run textlint
        run: scripts/ci/docs/textlint.sh

  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: kreuzberg-dev/actions/setup-python-env@v1
        with:
          python-version: "3.14"
          install-command: "uv sync --all-extras --all-packages --group dev --group docs --no-install-project --no-install-workspace"

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: docs

      - name: Install Alef
        uses: kreuzberg-dev/actions/install-alef@v1

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Build documentation
        run: task docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy docs
    if: github.ref == 'refs/heads/main'
    needs: [build, lint-prose]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
