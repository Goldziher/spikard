name: Kotlin

on:
  workflow_dispatch:
  # Kotlin bindings are alef-experimental — JNI bridge may produce
  # broken codegen for some types. Re-enable on push/PR once
  # alef-backend-kotlin stabilizes.

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/kotlin
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run Gradle build
        run: gradle build
      - name: Run Gradle tests
        run: gradle test
