name: Publish Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g., v0.14.0)"
        required: false
        type: string
      ref:
        description: "Git ref (branch, tag, or commit) to build; defaults to the tag"
        required: false
        type: string
      targets:
        description: "Comma-separated release targets, or all"
        required: false
        type: string
        default: "all"
      dry_run:
        description: "Prepare artifacts without publishing"
        required: false
        type: boolean
        default: false
      republish:
        description: "Delete and re-create the tag on current HEAD before publishing"
        required: false
        type: boolean
        default: false
      force_republish:
        description: "Force republish targets whose registry version already exists"
        required: false
        type: boolean
        default: false
  release:
    types: [published]
  repository_dispatch:
    types: [publish-release]

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.ref || github.event.inputs.tag)) || github.ref || github.run_id }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    name: Prepare metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
      is_tag: ${{ steps.meta.outputs.is_tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      force_republish: ${{ steps.meta.outputs.force_republish }}
      release_python: ${{ steps.meta.outputs.release_python }}
      release_node: ${{ steps.meta.outputs.release_node }}
      release_ruby: ${{ steps.meta.outputs.release_ruby }}
      release_php: ${{ steps.meta.outputs.release_php }}
      release_cli: ${{ steps.meta.outputs.release_cli }}
      release_crates: ${{ steps.meta.outputs.release_crates }}
      release_homebrew: ${{ steps.meta.outputs.release_homebrew }}
      release_go: ${{ steps.meta.outputs.release_go }}
      release_c_ffi: ${{ steps.meta.outputs.release_c_ffi }}
      release_java: ${{ steps.meta.outputs.release_java }}
      release_csharp: ${{ steps.meta.outputs.release_csharp }}
      release_elixir: ${{ steps.meta.outputs.release_elixir }}
      release_dart: ${{ steps.meta.outputs.release_dart }}
      release_swift: ${{ steps.meta.outputs.release_swift }}
      release_zig: ${{ steps.meta.outputs.release_zig }}
      release_kotlin: ${{ steps.meta.outputs.release_kotlin }}
      release_wasm: ${{ steps.meta.outputs.release_wasm }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ (inputs.republish == true && (inputs.ref || github.event.repository.default_branch)) || inputs.ref || inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Retag for republish
        if: ${{ inputs.republish == true || github.event.client_payload.republish == true }}
        uses: kreuzberg-dev/actions/retag-for-republish@v1
        with:
          tag: ${{ inputs.tag || github.event.client_payload.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release metadata
        id: meta
        uses: kreuzberg-dev/actions/prepare-release-metadata@v1
        with:
          available-targets: "crates,python,node,ruby,php,cli,homebrew,go,c-ffi,java,csharp,elixir,dart,swift,zig,kotlin,wasm"

      - name: Ensure draft GitHub Release exists
        if: ${{ steps.meta.outputs.is_tag == 'true' && steps.meta.outputs.dry_run != 'true' }}
        uses: kreuzberg-dev/actions/publish-github-release@v1
        with:
          tag: ${{ steps.meta.outputs.tag }}
          target: ${{ steps.meta.outputs.target_sha }}
          notes: "Release ${{ steps.meta.outputs.tag }}"
          draft: "true"
          prerelease: ${{ steps.meta.outputs.is_prerelease }}

  validate-versions:
    name: Validate manifest versions
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Validate versions
        uses: kreuzberg-dev/actions/validate-versions@v1
        with:
          version: ${{ needs.prepare.outputs.version }}

  check-registries:
    name: Check registries
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.force_republish != 'true' }}
    runs-on: ubuntu-latest
    outputs:
      pypi_exists: ${{ steps.pypi.outputs.exists }}
      npm_node_exists: ${{ steps.npm.outputs.exists }}
      npm_wasm_exists: ${{ steps.npm.outputs.wasm_exists }}
      ruby_exists: ${{ steps.rubygems.outputs.exists }}
      php_exists: ${{ steps.packagist.outputs.exists }}
      crates_core_exists: ${{ steps.crates.outputs.exists }}
      hex_exists: ${{ steps.hex.outputs.exists }}
      maven_java_exists: ${{ steps.maven.outputs.exists }}
      maven_kotlin_exists: ${{ steps.maven.outputs.kotlin_exists }}
      nuget_exists: ${{ steps.nuget.outputs.exists }}
      pub_exists: ${{ steps.pub.outputs.exists }}
    steps:
      - id: pypi
        if: ${{ needs.prepare.outputs.release_python == 'true' }}
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: pypi
          package: spikard
          version: ${{ needs.prepare.outputs.version }}

      - id: npm
        if: ${{ needs.prepare.outputs.release_node == 'true' || needs.prepare.outputs.release_wasm == 'true' }}
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: npm
          package: "@spikard/node"
          version: ${{ needs.prepare.outputs.version }}
          extra-packages: |
            wasm_exists=@spikard/wasm

      - id: rubygems
        if: ${{ needs.prepare.outputs.release_ruby == 'true' }}
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: rubygems
          package: spikard
          version: ${{ needs.prepare.outputs.version }}

      - id: packagist
        if: ${{ needs.prepare.outputs.release_php == 'true' }}
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: packagist
          package: goldziher/spikard
          version: ${{ needs.prepare.outputs.version }}

      - id: crates
        if: ${{ needs.prepare.outputs.release_crates == 'true' }}
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: cratesio
          package: spikard-core
          version: ${{ needs.prepare.outputs.version }}

      - id: hex
        if: ${{ needs.prepare.outputs.release_elixir == 'true' }}
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: hex
          package: spikard
          version: ${{ needs.prepare.outputs.version }}

      - id: maven
        if: ${{ needs.prepare.outputs.release_java == 'true' || needs.prepare.outputs.release_kotlin == 'true' }}
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: maven
          package: "dev.spikard:spikard"
          version: ${{ needs.prepare.outputs.version }}
          extra-packages: |
            kotlin_exists=dev.spikard:spikard-kotlin

      - id: nuget
        if: ${{ needs.prepare.outputs.release_csharp == 'true' }}
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: nuget
          package: Spikard
          version: ${{ needs.prepare.outputs.version }}

      - id: pub
        if: ${{ needs.prepare.outputs.release_dart == 'true' }}
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: pub
          package: spikard
          version: ${{ needs.prepare.outputs.version }}

      # Zig has no central registry. It is consumed directly from the GitHub
      # release tag, so publish-zig is gated only on whether the release was
      # requested, not on a registry check.

  build-python:
    name: Build Python wheels
    needs: prepare
    if: ${{ needs.prepare.outputs.release_python == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: publish-python-${{ matrix.os }}
      - uses: kreuzberg-dev/actions/build-python-wheels@v1
        with:
          python-version: "3.14"
          package-dir: packages/python
          artifact-name: python-wheels-${{ matrix.os }}

  build-python-sdist:
    name: Build Python sdist
    # The sdist compiles on the consumer's machine, so its Cargo.toml must carry
    # registry version-deps, not workspace paths. build-python-sdist@v1 rewrites
    # them (--require-registry) then runs maturin sdist, so the core crates must be
    # on crates.io first. The status guard lets it run when publish-crates is
    # skipped, blocking only on its actual failure.
    needs: [prepare, publish-crates]
    if: ${{ !cancelled() && needs.publish-crates.result != 'failure' && needs.prepare.outputs.release_python == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: kreuzberg-dev/actions/setup-rust@v1
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - uses: kreuzberg-dev/actions/build-python-sdist@v1
        with:
          package-dir: packages/python
          output-dir: dist/python
          # On dry-runs the in-flight version isn't on crates.io, so the
          # --require-registry rewrite can't resolve. Skip it and build via
          # workspace path-deps; real releases publish the core crates first.
          rewrite-native-deps: ${{ needs.prepare.outputs.dry_run != 'true' }}
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: python-sdist
          path: dist/python/*.tar.gz

  build-node:
    name: Build Node package
    needs: prepare
    if: ${{ needs.prepare.outputs.release_node == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: kreuzberg-dev/actions/setup-rust@v1
      - uses: kreuzberg-dev/actions/setup-node-workspace@v1
        with:
          node-version: "24"
      - uses: kreuzberg-dev/actions/build-node-napi@v1
        with:
          crate-dir: crates/spikard-node
          build-command: pnpm exec napi build --platform --release
          pack-tarball: "true"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: node-package
          path: "*.tgz"

  build-wasm:
    name: Build WASM package
    needs: prepare
    if: ${{ needs.prepare.outputs.release_wasm == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: kreuzberg-dev/actions/setup-rust@v1
      - uses: kreuzberg-dev/actions/setup-node-workspace@v1
        with:
          node-version: "24"
      - uses: kreuzberg-dev/actions/build-wasm-package@v1
        id: build-wasm
        with:
          crate-dir: crates/spikard-wasm
          build-command: wasm-pack build . --release --target bundler
          pack-tarball: "true"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: wasm-package
          path: ${{ steps.build-wasm.outputs.tarball }}

  build-ruby:
    name: Build Ruby gem
    # build-ruby-gem@v1 rewrites workspace path-deps to registry version-deps
    # (--require-registry) before compiling, so the core crates must be on
    # crates.io first: order after publish-crates. The status guard lets the build
    # still run when publish-crates is skipped (crates already published), blocking
    # only on its actual failure.
    needs: [prepare, publish-crates]
    if: ${{ !cancelled() && needs.publish-crates.result != 'failure' && needs.prepare.outputs.release_ruby == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: kreuzberg-dev/actions/setup-rust@v1
      - uses: ruby/setup-ruby@v1.310.0
        with:
          ruby-version: "3.4"
          bundler-cache: true
          working-directory: packages/ruby
      - uses: kreuzberg-dev/actions/build-ruby-gem@v1
        with:
          package-dir: packages/ruby
          # Skip the registry rewrite on dry-runs (unpublished version cannot
          # resolve); build via workspace path-deps instead.
          rewrite-native-deps: ${{ needs.prepare.outputs.dry_run != 'true' }}
      - name: Pack gem
        run: |
          mkdir -p dist/ruby
          cd packages/ruby
          gem build spikard.gemspec
          mv ./*.gem ../../dist/ruby/
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ruby-gem
          path: dist/ruby/*.gem

  build-php:
    name: Build PHP extension
    # build-php-extension@v1 rewrites path-deps to registry versions before
    # building; the core crates must be published first. The status guard lets the
    # build run when publish-crates is skipped, blocking only on its actual failure.
    needs: [prepare, publish-crates]
    if: ${{ !cancelled() && needs.publish-crates.result != 'failure' && needs.prepare.outputs.release_php == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: kreuzberg-dev/actions/setup-php@v1
        with:
          php-version: "8.4"
      - uses: kreuzberg-dev/actions/setup-rust@v1
      - uses: kreuzberg-dev/actions/build-php-extension@v1
        with:
          crate-name: spikard-php
          lib-name: spikard_php
          # Skip the registry rewrite on dry-runs (unpublished version cannot
          # resolve); build via workspace path-deps instead.
          rewrite-native-deps: ${{ needs.prepare.outputs.dry_run != 'true' }}

  build-cli:
    name: Build CLI
    needs: prepare
    if: ${{ needs.prepare.outputs.release_cli == 'true' || needs.prepare.outputs.release_homebrew == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: kreuzberg-dev/actions/setup-rust@v1
      - id: cli
        uses: kreuzberg-dev/actions/build-rust-cli@v1
        with:
          package-name: spikard-cli
          binary-name: spikard
      - name: Package CLI
        run: |
          mkdir -p dist/cli
          tar -czf "dist/cli/spikard-cli-${{ needs.prepare.outputs.version }}-linux-x86_64.tar.gz" -C "$(dirname "${{ steps.cli.outputs.binary-path }}")" spikard
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: cli-assets
          path: dist/cli/*

  build-ffi-assets:
    name: Build FFI assets
    needs: prepare
    if: ${{ needs.prepare.outputs.release_go == 'true' || needs.prepare.outputs.release_c_ffi == 'true' || needs.prepare.outputs.release_java == 'true' || needs.prepare.outputs.release_csharp == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: kreuzberg-dev/actions/setup-rust@v1
      - uses: kreuzberg-dev/actions/build-rust-ffi@v1
        with:
          crate-name: spikard-ffi
      - uses: kreuzberg-dev/actions/build-go-ffi@v1
        with:
          crate-name: spikard-ffi
          target: x86_64-unknown-linux-gnu
          lib-name: spikard_ffi
          header-path: crates/spikard-ffi/include/spikard.h
          output-dir: dist/go
          archive-name: spikard-go-ffi-${{ needs.prepare.outputs.version }}-linux-x86_64.tar.gz
      - uses: kreuzberg-dev/actions/build-java-natives@v1
        with:
          crate-name: spikard-ffi
          target: x86_64-unknown-linux-gnu
          lib-name: spikard_ffi
          classifier: linux-x86_64
          output-dir: packages/java/src/main/resources/natives
      - uses: kreuzberg-dev/actions/build-csharp-natives@v1
        with:
          crate-name: spikard-ffi
          target: x86_64-unknown-linux-gnu
          lib-name: spikard_ffi
          rid: linux-x64
          output-dir: packages/csharp/runtimes
      - name: Package C FFI
        run: |
          mkdir -p dist/c-ffi
          tar -czf "dist/c-ffi/spikard-c-ffi-${{ needs.prepare.outputs.version }}-linux-x86_64.tar.gz" \
            crates/spikard-ffi/include/spikard.h target/release/libspikard_ffi.so
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ffi-assets
          path: |
            dist/go/*
            dist/c-ffi/*
            packages/java/src/main/resources/natives/**
            packages/csharp/runtimes/**

  build-elixir:
    name: Build Elixir NIF (${{ matrix.label }})
    # build-elixir-natives@v1 rewrites path-deps to registry versions before
    # building (so the hex source fallback resolves); needs published crates. The
    # status guard lets the build run when publish-crates is skipped, blocking only
    # on its actual failure.
    needs: [prepare, publish-crates]
    if: ${{ !cancelled() && needs.publish-crates.result != 'failure' && needs.prepare.outputs.release_elixir == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - {
              os: ubuntu-latest,
              label: linux-x86_64,
              target: x86_64-unknown-linux-gnu,
              nif: "2.16",
            }
          - {
              os: ubuntu-latest,
              label: linux-x86_64,
              target: x86_64-unknown-linux-gnu,
              nif: "2.17",
            }
          - {
              os: ubuntu-24.04-arm,
              label: linux-aarch64,
              target: aarch64-unknown-linux-gnu,
              nif: "2.16",
            }
          - {
              os: ubuntu-24.04-arm,
              label: linux-aarch64,
              target: aarch64-unknown-linux-gnu,
              nif: "2.17",
            }
          - { os: macos-latest, label: macos-arm64, target: aarch64-apple-darwin, nif: "2.16" }
          - { os: macos-latest, label: macos-arm64, target: aarch64-apple-darwin, nif: "2.17" }
          - {
              os: windows-latest,
              label: windows-x86_64,
              target: x86_64-pc-windows-msvc,
              nif: "2.16",
            }
          - {
              os: windows-latest,
              label: windows-x86_64,
              target: x86_64-pc-windows-msvc,
              nif: "2.17",
            }
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: erlef/setup-beam@v1.24
        with:
          elixir-version: "1.18"
          otp-version: "27"
      - uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}
      - uses: kreuzberg-dev/actions/build-elixir-natives@v1
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
        with:
          target: ${{ matrix.target }}
          nif-crate-name: spikard_nif
          nif-crate-path: packages/elixir/native/spikard_nif
          package-dir: packages/elixir
          nif-version: ${{ needs.prepare.outputs.version }}
          nif-api-version: ${{ matrix.nif }}
          # Skip the registry rewrite on dry-runs (unpublished version cannot
          # resolve); build via workspace path-deps instead.
          rewrite-native-deps: ${{ needs.prepare.outputs.dry_run != 'true' }}
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: elixir-${{ matrix.label }}-nif-${{ matrix.nif }}
          path: dist/elixir-natives/*.tar.gz

  build-jvm-dotnet-dart-swift-zig:
    name: Build package-only targets
    needs: prepare
    if: ${{ needs.prepare.outputs.release_java == 'true' || needs.prepare.outputs.release_kotlin == 'true' || needs.prepare.outputs.release_csharp == 'true' || needs.prepare.outputs.release_dart == 'true' || needs.prepare.outputs.release_zig == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: kreuzberg-dev/actions/setup-rust@v1
      - uses: actions/setup-java@v4.8.0
        with:
          distribution: temurin
          java-version: "25"
      - uses: kreuzberg-dev/actions/setup-maven@v1
      - uses: kreuzberg-dev/actions/setup-gradle@v1
        with:
          java-version: "25"
          gradle-version: "9.1.0"
      - uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: "10.0.x"
      - uses: dart-lang/setup-dart@v1.7.2
      - uses: kreuzberg-dev/actions/setup-zig@v1
      - name: Build package projects
        run: |
          cargo build --release -p spikard-ffi
          cd packages/java && mvn -B -DskipTests package && cd ../..
          cd packages/kotlin && gradle build --no-daemon && cd ../..
          dotnet pack packages/csharp/Spikard --configuration Release --output dist/nuget
          cd packages/dart && dart pub get && dart test && cd ../..
          cd packages/zig && zig build test -Dffi_path=../../target/release && cd ../..
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: package-targets
          path: |
            packages/java/target/*.jar
            packages/kotlin/build/libs/*.jar
            dist/nuget/*.nupkg

  upload-release-assets:
    name: Upload release assets
    needs: [prepare, build-cli, build-ffi-assets, build-elixir]
    if: ${{ always() && needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist/release-assets
          merge-multiple: true
      - uses: kreuzberg-dev/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/release-assets
          assets: |
            spikard-cli-*.tar.gz
            spikard-*-ffi-*.tar.gz
            libspikard_nif-*.tar.gz
          fail-if-empty: "false"
          clobber: ${{ needs.prepare.outputs.force_republish }}
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish crates.io packages
    needs: [prepare, validate-versions, check-registries]
    if: ${{ !cancelled() && needs.prepare.outputs.release_crates == 'true' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.crates_core_exists != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: kreuzberg-dev/actions/setup-rust@v1
      - uses: kreuzberg-dev/actions/publish-crates@v1
        with:
          crates: "spikard-core spikard-http spikard-graphql spikard spikard-codegen spikard-cli spikard-ffi"
          version: ${{ needs.prepare.outputs.version }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-pypi:
    name: Publish PyPI
    needs: [prepare, check-registries, build-python, build-python-sdist]
    if: ${{ !cancelled() && needs.prepare.outputs.release_python == 'true' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.pypi_exists != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist/python
          pattern: python-*
          merge-multiple: true
      - uses: kreuzberg-dev/actions/publish-pypi@v1
        with:
          packages-dir: dist/python
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-node:
    name: Publish Node
    needs: [prepare, check-registries, build-node]
    if: ${{ !cancelled() && needs.prepare.outputs.release_node == 'true' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.npm_node_exists != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: node-package
          path: dist/node
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - uses: kreuzberg-dev/actions/publish-npm@v1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        with:
          packages-dir: dist/node
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-wasm:
    name: Publish WASM
    needs: [prepare, check-registries, build-wasm]
    if: ${{ !cancelled() && needs.prepare.outputs.release_wasm == 'true' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.npm_wasm_exists != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: wasm-package
          path: dist/wasm
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - uses: kreuzberg-dev/actions/publish-npm@v1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        with:
          packages-dir: dist/wasm
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-rubygems:
    name: Publish RubyGems
    needs: [prepare, check-registries, build-ruby]
    if: ${{ !cancelled() && needs.prepare.outputs.release_ruby == 'true' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.ruby_exists != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: ruby-gem
          path: dist/ruby
      - uses: kreuzberg-dev/actions/publish-rubygems@v1
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        with:
          gems-dir: dist/ruby
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-packagist:
    name: Publish Packagist
    needs: [prepare, check-registries]
    if: ${{ !cancelled() && needs.prepare.outputs.release_php == 'true' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.php_exists != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: kreuzberg-dev/actions/publish-packagist@v1
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        with:
          packagist-username: ${{ secrets.PACKAGIST_USERNAME }}
          package-name: goldziher/spikard
          version: ${{ needs.prepare.outputs.version }}
          repository-url: https://github.com/Goldziher/spikard
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-hex:
    name: Publish Hex
    needs: [prepare, check-registries, build-elixir, upload-release-assets]
    # Excludes dry-runs: generate-elixir-checksums (required for mix hex.build's
    # checksum-*.exs files-list entry) downloads the per-platform NIF tarballs
    # from the GitHub Release, which upload-release-assets only attaches on a
    # real tag release.
    if: ${{ !cancelled() && needs.prepare.outputs.release_elixir == 'true' && needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.dry_run != 'true' && needs.build-elixir.result == 'success' && needs.upload-release-assets.result == 'success' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.hex_exists != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: erlef/setup-beam@v1.24
        with:
          elixir-version: "1.18"
          otp-version: "27"
      - uses: kreuzberg-dev/actions/setup-rust@v1
      # Generate the RustlerPrecompiled checksum file (checksum-Elixir.Spikard.Native.exs)
      # by downloading the per-platform NIF tarballs that upload-release-assets attached
      # to the GitHub Release. mix.exs lists `checksum-*.exs` in its files: glob, so this
      # must exist before `mix hex.build` runs or the build fails with "Missing files".
      # Targets must match the assets actually uploaded (the build-elixir matrix builds
      # these four triples; Windows is msvc, matching the uploaded artifact name).
      - name: Generate NIF checksum file
        uses: kreuzberg-dev/actions/generate-elixir-checksums@v1
        with:
          github-repo: ${{ github.repository }}
          tag: ${{ needs.prepare.outputs.tag }}
          version: ${{ needs.prepare.outputs.version }}
          lib-name: spikard_nif
          nif-versions: "2.16,2.17"
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,aarch64-apple-darwin,x86_64-pc-windows-msvc
          output-path: packages/elixir/checksum-Elixir.Spikard.Native.exs
      # Build the Hex source tarball with the NIF crate's workspace path-deps
      # rewritten to registry version-deps, so the published package compiles
      # standalone when a consumer has no precompiled NIF. On dry-runs the
      # rewrite is skipped (the version isn't on crates.io yet) and a Cargo.lock
      # is generated from the workspace instead. Leaves the rewritten tree for
      # the publish-hex step's `mix hex.publish` to package.
      - uses: kreuzberg-dev/actions/build-elixir-hex@v1
        with:
          package-dir: packages/elixir
          nif-crate-path: packages/elixir/native/spikard_nif
          dry-run: ${{ needs.prepare.outputs.dry_run }}
      - uses: kreuzberg-dev/actions/publish-hex@v1
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        with:
          package-dir: packages/elixir
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-maven:
    name: Publish Maven
    needs: [prepare, check-registries, build-jvm-dotnet-dart-swift-zig]
    if: ${{ !cancelled() && needs.prepare.outputs.release_java == 'true' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.maven_java_exists != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: actions/setup-java@v4.8.0
        with:
          distribution: temurin
          java-version: "25"
      - uses: kreuzberg-dev/actions/setup-maven@v1
      - uses: kreuzberg-dev/actions/publish-maven@v1
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        with:
          pom-file: packages/java/pom.xml
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-kotlin:
    name: Publish Kotlin
    needs: [prepare, check-registries, build-jvm-dotnet-dart-swift-zig]
    if: ${{ !cancelled() && needs.prepare.outputs.release_kotlin == 'true' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.maven_kotlin_exists != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: kreuzberg-dev/actions/publish-maven-gradle@v1
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        with:
          working-directory: packages/kotlin
          # alef-generated build.gradle.kts uses the bare `maven-publish` Gradle
          # plugin (task: `publish`). The action's default target task is
          # `publishAndReleaseToMavenCentral` which comes from vanniktech's
          # wrapper plugin — not present here. Releasing from the Central Portal
          # staging repo still requires a manual click for now.
          gradle-task: publish
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-nuget:
    name: Publish NuGet
    needs: [prepare, check-registries, build-jvm-dotnet-dart-swift-zig]
    if: ${{ !cancelled() && needs.prepare.outputs.release_csharp == 'true' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.nuget_exists != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: package-targets
          path: dist/packages
      - uses: kreuzberg-dev/actions/publish-nuget@v1
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        with:
          packages-dir: dist/packages/dist/nuget
          nuget-user: nhirschfeld
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-zig:
    name: Publish Zig metadata
    needs: [prepare, build-jvm-dotnet-dart-swift-zig]
    # No zig_exists gate: Zig has no central registry, so the check-registries
    # "exists" probe is a GitHub-release-tag lookup that is always true here — the
    # prepare job creates the draft Release for this tag before check-registries
    # runs, so the probe would always skip this job. The publish-zig action is
    # idempotent (validate build.zig.zon, verify the tag, append the resolved
    # tarball URL + SHA-256 to the release notes), so it must run on every fresh
    # tag release.
    if: ${{ !cancelled() && needs.prepare.outputs.release_zig == 'true' && needs.build-jvm-dotnet-dart-swift-zig.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: kreuzberg-dev/actions/publish-zig@v1
        with:
          working-directory: packages/zig
          tag: ${{ needs.prepare.outputs.tag }}
          zig-version: "0.16.0"
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  check-homebrew:
    name: Check Homebrew tap for formula
    needs: [prepare]
    if: ${{ needs.prepare.outputs.release_homebrew == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: kreuzberg-dev/actions/check-registry@v1
        id: check
        with:
          registry: homebrew
          package: spikard
          version: ${{ needs.prepare.outputs.version }}
          tap-repo: Goldziher/homebrew-tap

  publish-homebrew-formula:
    name: Update Homebrew formula
    needs: [prepare, check-homebrew, publish-crates]
    if: |
      always() &&
      needs.prepare.outputs.release_homebrew == 'true' &&
      needs.prepare.outputs.dry_run != 'true' &&
      (needs.check-homebrew.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') &&
      needs.publish-crates.result != 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6.0.2
        with:
          repository: Goldziher/homebrew-tap
          token: ${{ secrets.HOMEBREW_TOKEN }}
          path: homebrew-tap

      - name: Update formula files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAP_DIR: ${{ github.workspace }}/homebrew-tap
        run: scripts/publish/update-homebrew-formula.sh

      - name: Commit and push to tap
        working-directory: homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        run: |
          git config user.name "spikard-bot"
          git config user.email "bot@spikard.dev"
          if git diff --quiet Formula/; then
            echo "No formula changes; skipping commit."
            exit 0
          fi
          git add Formula/spikard.rb
          git commit -m "spikard ${{ needs.prepare.outputs.version }}"
          git push origin HEAD

  homebrew-bottles:
    name: Build Homebrew bottle (${{ matrix.bottle_tag }})
    needs: [prepare, publish-homebrew-formula]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.publish-homebrew-formula.result == 'success'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bottle_tag: arm64_sequoia
            install_brew: false
          - os: macos-15-intel
            bottle_tag: sequoia
            install_brew: false
          - os: ubuntu-latest
            bottle_tag: x86_64_linux
            install_brew: true
          - os: ubuntu-24.04-arm
            bottle_tag: arm64_linux
            install_brew: true
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Install Homebrew (Linux)
        if: ${{ matrix.install_brew }}
        uses: kreuzberg-dev/actions/install-homebrew-linux@v1

      - name: Build bottles
        uses: kreuzberg-dev/actions/homebrew-build-bottles@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          version: ${{ needs.prepare.outputs.version }}
          # brew tap name (maps to the Goldziher/homebrew-tap repo); brew adds the homebrew- prefix.
          tap: Goldziher/tap
          formulas: spikard
          out-dir: ${{ github.workspace }}/bottle-json
          github-repo: Goldziher/spikard
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload bottle JSON manifests
        uses: actions/upload-artifact@v7.0.1
        with:
          name: homebrew-bottle-json-${{ matrix.bottle_tag }}
          path: ${{ github.workspace }}/bottle-json/*.json
          if-no-files-found: error

  publish-homebrew-bottles:
    name: Merge Homebrew bottle DSL
    needs: [prepare, publish-homebrew-formula, homebrew-bottles]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.publish-homebrew-formula.result == 'success' &&
      needs.homebrew-bottles.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6.0.2
        with:
          repository: Goldziher/homebrew-tap
          token: ${{ secrets.HOMEBREW_TOKEN }}
          path: homebrew-tap

      - name: Download all bottle JSON manifests
        uses: actions/download-artifact@v8.0.1
        with:
          path: ${{ github.workspace }}/bottle-json
          pattern: homebrew-bottle-json-*
          merge-multiple: true

      - name: Merge bottle DSL into formulas
        uses: kreuzberg-dev/actions/homebrew-merge-bottles@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          version: ${{ needs.prepare.outputs.version }}
          tap-dir: ${{ github.workspace }}/homebrew-tap
          json-dir: ${{ github.workspace }}/bottle-json
          formulas: spikard
          github-repo: Goldziher/spikard

      - name: Commit and push bottle DSL
        working-directory: homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        run: |
          git config user.name "spikard-bot"
          git config user.email "bot@spikard.dev"
          if git diff --quiet Formula/; then
            echo "No bottle DSL changes; skipping commit."
            exit 0
          fi
          git add Formula/spikard.rb
          git commit -m "spikard ${{ needs.prepare.outputs.version }}: add bottle DSL"
          git push origin HEAD

  finalize:
    name: Finalize release
    needs:
      - prepare
      - upload-release-assets
      - publish-crates
      - publish-pypi
      - publish-node
      - publish-wasm
      - publish-rubygems
      - publish-packagist
      - publish-hex
      - publish-maven
      - publish-kotlin
      - publish-nuget
      - publish-zig
      - publish-homebrew-bottles
    if: ${{ always() && needs.prepare.outputs.is_tag == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: kreuzberg-dev/actions/finalize-release@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          is-prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          go-module-path: github.com/Goldziher/spikard
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          token: ${{ secrets.GITHUB_TOKEN }}
