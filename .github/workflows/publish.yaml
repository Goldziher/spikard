name: Publish Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g., v0.14.0)"
        required: false
        type: string
      ref:
        description: "Git ref (branch, tag, or commit) to build; defaults to the tag"
        required: false
        type: string
      targets:
        description: "Comma-separated release targets, or all"
        required: false
        type: string
        default: "all"
      dry_run:
        description: "Prepare artifacts without publishing"
        required: false
        type: boolean
        default: false
      republish:
        description: "Delete and re-create the tag on current HEAD before publishing"
        required: false
        type: boolean
        default: false
      force_republish:
        description: "Force republish targets whose registry version already exists"
        required: false
        type: boolean
        default: false
  release:
    types: [published]
  repository_dispatch:
    types: [publish-release]

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.ref || github.event.inputs.tag)) || github.ref || github.run_id }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    name: Prepare metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
      is_tag: ${{ steps.meta.outputs.is_tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      force_republish: ${{ steps.meta.outputs.force_republish }}
      release_python: ${{ steps.meta.outputs.release_python }}
      release_node: ${{ steps.meta.outputs.release_node }}
      release_ruby: ${{ steps.meta.outputs.release_ruby }}
      release_php: ${{ steps.meta.outputs.release_php }}
      release_cli: ${{ steps.meta.outputs.release_cli }}
      release_crates: ${{ steps.meta.outputs.release_crates }}
      release_homebrew: ${{ steps.meta.outputs.release_homebrew }}
      release_go: ${{ steps.meta.outputs.release_go }}
      release_c_ffi: ${{ steps.meta.outputs.release_c_ffi }}
      release_java: ${{ steps.meta.outputs.release_java }}
      release_csharp: ${{ steps.meta.outputs.release_csharp }}
      release_elixir: ${{ steps.meta.outputs.release_elixir }}
      release_dart: ${{ steps.meta.outputs.release_dart }}
      release_swift: ${{ steps.meta.outputs.release_swift }}
      release_zig: ${{ steps.meta.outputs.release_zig }}
      release_kotlin: ${{ steps.meta.outputs.release_kotlin }}
      release_wasm: ${{ steps.meta.outputs.release_wasm }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ (inputs.republish == true && (inputs.ref || github.event.repository.default_branch)) || inputs.ref || inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Retag for republish
        if: ${{ inputs.republish == true || github.event.client_payload.republish == true }}
        uses: xberg-io/actions/retag-for-republish@v1
        with:
          tag: ${{ inputs.tag || github.event.client_payload.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release metadata
        id: meta
        uses: xberg-io/actions/prepare-release-metadata@v1
        with:
          available-targets: "crates,python,node,ruby,php,cli,homebrew,go,c-ffi,java,csharp,elixir,dart,swift,zig,kotlin,wasm"

      - name: Ensure draft GitHub Release exists
        if: ${{ steps.meta.outputs.is_tag == 'true' && steps.meta.outputs.dry_run != 'true' }}
        uses: xberg-io/actions/publish-github-release@v1
        with:
          tag: ${{ steps.meta.outputs.tag }}
          target: ${{ steps.meta.outputs.target_sha }}
          notes: "Release ${{ steps.meta.outputs.tag }}"
          draft: "true"
          prerelease: ${{ steps.meta.outputs.is_prerelease }}

  validate-versions:
    name: Validate manifest versions
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Validate versions
        uses: xberg-io/actions/validate-versions@v1
        with:
          version: ${{ needs.prepare.outputs.version }}

  check-registries:
    name: Check registries
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.force_republish != 'true' }}
    runs-on: ubuntu-latest
    outputs:
      pypi_exists: ${{ steps.pypi.outputs.exists }}
      npm_node_exists: ${{ steps.npm.outputs.exists }}
      npm_wasm_exists: ${{ steps.npm.outputs.wasm_exists }}
      ruby_exists: ${{ steps.rubygems.outputs.exists }}
      php_exists: ${{ steps.packagist.outputs.exists }}
      crates_core_exists: ${{ steps.crates.outputs.exists }}
      hex_exists: ${{ steps.hex.outputs.exists }}
      maven_java_exists: ${{ steps.maven.outputs.exists }}
      maven_kotlin_exists: ${{ steps.maven.outputs.kotlin_exists }}
      nuget_exists: ${{ steps.nuget.outputs.exists }}
      pub_exists: ${{ steps.pub.outputs.exists }}
    steps:
      - id: pypi
        if: ${{ needs.prepare.outputs.release_python == 'true' }}
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: pypi
          package: spikard
          version: ${{ needs.prepare.outputs.version }}

      - id: npm
        if: ${{ needs.prepare.outputs.release_node == 'true' || needs.prepare.outputs.release_wasm == 'true' }}
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: npm
          package: "@spikard/node"
          version: ${{ needs.prepare.outputs.version }}
          extra-packages: |
            wasm_exists=@spikard/wasm

      - id: rubygems
        if: ${{ needs.prepare.outputs.release_ruby == 'true' }}
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: rubygems
          package: spikard
          version: ${{ needs.prepare.outputs.version }}

      - id: packagist
        if: ${{ needs.prepare.outputs.release_php == 'true' }}
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: packagist
          package: goldziher/spikard
          version: ${{ needs.prepare.outputs.version }}

      - id: crates
        if: ${{ needs.prepare.outputs.release_crates == 'true' }}
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: cratesio
          package: spikard-core
          version: ${{ needs.prepare.outputs.version }}

      - id: hex
        if: ${{ needs.prepare.outputs.release_elixir == 'true' }}
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: hex
          package: spikard
          version: ${{ needs.prepare.outputs.version }}

      - id: maven
        if: ${{ needs.prepare.outputs.release_java == 'true' || needs.prepare.outputs.release_kotlin == 'true' }}
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: maven
          package: "dev.spikard:spikard"
          version: ${{ needs.prepare.outputs.version }}
          extra-packages: |
            kotlin_exists=dev.spikard:spikard-kotlin

      - id: nuget
        if: ${{ needs.prepare.outputs.release_csharp == 'true' }}
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: nuget
          package: Spikard
          version: ${{ needs.prepare.outputs.version }}

      - id: pub
        if: ${{ needs.prepare.outputs.release_dart == 'true' }}
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: pub
          package: spikard
          version: ${{ needs.prepare.outputs.version }}

      # ~keep Zig has no central registry. It is consumed directly from the GitHub
      # ~keep release tag, so publish-zig is gated only on whether the release was
      # ~keep requested, not on a registry check.

  build-python:
    name: Build Python wheels
    needs: prepare
    if: ${{ needs.prepare.outputs.release_python == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
          cache-key-prefix: publish-python-${{ matrix.os }}
      - uses: xberg-io/actions/build-python-wheels@v1
        with:
          python-version: "3.14"
          package-dir: packages/python
          artifact-name: python-wheels-${{ matrix.os }}

  build-python-sdist:
    name: Build Python sdist
    # ~keep The sdist compiles on the consumer's machine, so its Cargo.toml must carry
    # ~keep registry version-deps, not workspace paths. build-python-sdist@v1 rewrites
    # ~keep them (--require-registry) then runs maturin sdist, so the core crates must be
    # ~keep on crates.io first. The status guard lets it run when publish-crates is
    # ~keep skipped, blocking only on its actual failure.
    needs: [prepare, publish-crates]
    if: ${{ !cancelled() && needs.publish-crates.result != 'failure' && needs.prepare.outputs.release_python == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: xberg-io/actions/build-python-sdist@v1
        with:
          package-dir: packages/python
          output-dir: dist/python
          # ~keep On dry-runs the in-flight version isn't on crates.io, so the
          # ~keep --require-registry rewrite can't resolve. Skip it and build via
          # ~keep workspace path-deps; real releases publish the core crates first.
          rewrite-native-deps: ${{ needs.prepare.outputs.dry_run != 'true' }}
      - uses: actions/upload-artifact@v7
        with:
          name: python-sdist
          path: dist/python/*.tar.gz

  build-node-typescript-defs:
    name: Generate Node TypeScript definitions
    needs: prepare
    if: ${{ needs.prepare.outputs.release_node == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
      - uses: xberg-io/actions/setup-node-workspace@v1
        with:
          node-version: "24"
      - name: Generate TypeScript definitions
        # ~keep napi build emits index.js + index.d.ts as a side effect; both are
        # ~keep platform-agnostic (the platform binary lives in @spikard/node-<rid>).
        # ~keep Generated once on linux-x86_64 and shared across publish-node staging.
        # ~keep service.cjs is alef-generated source — committed in the repo, not
        # ~keep produced by napi — so we copy it from the checkout, not from a build
        # ~keep artifact.
        # ~keep `--platform` is required to make napi-rs 3.x emit the index.js JS
        # ~keep shim alongside the binary; without it only the native module is
        # ~keep produced and the cp step below fails with "No such file or directory".
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --filter ./crates/spikard-node...
          pnpm --filter ./crates/spikard-node exec napi build --platform --release
          mkdir -p typescript-defs
          cp crates/spikard-node/index.js \
             crates/spikard-node/index.d.ts \
             crates/spikard-node/service.cjs \
             typescript-defs/
      - uses: actions/upload-artifact@v7
        with:
          name: node-typescript-defs
          path: typescript-defs/
          retention-days: 14

  build-node:
    name: Build Node bindings (${{ matrix.target }})
    needs: prepare
    if: ${{ needs.prepare.outputs.release_node == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - {
              os: macos-latest,
              target: aarch64-apple-darwin,
              rust_target: "",
              use_napi_cross: false,
            }
          - {
              os: ubuntu-latest,
              target: x86_64-unknown-linux-gnu,
              rust_target: "",
              use_napi_cross: false,
            }
          - {
              os: ubuntu-latest,
              target: aarch64-unknown-linux-gnu,
              rust_target: aarch64-unknown-linux-gnu,
              use_napi_cross: true,
            }
          - {
              os: windows-latest,
              target: x86_64-pc-windows-msvc,
              rust_target: "",
              use_napi_cross: false,
            }
          - {
              os: windows-latest,
              target: aarch64-pc-windows-msvc,
              rust_target: aarch64-pc-windows-msvc,
              use_napi_cross: false,
            }
          # ~keep musl and armv7 targets deferred — napi-cross artifact path mismatch
          # ~keep ("No dist dir found") blocks cross-compiled bindings in build-node-napi@v1.
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - name: Free disk space
        if: runner.os == 'Linux'
        uses: xberg-io/actions/free-disk-space-linux@v1
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
          target: ${{ matrix.rust_target || matrix.target }}
          cache-key-prefix: publish-node-${{ matrix.target }}
      - uses: xberg-io/actions/setup-node-workspace@v1
        with:
          node-version: "24"
      - name: Build native module
        uses: xberg-io/actions/build-node-napi@v1
        with:
          crate-dir: crates/spikard-node
          target: ${{ matrix.target }}
          use-napi-cross: ${{ matrix.use_napi_cross }}
          pack-target-tarball: node-bindings-${{ matrix.target }}.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: node-bindings-${{ matrix.target }}
          path: node-bindings-${{ matrix.target }}.tar.gz
          retention-days: 14

  build-wasm:
    name: Build WASM package
    needs: prepare
    if: ${{ needs.prepare.outputs.release_wasm == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
      - uses: xberg-io/actions/setup-node-workspace@v1
        with:
          node-version: "24"
      - uses: xberg-io/actions/build-wasm-package@v1
        id: build-wasm
        with:
          crate-dir: crates/spikard-wasm
          # ~keep Build every wasm-pack target (web/bundler/nodejs/deno) into pkg/<target>/
          # ~keep so the published package.json main/module/types resolve, and strip the
          # ~keep wasm-pack-emitted pkg/.gitignore ("*") that otherwise makes npm drop all
          # ~keep of pkg/ from the tarball. See the package.json "build:all" script.
          build-command: npm run build:all
          pack-tarball: "true"
      - uses: actions/upload-artifact@v7
        with:
          name: wasm-package
          path: ${{ steps.build-wasm.outputs.tarball }}

  build-ruby:
    name: Build Ruby gem (${{ matrix.label }})
    # ~keep build-ruby-gem@v1 rewrites workspace path-deps to registry version-deps
    # ~keep (--require-registry) before compiling, so the core crates must be on
    # ~keep crates.io first: order after publish-crates. The status guard lets the build
    # ~keep still run when publish-crates is skipped (crates already published), blocking
    # ~keep only on its actual failure.
    needs: [prepare, publish-crates]
    if: ${{ !cancelled() && needs.publish-crates.result != 'failure' && needs.prepare.outputs.release_ruby == 'true' }}
    runs-on: ${{ matrix.os }}
    env:
      RB_SYS_CARGO_PROFILE: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, label: linux-x86_64 }
          - { os: ubuntu-24.04-arm, label: linux-aarch64 }
          - { os: macos-latest, label: macos-arm64 }
          # ~keep Opt-in legs for the remaining CROSS_PLATFORMS entries (x86_64-darwin,
          # ~keep x64-mingw-ucrt); without them those consumers fall back to the source gem.
          # ~keep - { os: macos-15-intel, label: macos-x86_64 }
          # ~keep - { os: windows-latest, label: windows-x86_64 }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          working-directory: packages/ruby
      - uses: xberg-io/actions/build-ruby-gem@v1
        with:
          package-dir: packages/ruby
          # ~keep Skip the registry rewrite on dry-runs (unpublished version cannot
          # ~keep resolve); build via workspace path-deps instead.
          rewrite-native-deps: ${{ needs.prepare.outputs.dry_run != 'true' }}
      - name: Package platform gem
        # ~keep `rake compile` builds the native extension for this runner's platform;
        # ~keep rake-compiler then tags the `rake build` gem with the current platform
        # ~keep (e.g. -x86_64-linux), alongside the fallback source gem. Without the
        # ~keep compile, `rake build` emits a source-only gem that forces every consumer
        # ~keep to compile from source on `gem install`.
        working-directory: packages/ruby
        shell: bash
        run: |
          bundle exec rake compile
          bundle exec rake build
      - name: Drop source gem on non-canonical builders
        if: ${{ matrix.label != 'linux-x86_64' }}
        # ~keep Only the canonical linux-x86_64 builder ships the fallback source gem;
        # ~keep other runners emit byte-different source gems that collide under the
        # ~keep publish merge. Keep only platform-tagged gems (Rakefile CROSS_PLATFORMS).
        shell: bash
        run: |
          shopt -s nullglob
          for f in packages/ruby/pkg/*.gem; do
            base="$(basename "$f")"
            case "$base" in
              *-x86_64-linux.gem|*-aarch64-linux.gem|*-arm64-darwin.gem|*-x86_64-darwin.gem|*-x64-mingw-ucrt.gem) ;;
              *) echo "Removing non-canonical source gem $base"; rm -f "$f" ;;
            esac
          done
      - uses: actions/upload-artifact@v7
        with:
          name: rubygems-${{ matrix.label }}
          path: packages/ruby/pkg/*.gem
          retention-days: 14

  build-php:
    name: Build PHP extension (php${{ matrix.php }} ${{ matrix.platform.label }})
    # ~keep build-php-extension@v1 rewrites path-deps to registry versions before
    # ~keep building; the core crates must be published first. The status guard lets the
    # ~keep build run when publish-crates is skipped, blocking only on its actual failure.
    needs: [prepare, publish-crates]
    if: ${{ !cancelled() && needs.publish-crates.result != 'failure' && needs.prepare.outputs.release_php == 'true' }}
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
        platform:
          - { os: ubuntu-latest, label: linux-x86_64, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, label: linux-arm64, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest, label: macos-arm64, target: aarch64-apple-darwin }
          - { os: windows-latest, label: windows-x86_64, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: xberg-io/actions/setup-php@v1
        with:
          php-version: ${{ matrix.php }}
      - uses: xberg-io/actions/setup-rust@v1
        with:
          # ~keep ext-php-rs requires the nightly-only `abi_vectorcall` feature on
          # ~keep Windows (`#![cfg_attr(windows, feature(abi_vectorcall))]` in the
          # ~keep generated spikard-php lib.rs); stable rejects it. Use nightly for the
          # ~keep Windows target only, stable 1.95 elsewhere.
          toolchain: ${{ contains(matrix.platform.target, 'windows') && 'nightly' || '1.95' }}
          target: ${{ matrix.platform.target }}
      - uses: xberg-io/actions/build-php-extension@v1
        with:
          crate-name: spikard-php
          lib-name: spikard_php
          php-version: ${{ matrix.php }}
          php-ts: nts
          # ~keep Skip the registry rewrite on dry-runs (unpublished version cannot
          # ~keep resolve); build via workspace path-deps instead.
          rewrite-native-deps: ${{ needs.prepare.outputs.dry_run != 'true' }}
      - uses: xberg-io/actions/package-php-pie@v1
        with:
          php-version: ${{ matrix.php }}
          php-ts: nts
          target: ${{ matrix.platform.target }}
          windows-compiler: ${{ contains(matrix.platform.target, 'windows') && 'vs17' || '' }}
          version: ${{ needs.prepare.outputs.version }}
          output-dir: dist/php-package
      - uses: actions/upload-artifact@v7
        with:
          name: php-package-${{ matrix.platform.label }}-php${{ matrix.php }}
          path: |
            dist/php-package/php_*.tgz
            dist/php-package/php_*.tgz.sha256
            dist/php-package/php_*.zip
            dist/php-package/php_*.zip.sha256
          retention-days: 14

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: prepare
    if: ${{ needs.prepare.outputs.release_cli == 'true' || needs.prepare.outputs.release_homebrew == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, label: linux-x86_64 }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, label: linux-aarch64 }
          - { os: macos-latest, target: aarch64-apple-darwin, label: macos-aarch64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, label: windows-x86_64 }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
          target: ${{ matrix.target }}
      - name: Setup Zig for glibc 2.28 floor
        if: contains(matrix.target, '-linux-gnu')
        uses: xberg-io/actions/setup-zig@v1
      - name: Install cargo-zigbuild for glibc 2.28 floor
        if: contains(matrix.target, '-linux-gnu')
        shell: bash
        run: command -v cargo-zigbuild || cargo install --locked cargo-zigbuild
      - id: cli
        uses: xberg-io/actions/build-rust-cli@v1
        with:
          package-name: spikard-cli
          binary-name: spikard
          target: ${{ matrix.target }}
          glibc-version: "2.28"
      - name: Package CLI
        env:
          BINARY_PATH: ${{ steps.cli.outputs.binary-path }}
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          mkdir -p dist/cli
          STAGE_DIR="$(dirname "$BINARY_PATH")"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ( cd "$STAGE_DIR" && 7z a "$GITHUB_WORKSPACE/dist/cli/spikard-cli-${VERSION}-${TARGET}.zip" spikard.exe >/dev/null )
          else
            tar -czf "dist/cli/spikard-cli-${VERSION}-${TARGET}.tar.gz" -C "$STAGE_DIR" spikard
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: cli-assets-${{ matrix.target }}
          path: dist/cli/*
          if-no-files-found: error
          retention-days: 14

  build-elixir:
    name: Build Elixir NIF (${{ matrix.label }})
    # ~keep build-elixir-natives@v1 rewrites path-deps to registry versions before
    # ~keep building (so the hex source fallback resolves); needs published crates. The
    # ~keep status guard lets the build run when publish-crates is skipped, blocking only
    # ~keep on its actual failure.
    needs: [prepare, publish-crates]
    if: ${{ !cancelled() && needs.publish-crates.result != 'failure' && needs.prepare.outputs.release_elixir == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - {
              os: ubuntu-latest,
              label: linux-x86_64,
              target: x86_64-unknown-linux-gnu,
              nif: "2.16",
            }
          - {
              os: ubuntu-latest,
              label: linux-x86_64,
              target: x86_64-unknown-linux-gnu,
              nif: "2.17",
            }
          - {
              os: ubuntu-24.04-arm,
              label: linux-aarch64,
              target: aarch64-unknown-linux-gnu,
              nif: "2.16",
            }
          - {
              os: ubuntu-24.04-arm,
              label: linux-aarch64,
              target: aarch64-unknown-linux-gnu,
              nif: "2.17",
            }
          - { os: macos-latest, label: macos-arm64, target: aarch64-apple-darwin, nif: "2.16" }
          - { os: macos-latest, label: macos-arm64, target: aarch64-apple-darwin, nif: "2.17" }
          - {
              os: windows-latest,
              label: windows-x86_64,
              target: x86_64-pc-windows-msvc,
              nif: "2.16",
            }
          - {
              os: windows-latest,
              label: windows-x86_64,
              target: x86_64-pc-windows-msvc,
              nif: "2.17",
            }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: xberg-io/actions/setup-elixir@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
          target: ${{ matrix.target }}
      - uses: xberg-io/actions/build-elixir-natives@v1
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
        with:
          target: ${{ matrix.target }}
          nif-crate-name: spikard_nif
          nif-crate-path: packages/elixir/native/spikard_nif
          package-dir: packages/elixir
          nif-version: ${{ needs.prepare.outputs.version }}
          nif-api-version: ${{ matrix.nif }}
          # ~keep Skip the registry rewrite on dry-runs (unpublished version cannot
          # ~keep resolve); build via workspace path-deps instead.
          rewrite-native-deps: ${{ needs.prepare.outputs.dry_run != 'true' }}
      - uses: actions/upload-artifact@v7
        with:
          name: elixir-${{ matrix.label }}-nif-${{ matrix.nif }}
          path: dist/elixir-natives/*.tar.gz

  build-jvm-dotnet-dart-swift-zig:
    name: Build Kotlin package
    # ~keep Kotlin-only: Java jar is built in publish-maven (with per-platform natives),
    # ~keep C# nupkg in publish-nuget, Dart in the dart-* jobs, Zig in publish-zig.
    needs: prepare
    if: ${{ needs.prepare.outputs.release_kotlin == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
      - uses: xberg-io/actions/setup-gradle@v1
        with:
          java-version: "25"
          gradle-version: "9.1.0"
      - name: Build Kotlin package
        run: |
          # ~keep Host FFI build so any Gradle test that dlopens spikard_ffi resolves it.
          cargo build --release -p spikard-ffi
          cd packages/kotlin && gradle build --no-daemon && cd ../..
      - uses: actions/upload-artifact@v7
        with:
          name: package-targets
          path: |
            packages/kotlin/build/libs/*.jar

  upload-release-assets:
    name: Upload release assets
    needs: [prepare, build-cli, build-go-ffi, build-c-ffi, build-elixir]
    if: ${{ always() && needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist/release-assets
          merge-multiple: true
      - uses: xberg-io/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/release-assets
          assets: |
            spikard-cli-*.tar.gz
            spikard-cli-*.zip
            spikard-*-ffi-*.tar.gz
            libspikard_nif-*.tar.gz
          fail-if-empty: "false"
          clobber: ${{ needs.prepare.outputs.force_republish }}
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish crates.io packages
    needs: [prepare, validate-versions, check-registries]
    if: ${{ !cancelled() && needs.prepare.outputs.release_crates == 'true' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.crates_core_exists != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
      - uses: xberg-io/actions/publish-crates@v1
        with:
          crates: "spikard-core spikard-http spikard-graphql spikard spikard-codegen spikard-cli spikard-ffi"
          version: ${{ needs.prepare.outputs.version }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}
      # ~keep Poll the crates.io sparse index for each workspace member that
      # ~keep binding crates depend on. Without this, the binding-build jobs
      # ~keep immediately run alef vendor's `cargo update -p <name>` + `cargo
      # ~keep metadata --locked` validation against an index that hasn't seen
      # ~keep the newly-published version yet, producing the misleading
      # ~keep "workspace-member version not yet published — publish core
      # ~keep crates first" error after publish-crates already succeeded.
      - name: Wait for spikard-core indexing
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        uses: xberg-io/actions/wait-for-package@v1
        with:
          registry: cratesio
          package: spikard-core
          version: ${{ needs.prepare.outputs.version }}
      - name: Wait for spikard-http indexing
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        uses: xberg-io/actions/wait-for-package@v1
        with:
          registry: cratesio
          package: spikard-http
          version: ${{ needs.prepare.outputs.version }}
      - name: Wait for spikard-graphql indexing
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        uses: xberg-io/actions/wait-for-package@v1
        with:
          registry: cratesio
          package: spikard-graphql
          version: ${{ needs.prepare.outputs.version }}
      - name: Wait for spikard indexing
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        uses: xberg-io/actions/wait-for-package@v1
        with:
          registry: cratesio
          package: spikard
          version: ${{ needs.prepare.outputs.version }}

  publish-pypi:
    name: Publish PyPI
    needs: [prepare, check-registries, build-python, build-python-sdist]
    if: ${{ !cancelled() && needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_python == 'true' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.pypi_exists != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist/python
          pattern: python-*
          merge-multiple: true
      - uses: xberg-io/actions/publish-pypi@v1
        with:
          packages-dir: dist/python
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-node:
    name: Publish Node
    needs: [prepare, check-registries, build-node, build-node-typescript-defs]
    if: ${{ !cancelled() && needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_node == 'true' && needs.build-node.result == 'success' && needs.build-node-typescript-defs.result == 'success' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.npm_node_exists != 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: actions/download-artifact@v8
        with:
          pattern: node-bindings-*
          path: node-artifacts
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          name: node-typescript-defs
          path: typescript-defs
      - uses: xberg-io/actions/setup-node-workspace@v1
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"
      - name: Stage platform packages and main package
        # ~keep Per-platform Node artifact layout: one tarball per target staging
        # ~keep crates/spikard-node/npm/<platform>/. The main package needs an
        # ~keep optionalDependencies map listing every platform sub-package so
        # ~keep npm install resolves the correct binary per host. publish-npm@v1
        # ~keep operates on a single package dir, so the staging is inlined here.
        shell: bash
        run: |
          set -euo pipefail
          rm -rf crates/spikard-node/npm
          mkdir -p crates/spikard-node/npm
          for pkg in node-artifacts/*.tar.gz; do
            tar -xzf "${pkg}" -C crates/spikard-node
          done
          cp typescript-defs/index.js \
             typescript-defs/index.d.ts \
             typescript-defs/service.cjs \
             crates/spikard-node/

          # ~keep Pack each platform sub-package as a tarball alongside the main one.
          cd crates/spikard-node/npm
          for dir in */; do
            if [ -f "$dir/package.json" ]; then
              (cd "$dir" && npm pack && mv ./*.tgz ..)
            fi
          done
          cd ../../..

          # ~keep Stamp main package optionalDependencies with the real platform
          # ~keep sub-package versions we just built. alef pre-renders this map,
          # ~keep but rewriting it here keeps the publish self-consistent even if
          # ~keep the matrix is trimmed (e.g. musl excluded above).
          tmp_pkg_json="$(mktemp)"
          optional_deps_json='{}'
          for platform_pkg_json in crates/spikard-node/npm/*/package.json; do
            name="$(jq -r '.name // empty' "$platform_pkg_json")"
            version="$(jq -r '.version // empty' "$platform_pkg_json")"
            if [[ -z "$name" || -z "$version" ]]; then
              echo "Invalid platform package.json: $platform_pkg_json" >&2
              exit 1
            fi
            optional_deps_json="$(jq -c --arg n "$name" --arg v "$version" \
              '. + {($n): $v}' <<<"$optional_deps_json")"
          done
          jq --argjson deps "$optional_deps_json" '.optionalDependencies = $deps' \
            crates/spikard-node/package.json > "$tmp_pkg_json"
          mv "$tmp_pkg_json" crates/spikard-node/package.json
      - name: Publish platform sub-packages
        uses: xberg-io/actions/publish-npm@v1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        with:
          packages-dir: crates/spikard-node/npm
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}
      # ~keep Wait for the platform sub-packages to index before publishing the main
      # ~keep package, whose optionalDependencies reference them — otherwise there is a
      # ~keep window where `npm install @spikard/node` fails on unresolved deps.
      - name: Wait for npm indexing (node-linux-x64-gnu)
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        uses: xberg-io/actions/wait-for-package@v1
        with:
          registry: npm
          package: "@spikard/node-linux-x64-gnu"
          version: ${{ needs.prepare.outputs.version }}
          max-attempts: "60"
      - name: Wait for npm indexing (node-linux-arm64-gnu)
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        uses: xberg-io/actions/wait-for-package@v1
        with:
          registry: npm
          package: "@spikard/node-linux-arm64-gnu"
          version: ${{ needs.prepare.outputs.version }}
          max-attempts: "60"
      - name: Publish main @spikard/node package
        uses: xberg-io/actions/publish-npm@v1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        with:
          package-dir: crates/spikard-node
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-wasm:
    name: Publish WASM
    needs: [prepare, check-registries, build-wasm]
    if: ${{ !cancelled() && needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_wasm == 'true' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.npm_wasm_exists != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wasm-package
          path: dist/wasm
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - uses: xberg-io/actions/publish-npm@v1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        with:
          packages-dir: dist/wasm
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-rubygems:
    name: Publish RubyGems
    needs: [prepare, check-registries, build-ruby]
    if: ${{ !cancelled() && needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_ruby == 'true' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.ruby_exists != 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: rubygems-*
          path: dist
          # ~keep No merge-multiple: the canonical linux-x86_64 builder also ships the
          # ~keep fallback source gem spikard-<version>.gem, whose basename collides
          # ~keep across runners. publish-rubygems globs recursively and dedupes.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: false
      # ~keep Trusted publishing (OIDC) needs a recent RubyGems; the runner's bundled
      # ~keep version can be too old for configure-rubygems-credentials.
      - name: Update RubyGems for OIDC trusted publishing
        run: gem update --system
      - uses: rubygems/configure-rubygems-credentials@v2.0.0
      - uses: xberg-io/actions/publish-rubygems@v1
        with:
          gems-dir: dist
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-packagist:
    name: Publish Packagist
    needs: [prepare, check-registries, upload-php-pie-release]
    if: ${{ !cancelled() && needs.prepare.outputs.release_php == 'true' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.php_exists != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: xberg-io/actions/publish-packagist@v1
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        with:
          packagist-username: ${{ secrets.PACKAGIST_USERNAME }}
          package-name: goldziher/spikard
          version: ${{ needs.prepare.outputs.version }}
          repository-url: https://github.com/Goldziher/spikard
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-hex:
    name: Publish Hex
    needs: [prepare, check-registries, build-elixir, upload-release-assets]
    # ~keep Excludes dry-runs: generate-elixir-checksums (required for mix hex.build's
    # ~keep checksum-*.exs files-list entry) downloads the per-platform NIF tarballs
    # ~keep from the GitHub Release, which upload-release-assets only attaches on a
    # ~keep real tag release.
    if: ${{ !cancelled() && needs.prepare.outputs.release_elixir == 'true' && needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.dry_run != 'true' && needs.build-elixir.result == 'success' && needs.upload-release-assets.result == 'success' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.hex_exists != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: xberg-io/actions/setup-elixir@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
      # ~keep Generate the RustlerPrecompiled checksum file (checksum-Elixir.Spikard.Native.exs)
      # ~keep by downloading the per-platform NIF tarballs that upload-release-assets attached
      # ~keep to the GitHub Release. mix.exs lists `checksum-*.exs` in its files: glob, so this
      # ~keep must exist before `mix hex.build` runs or the build fails with "Missing files".
      # ~keep Targets must match the assets actually uploaded (the build-elixir matrix builds
      # ~keep these four triples; Windows is msvc, matching the uploaded artifact name).
      - name: Generate NIF checksum file
        uses: xberg-io/actions/generate-elixir-checksums@v1
        with:
          github-repo: ${{ github.repository }}
          tag: ${{ needs.prepare.outputs.tag }}
          version: ${{ needs.prepare.outputs.version }}
          lib-name: spikard_nif
          nif-versions: "2.16,2.17"
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,aarch64-apple-darwin,x86_64-pc-windows-msvc
          output-path: packages/elixir/checksum-Elixir.Spikard.Native.exs
      # ~keep Build the Hex source tarball with the NIF crate's workspace path-deps
      # ~keep rewritten to registry version-deps, so the published package compiles
      # ~keep standalone when a consumer has no precompiled NIF. On dry-runs the
      # ~keep rewrite is skipped (the version isn't on crates.io yet) and a Cargo.lock
      # ~keep is generated from the workspace instead. Leaves the rewritten tree for
      # ~keep the publish-hex step's `mix hex.publish` to package.
      - uses: xberg-io/actions/build-elixir-hex@v1
        with:
          package-dir: packages/elixir
          nif-crate-path: packages/elixir/native/spikard_nif
          dry-run: ${{ needs.prepare.outputs.dry_run }}
      - uses: xberg-io/actions/publish-hex@v1
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        with:
          package-dir: packages/elixir
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-maven:
    name: Publish Maven
    needs: [prepare, check-registries, build-java-natives]
    if: ${{ !cancelled() && needs.prepare.outputs.release_java == 'true' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.maven_java_exists != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - uses: xberg-io/actions/setup-maven@v1
      - name: Download Java natives (all classifiers)
        uses: actions/download-artifact@v8
        with:
          pattern: java-natives-*
          path: dist/java-natives
          merge-multiple: true
      - name: Stage natives into Java resources
        shell: bash
        run: |
          set -euo pipefail
          dest=packages/java/src/main/resources/natives
          rm -rf "$dest"
          mkdir -p "$dest"
          # ~keep build-java-natives@v1 artifacts already carry <classifier>/lib… layout.
          cp -R dist/java-natives/. "$dest/"
          find "$dest" -type f
      - name: Package Java JAR with bundled natives
        run: cd packages/java && mvn -B -DskipTests package
      - uses: xberg-io/actions/publish-maven@v1
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        with:
          pom-file: packages/java/pom.xml
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-kotlin:
    name: Publish Kotlin
    needs: [prepare, check-registries, build-jvm-dotnet-dart-swift-zig]
    if: ${{ !cancelled() && needs.prepare.outputs.release_kotlin == 'true' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.maven_kotlin_exists != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: xberg-io/actions/publish-maven-gradle@v1
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        with:
          working-directory: packages/kotlin
          # ~keep build.gradle.kts applies the vanniktech maven-publish plugin, so the
          # ~keep action's default `publishAndReleaseToMavenCentral` task uploads with
          # ~keep publishingType=AUTOMATIC and auto-releases the Central Portal
          # ~keep deployment (no manual staging-close step).
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-nuget:
    name: Publish NuGet
    needs: [prepare, check-registries, build-csharp-natives]
    if: ${{ !cancelled() && needs.prepare.outputs.release_csharp == 'true' && (needs.prepare.outputs.force_republish == 'true' || needs.check-registries.outputs.nuget_exists != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Download C# natives (all RIDs)
        uses: actions/download-artifact@v8
        with:
          pattern: csharp-natives-*
          path: dist/csharp-natives
          merge-multiple: true
      - name: Stage runtimes into csproj dir
        shell: bash
        run: |
          set -euo pipefail
          # ~keep csproj packs runtimes/** relative to packages/csharp/Spikard/
          dest=packages/csharp/Spikard/runtimes
          rm -rf "$dest"
          mkdir -p "$dest"
          # ~keep build-csharp-natives@v1 artifacts already carry runtimes/<rid>/native/ layout.
          cp -R dist/csharp-natives/runtimes/. "$dest/"
          find "$dest" -type f
      - name: Pack NuGet
        run: dotnet pack packages/csharp/Spikard --configuration Release --output dist/nuget
      - uses: xberg-io/actions/publish-nuget@v1
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        with:
          packages-dir: dist/nuget
          nuget-user: nhirschfeld
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-zig:
    name: Publish Zig metadata
    # ~keep Depends on build-c-ffi so the per-target FFI artifacts are available for
    # ~keep multi-platform-ffi-dir bundling into the published Zig tarball.
    needs: [prepare, build-c-ffi]
    # ~keep No zig_exists gate: Zig has no central registry, so the check-registries
    # ~keep "exists" probe is a GitHub-release-tag lookup that is always true here.
    # ~keep publish-zig is idempotent (update-existing), so it runs on every fresh tag.
    if: ${{ !cancelled() && needs.prepare.outputs.release_zig == 'true' && needs.build-c-ffi.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - name: Download per-target C FFI artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: c-ffi-*
          path: dist/c-ffi-downloaded
          merge-multiple: false
      - name: Lay out FFI artifacts for multi-platform Zig bundle
        shell: bash
        run: |
          set -euo pipefail
          # ~keep spikard c-ffi tarballs are spikard-c-ffi-<version>-<platform>.tar.gz,
          # ~keep each containing <stage>/lib/* and <stage>/include/*.h where <stage> is
          # ~keep spikard-ffi-<platform>. Derive the platform from the stage dir (the
          # ~keep platform label itself contains a dash) and map it to the zig RID layout.
          declare -A RID_FOR=(
            ["linux-x86_64"]="linux-x64"
            ["linux-aarch64"]="linux-arm64"
            ["macos-arm64"]="osx-arm64"
            ["windows-x86_64"]="win-x64"
          )
          out="ffi-artifacts"
          mkdir -p "$out/include"
          for art in dist/c-ffi-downloaded/*/spikard-c-ffi-*.tar.gz; do
            [ -f "$art" ] || continue
            tmp="$(mktemp -d)"
            tar -xzf "$art" -C "$tmp"
            stage_root="$(find "$tmp" -maxdepth 1 -mindepth 1 -type d | head -1)"
            platform="$(basename "$stage_root")"
            platform="${platform#spikard-ffi-}"
            rid="${RID_FOR[$platform]:-}"
            if [ -z "$rid" ]; then
              echo "::warning::Unknown C FFI platform '$platform' — skipping"
              rm -rf "$tmp"; continue
            fi
            mkdir -p "$out/$rid"
            cp "$stage_root"/lib/* "$out/$rid/"
            cp "$stage_root"/include/*.h "$out/include/" 2>/dev/null || true
            rm -rf "$tmp"
          done
          ls -la "$out"
          for d in "$out"/*/; do echo "--- $d ---"; ls -la "$d"; done
      - uses: xberg-io/actions/publish-zig@v1
        with:
          working-directory: packages/zig
          tag: ${{ needs.prepare.outputs.tag }}
          zig-version: "0.16.0"
          package-name: spikard-zig
          multi-platform-ffi-dir: ffi-artifacts
          module-name: spikard
          ffi-lib-name: spikard_ffi
          update-release-notes: "true"
          update-existing: "true"
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  check-homebrew:
    name: Check Homebrew tap for formula
    needs: [prepare]
    if: ${{ needs.prepare.outputs.release_homebrew == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: xberg-io/actions/check-registry@v1
        id: check
        with:
          registry: homebrew
          package: spikard
          version: ${{ needs.prepare.outputs.version }}
          tap-repo: Goldziher/homebrew-tap

  publish-homebrew-formula:
    name: Update Homebrew formula
    needs: [prepare, check-homebrew, publish-crates]
    if: |
      always() &&
      needs.prepare.outputs.release_homebrew == 'true' &&
      needs.prepare.outputs.dry_run != 'true' &&
      (needs.check-homebrew.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') &&
      needs.publish-crates.result != 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: Goldziher/homebrew-tap
          token: ${{ secrets.HOMEBREW_TOKEN }}
          path: homebrew-tap

      - name: Update formula files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          # ~keep Pin the formula to the release target commit resolved at run start,
          # ~keep not github.sha: an earlier publish step (Swift Package.swift checksum
          # ~keep commit) can advance the branch mid-run, and a moved revision makes
          # ~keep brew reject the bottle ("<tag> should be <sha>").
          REVISION: ${{ needs.prepare.outputs.target_sha }}
          TAP_DIR: ${{ github.workspace }}/homebrew-tap
        run: scripts/publish/update-homebrew-formula.sh

      - name: Commit and push to tap
        working-directory: homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        run: |
          git config user.name "spikard-bot"
          git config user.email "bot@spikard.dev"
          if git diff --quiet Formula/; then
            echo "No formula changes; skipping commit."
            exit 0
          fi
          git add Formula/spikard.rb
          git commit -m "spikard ${{ needs.prepare.outputs.version }}"
          git push origin HEAD

  homebrew-bottles:
    name: Build Homebrew bottle (${{ matrix.bottle_tag }})
    needs: [prepare, publish-homebrew-formula]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.publish-homebrew-formula.result == 'success'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bottle_tag: arm64_sequoia
            install_brew: false
          - os: ubuntu-latest
            bottle_tag: x86_64_linux
            install_brew: true
          - os: ubuntu-24.04-arm
            bottle_tag: arm64_linux
            install_brew: true
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Install Homebrew (Linux)
        if: ${{ matrix.install_brew }}
        uses: xberg-io/actions/install-homebrew-linux@v1

      - name: Build bottles
        uses: xberg-io/actions/homebrew-build-bottles@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          version: ${{ needs.prepare.outputs.version }}
          # ~keep brew tap name (maps to the Goldziher/homebrew-tap repo); brew adds the homebrew- prefix.
          tap: Goldziher/tap
          formulas: spikard
          out-dir: ${{ github.workspace }}/bottle-json
          github-repo: Goldziher/spikard
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload bottle JSON manifests
        uses: actions/upload-artifact@v7
        with:
          name: homebrew-bottle-json-${{ matrix.bottle_tag }}
          path: ${{ github.workspace }}/bottle-json/*.json
          if-no-files-found: error

  publish-homebrew-bottles:
    name: Merge Homebrew bottle DSL
    needs: [prepare, publish-homebrew-formula, homebrew-bottles]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.publish-homebrew-formula.result == 'success' &&
      needs.homebrew-bottles.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: Goldziher/homebrew-tap
          token: ${{ secrets.HOMEBREW_TOKEN }}
          path: homebrew-tap

      - name: Download all bottle JSON manifests
        uses: actions/download-artifact@v8
        with:
          path: ${{ github.workspace }}/bottle-json
          pattern: homebrew-bottle-json-*
          merge-multiple: true

      - name: Merge bottle DSL into formulas
        uses: xberg-io/actions/homebrew-merge-bottles@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          version: ${{ needs.prepare.outputs.version }}
          tap-dir: ${{ github.workspace }}/homebrew-tap
          json-dir: ${{ github.workspace }}/bottle-json
          formulas: spikard
          github-repo: Goldziher/spikard

      - name: Commit and push bottle DSL
        working-directory: homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        run: |
          git config user.name "spikard-bot"
          git config user.email "bot@spikard.dev"
          if git diff --quiet Formula/; then
            echo "No bottle DSL changes; skipping commit."
            exit 0
          fi
          git add Formula/spikard.rb
          git commit -m "spikard ${{ needs.prepare.outputs.version }}: add bottle DSL"
          git push origin HEAD

  swift-artifactbundle:
    name: Build Swift artifact bundle
    needs: prepare
    if: ${{ needs.prepare.outputs.release_swift == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
      - uses: xberg-io/actions/build-swift-artifactbundle@v1
        id: bundle
        with:
          crate-name: spikard-swift
          artifact-name: Spikard-rs
          include-macos-x86_64: "false"
          include-ios-x86_64: "false"
      - uses: actions/upload-artifact@v7
        with:
          name: swift-artifactbundle
          path: ${{ steps.bundle.outputs.bundle-zip }}
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v7
        with:
          name: swift-checksum
          path: ${{ steps.bundle.outputs.checksum-file }}
          if-no-files-found: error
          retention-days: 14

  swift-package:
    name: Build Swift package
    needs: prepare
    if: ${{ needs.prepare.outputs.release_swift == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
      - uses: xberg-io/actions/build-swift-package@v1
        with:
          package-dir: packages/swift
          crate-name: spikard-swift
      - uses: actions/upload-artifact@v7
        with:
          name: swift-package
          path: packages/swift
          retention-days: 14

  update-swift-package-manifest:
    name: Update Swift Package.swift manifest with version and checksum
    needs: [prepare, swift-artifactbundle]
    if: ${{ needs.prepare.outputs.release_swift == 'true' && needs.prepare.outputs.is_tag == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      - uses: actions/download-artifact@v8
        with:
          name: swift-checksum
          path: swift-checksums
      - name: Update Package.swift with version and checksum
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          CHECKSUM=$(cat swift-checksums/*.checksum | tr -d '[:space:]')
          sed -i "s/__ALEF_SWIFT_VERSION__/${VERSION}/g" Package.swift
          sed -i "s/__ALEF_SWIFT_CHECKSUM__/${CHECKSUM}/g" Package.swift
          echo "Updated Package.swift:"
          head -40 Package.swift
      - name: Commit and push Package.swift
        run: |
          git config user.name "spikard-bot"
          git config user.email "bot@spikard.dev"
          git add Package.swift
          git commit -m "chore(swift): update Package.swift with checksum for v${{ needs.prepare.outputs.version }}"
          git tag -f "${{ needs.prepare.outputs.tag }}"
          git push origin -f "refs/tags/${{ needs.prepare.outputs.tag }}"
          # ~keep Also publish the checksummed commit to a release/swift/<version> branch. The
          # ~keep alef-generated Swift e2e/test-app pins `branch: "release/swift/<version>"`, so this
          # ~keep ref must exist for SwiftPM to resolve the package with the substituted checksum.
          git push origin -f "HEAD:refs/heads/release/swift/${{ needs.prepare.outputs.version }}"

  upload-swift-bundle:
    name: Upload Swift artifact bundle to GitHub Release
    needs: [prepare, swift-artifactbundle]
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.dry_run != 'true' && needs.swift-artifactbundle.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: swift-artifactbundle
          path: dist/swift-bundle
      - uses: xberg-io/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/swift-bundle
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          token: ${{ secrets.GITHUB_TOKEN }}
          assets: "*.zip"
          clobber: ${{ needs.prepare.outputs.force_republish }}

  upload-php-pie-release:
    name: Upload PHP PIE archives to GitHub Release
    needs: [prepare, build-php]
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.dry_run != 'true' && needs.build-php.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: php-package-*
          path: dist/php-package
          merge-multiple: true
      - uses: xberg-io/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/php-package
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          clobber: ${{ needs.prepare.outputs.force_republish }}
          token: ${{ secrets.GITHUB_TOKEN }}
          assets: |
            php_*.tgz
            php_*.tgz.sha256
            php_*.zip
            php_*.zip.sha256

  build-go-ffi:
    name: Build Go FFI library (${{ matrix.platform }})
    needs: prepare
    if: ${{ needs.prepare.outputs.release_go == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, platform: linux-x86_64, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, platform: linux-aarch64, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest, platform: macos-arm64, target: aarch64-apple-darwin }
          - { os: windows-latest, platform: windows-x86_64, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
          target: ${{ matrix.target }}
      - name: Setup Zig for glibc 2.28 floor
        if: contains(matrix.target, '-linux-gnu')
        uses: xberg-io/actions/setup-zig@v1
      - name: Install cargo-zigbuild for glibc 2.28 floor
        if: contains(matrix.target, '-linux-gnu')
        shell: bash
        run: command -v cargo-zigbuild || cargo install --locked cargo-zigbuild
      - uses: xberg-io/actions/build-go-ffi@v1
        with:
          target: ${{ matrix.target }}
          crate-name: spikard-ffi
          lib-name: spikard_ffi
          header-path: crates/spikard-ffi/include/spikard.h
          archive-name: spikard-go-ffi-${{ needs.prepare.outputs.version }}-${{ matrix.platform }}.tar.gz
          output-dir: dist/go
          glibc-version: ${{ contains(matrix.target, '-linux-gnu') && '2.28' || '' }}
      - uses: actions/upload-artifact@v7
        with:
          name: go-ffi-${{ matrix.platform }}
          path: dist/go/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  build-c-ffi:
    name: Build C FFI distribution (${{ matrix.platform }})
    needs: prepare
    if: ${{ needs.prepare.outputs.release_c_ffi == 'true' || needs.prepare.outputs.release_zig == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, platform: linux-x86_64, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, platform: linux-aarch64, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest, platform: macos-arm64, target: aarch64-apple-darwin }
          - { os: windows-latest, platform: windows-x86_64, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
          target: ${{ matrix.target }}
      - name: Setup Zig for glibc 2.28 floor
        if: contains(matrix.target, '-linux-gnu')
        uses: xberg-io/actions/setup-zig@v1
      - name: Install cargo-zigbuild for glibc 2.28 floor
        if: contains(matrix.target, '-linux-gnu')
        shell: bash
        run: command -v cargo-zigbuild || cargo install --locked cargo-zigbuild
      - uses: xberg-io/actions/build-rust-ffi@v1
        with:
          crate-name: spikard-ffi
          target: ${{ matrix.target }}
          glibc-version: ${{ contains(matrix.target, '-linux-gnu') && '2.28' || '' }}
      - name: Stage C FFI distribution
        env:
          TARGET: ${{ matrix.target }}
          PLATFORM: ${{ matrix.platform }}
        shell: bash
        run: |
          set -euo pipefail
          STAGE="spikard-ffi-${PLATFORM}"
          mkdir -p "$STAGE/lib" "$STAGE/include"
          find "target/${TARGET}/release" -maxdepth 1 -type f \
            \( -name 'libspikard_ffi.*' -o -name 'spikard_ffi.dll' \) \
            -exec cp {} "$STAGE/lib/" \;
          cp crates/spikard-ffi/include/spikard.h "$STAGE/include/"
          cp LICENSE "$STAGE/" 2>/dev/null || true
          mkdir -p dist/c-ffi
          tar -czf "dist/c-ffi/spikard-c-ffi-${{ needs.prepare.outputs.version }}-${PLATFORM}.tar.gz" "$STAGE"
      - uses: actions/upload-artifact@v7
        with:
          name: c-ffi-${{ matrix.platform }}
          path: dist/c-ffi/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  build-java-natives:
    name: Build Java natives (${{ matrix.classifier }})
    needs: prepare
    if: ${{ needs.prepare.outputs.release_java == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, classifier: linux-x86_64, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, classifier: linux-aarch64, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest, classifier: macos-arm64, target: aarch64-apple-darwin }
          - { os: windows-latest, classifier: windows-x86_64, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
          target: ${{ matrix.target }}
      - name: Setup Zig for glibc 2.28 floor
        if: contains(matrix.target, '-linux-gnu')
        uses: xberg-io/actions/setup-zig@v1
      - name: Install cargo-zigbuild for glibc 2.28 floor
        if: contains(matrix.target, '-linux-gnu')
        shell: bash
        run: command -v cargo-zigbuild || cargo install --locked cargo-zigbuild
      - uses: xberg-io/actions/build-java-natives@v1
        with:
          target: ${{ matrix.target }}
          crate-name: spikard-ffi
          lib-name: spikard_ffi
          classifier: ${{ matrix.classifier }}
          glibc-version: ${{ contains(matrix.target, '-linux-gnu') && '2.28' || '' }}
      - uses: actions/upload-artifact@v7
        with:
          name: java-natives-${{ matrix.classifier }}
          path: dist/java-natives
          if-no-files-found: error
          retention-days: 14

  build-csharp-natives:
    name: Build C# natives (${{ matrix.rid }})
    needs: prepare
    if: ${{ needs.prepare.outputs.release_csharp == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, rid: linux-x64, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, rid: linux-arm64, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest, rid: osx-arm64, target: aarch64-apple-darwin }
          - { os: windows-latest, rid: win-x64, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
          target: ${{ matrix.target }}
      - name: Setup Zig for glibc 2.28 floor
        if: contains(matrix.target, '-linux-gnu')
        uses: xberg-io/actions/setup-zig@v1
      - name: Install cargo-zigbuild for glibc 2.28 floor
        if: contains(matrix.target, '-linux-gnu')
        shell: bash
        run: command -v cargo-zigbuild || cargo install --locked cargo-zigbuild
      - uses: xberg-io/actions/build-csharp-natives@v1
        with:
          target: ${{ matrix.target }}
          crate-name: spikard-ffi
          lib-name: spikard_ffi
          rid: ${{ matrix.rid }}
          glibc-version: ${{ contains(matrix.target, '-linux-gnu') && '2.28' || '' }}
      - uses: actions/upload-artifact@v7
        with:
          name: csharp-natives-${{ matrix.rid }}
          path: dist/csharp-natives
          if-no-files-found: error
          retention-days: 14

  dart-server-natives:
    name: Build Dart server native (${{ matrix.rid }})
    needs: [prepare, check-registries]
    if: ${{ needs.prepare.outputs.release_dart == 'true' && (needs.check-registries.outputs.pub_exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, rid: linux-x64, lib: libspikard_dart.so }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, rid: linux-arm64, lib: libspikard_dart.so }
          - { os: macos-latest, target: aarch64-apple-darwin, rid: macos-arm64, lib: libspikard_dart.dylib }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, rid: windows-x64, lib: spikard_dart.dll }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
          target: ${{ matrix.target }}
      - name: Build Dart server native
        shell: bash
        run: cargo build --locked --manifest-path packages/dart/rust/Cargo.toml --release --target "${{ matrix.target }}"
      - name: Stage native library
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          LIB: ${{ matrix.lib }}
        run: |
          set -euo pipefail
          mkdir -p dist/server-natives
          cp "packages/dart/rust/target/${TARGET}/release/${LIB}" "dist/server-natives/${LIB}"
      - uses: actions/upload-artifact@v7
        with:
          name: dart-server-${{ matrix.rid }}
          path: dist/server-natives
          if-no-files-found: error
          retention-days: 14

  dart-package:
    name: Build Dart package
    needs: [prepare, check-registries]
    if: ${{ needs.prepare.outputs.release_dart == 'true' && (needs.check-registries.outputs.pub_exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
      - uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
      - uses: dart-lang/setup-dart@v1
      - uses: xberg-io/actions/build-dart-package@v1
        with:
          package-dir: packages/dart/rust
          crate-name: spikard-dart
          # ~keep spikard-dart is a pure-Dart package (no Flutter SDK dep). Skip the
          # ~keep Flutter install so FRB codegen uses setup-dart's latest stable Dart;
          # ~keep Flutter 3.27's bundled Dart 3.6 fails the pubspec's `sdk: >=3.11.0`.
          setup-flutter: "false"
      - uses: actions/upload-artifact@v7
        with:
          name: dart-package
          path: packages/dart
          retention-days: 14

  assemble-dart-bundle:
    name: Assemble Dart package with native artifacts
    needs: [prepare, dart-package, dart-server-natives, check-registries]
    if: ${{ needs.prepare.outputs.release_dart == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-registries.outputs.pub_exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dart-package
          path: packages/dart
      - uses: actions/download-artifact@v8
        with:
          name: dart-server-linux-x64
          path: dart-server-artifacts/linux-x64
      - uses: actions/download-artifact@v8
        with:
          name: dart-server-linux-arm64
          path: dart-server-artifacts/linux-arm64
      - uses: actions/download-artifact@v8
        with:
          name: dart-server-macos-arm64
          path: dart-server-artifacts/macos-arm64
      - uses: actions/download-artifact@v8
        with:
          name: dart-server-windows-x64
          path: dart-server-artifacts/windows-x64
      - name: Stage native libraries into Dart package
        shell: bash
        run: |
          set -euo pipefail
          # ~keep spikard's FRB loader (frb_generated.dart::_alefResolveExternalLibrary)
          # ~keep resolves natives from lib/src/native/<rid>/ with Dart x64/arm64 naming.
          for entry in \
            "linux-x64:libspikard_dart.so" \
            "linux-arm64:libspikard_dart.so" \
            "macos-arm64:libspikard_dart.dylib" \
            "windows-x64:spikard_dart.dll"; do
            rid="${entry%%:*}"
            lib="${entry##*:}"
            dest="packages/dart/lib/src/native/${rid}"
            mkdir -p "$dest"
            src="dart-server-artifacts/${rid}/${lib}"
            if [ -f "$src" ]; then
              cp -v "$src" "$dest/"
            else
              echo "::error::missing native $src" && exit 1
            fi
          done
          echo "Staged natives:"
          find packages/dart/lib/src/native -type f
      - uses: actions/upload-artifact@v7
        with:
          name: dart-package-assembled
          path: packages/dart
          retention-days: 7

  trigger-pubdev:
    name: Trigger pub.dev publish workflow
    needs: [prepare, check-registries, assemble-dart-bundle]
    if: ${{ needs.prepare.outputs.release_dart == 'true' && needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.dry_run != 'true' && (needs.check-registries.outputs.pub_exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch publish-pubdev workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh workflow run publish-pubdev.yaml \
            --ref ${{ github.ref_name }} \
            -f run_id=${{ github.run_id }}

  finalize:
    name: Finalize release
    needs:
      - prepare
      - upload-release-assets
      - publish-crates
      - publish-pypi
      - publish-node
      - publish-wasm
      - publish-rubygems
      - publish-packagist
      - publish-hex
      - publish-maven
      - publish-kotlin
      - publish-nuget
      - publish-zig
      - publish-homebrew-bottles
      - update-swift-package-manifest
      - upload-swift-bundle
      - upload-php-pie-release
    if: ${{ always() && needs.prepare.outputs.is_tag == 'true' && !contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - uses: xberg-io/actions/finalize-release@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          is-prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          go-module-path: github.com/Goldziher/spikard
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          token: ${{ secrets.GITHUB_TOKEN }}
