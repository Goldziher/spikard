name: Dart

on:
  workflow_dispatch:
  # Dart bindings are alef-experimental — flutter_rust_bridge may produce
  # broken codegen for some types. Re-enable on push/PR once alef-backend-dart
  # stabilizes against spikard's surface.

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/dart
    steps:
      - uses: actions/checkout@v4
      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Get Dart dependencies
        run: dart pub get
      - name: Analyze Dart code
        run: dart analyze
      - name: Run tests
        run: dart test
