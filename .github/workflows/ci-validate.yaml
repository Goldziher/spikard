name: CI Validate

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.cargo/config.toml'
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'packages/python/**'
      - 'tools/**'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - 'packages/node/**'
      - 'crates/spikard-node/src/**'
      - '**/*.rb'
      - 'Gemfile*'
      - 'packages/ruby/**'
      - '**/*.php'
      - 'composer.json'
      - 'composer.lock'
      - 'packages/php/**'
      - 'packages/elixir/**'
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'Taskfile.yaml'
      - 'scripts/**'
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/workflows/ci-validate.yaml'
      - 'alef.toml'
      - 'crates/spikard*/src/**/*.rs'
      - 'crates/spikard-py/src/**'
      - 'crates/spikard-node/src/**'
      - 'crates/spikard-rb/src/**'
      - 'crates/spikard-php/src/**'
      - 'crates/spikard-elixir/src/**'
  pull_request:
    branches: [main]
    paths:
      - 'crates/**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.cargo/config.toml'
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'packages/python/**'
      - 'tools/**'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - 'packages/node/**'
      - 'crates/spikard-node/src/**'
      - '**/*.rb'
      - 'Gemfile*'
      - 'packages/ruby/**'
      - '**/*.php'
      - 'composer.json'
      - 'composer.lock'
      - 'packages/php/**'
      - 'packages/elixir/**'
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'Taskfile.yaml'
      - 'scripts/**'
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/workflows/ci-validate.yaml'
      - 'alef.toml'
      - 'crates/spikard*/src/**/*.rs'
      - 'crates/spikard-py/src/**'
      - 'crates/spikard-node/src/**'
      - 'crates/spikard-rb/src/**'
      - 'crates/spikard-php/src/**'
      - 'crates/spikard-elixir/src/**'
concurrency:
  group: ci-spikard-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUST_BACKTRACE: short
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0

defaults:
  run:
    shell: bash

jobs:
  lint-rust:
    name: Lint Rust
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: lint-rust

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: Check licenses
        run: cargo deny check licenses

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.13"
          cache-prefix: lint-python

      - name: Check Ruff linting
        run: uv run ruff check .

      - name: Check Ruff formatting
        run: uv run ruff format --check .

      - name: Run mypy type checking
        run: uv run mypy tools packages/python

  lint-typescript:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: ./.github/actions/setup-node-workspace
        with:
          node-version: "24"

      - name: Run Biome check
        run: pnpm biome check packages/node/src crates/spikard-node/src e2e/node --log-level=warn

      - name: Run oxlint
        run: pnpm oxlint packages/node/src crates/spikard-node/src e2e/node

  lint-ruby:
    name: Lint Ruby
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler: "4.0.0"
          bundler-cache: false
          working-directory: packages/ruby

      - name: Install dependencies
        working-directory: packages/ruby
        run: |
          bundle config set frozen true
          bundle install

      - name: Run Rubocop
        working-directory: packages/ruby
        run: bundle exec rubocop

      - name: Run Steep typecheck
        working-directory: packages/ruby
        run: bundle exec steep check

  lint-php:
    name: Lint PHP
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup LLVM/Clang (for bindgen)
        uses: ./.github/actions/setup-llvm-clang

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer
          coverage: none

      - name: Setup Composer Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.composer/cache
            packages/php/vendor
          key: ${{ runner.os }}-composer-8.4-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-8.4-

      - name: Install PHP dependencies
        working-directory: packages/php
        run: composer install --no-interaction --no-progress

      - name: Run PHPStan
        working-directory: packages/php
        run: composer run lint

  validate-doc-snippets:
    name: Validate Docs Snippets
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: docs-snippets

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup Node
        uses: ./.github/actions/setup-node-workspace
        with:
          node-version: "24"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Setup Elixir and OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Validate documentation snippets
        run: cargo run --package snippet-runner -- validate --snippets docs --level syntax

  check-version-sync:
    name: Check Version Sync
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          use-sccache: 'false'

      - name: Install alef
        uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall --no-confirm --locked alef-cli

      - name: Verify synchronized package versions
        run: |
          alef sync-versions
          git diff --exit-code

  alef-verify:
    name: Alef Verify Bindings
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: alef-verify
          # alef verify only needs to run the generator, not compile the workspace
          use-sccache: 'false'

      - name: Cache alef binary
        id: cache-alef
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/alef
          key: alef-bin-${{ runner.os }}-${{ hashFiles('alef.toml') }}

      - name: Install cargo-binstall
        if: steps.cache-alef.outputs.cache-hit != 'true'
        uses: cargo-bins/cargo-binstall@main

      - name: Install alef via binstall
        if: steps.cache-alef.outputs.cache-hit != 'true'
        # alef-cli is published to crates.io and distributes pre-built binaries
        # from https://github.com/kreuzberg-dev/alef/releases via cargo-binstall.
        # If the release binary is unavailable (e.g. a new platform), binstall falls
        # back to compiling from source automatically.
        run: cargo binstall --no-confirm --locked alef-cli

      - name: Verify alef installation
        run: alef --version

      - name: Run alef verify
        run: alef verify

      - name: Fail if bindings are stale
        run: |
          if ! git diff --exit-code; then
            echo "alef verify produced uncommitted changes — run 'task alef:generate' locally and commit the result."
            exit 1
          fi
