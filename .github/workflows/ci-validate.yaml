name: CI Validate

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/**"
      - "poly.toml"
      - ".task/**"
      - ".ai-rulez/**"
      - "alef.toml"
      - "Taskfile.yaml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - "uv.lock"
      - "package.json"
      - "pnpm-lock.yaml"
      - "biome.json"
  pull_request:
    branches: [main]
    paths:
      - ".github/**"
      - "poly.toml"
      - ".task/**"
      - ".ai-rulez/**"
      - "alef.toml"
      - "Taskfile.yaml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - "uv.lock"
      - "package.json"
      - "pnpm-lock.yaml"
      - "biome.json"

concurrency:
  group: ci-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  BUILD_PROFILE: ci
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  validate:
    name: Validate generated files and workflow syntax
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: xberg-io/actions/setup-python-env@v1
        with:
          python-version: "3.14"

      - name: Setup Rust
        uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
          cache-key-prefix: validate
          use-sccache: "true"

      - name: Setup Node
        uses: xberg-io/actions/setup-node-workspace@v1
        with:
          node-version: "24"

      - name: Install Alef
        uses: xberg-io/actions/install-alef@v1

      - name: Install Task
        uses: xberg-io/actions/install-task@v1

      - name: Verify Alef output
        run: task alef:verify

      - name: Check Taskfile surface
        run: task --list

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-check
          fail_level: error

      - name: Install poly
        uses: Goldziher/polylint@v0

      - name: Lint (poly)
        run: task lint:check
