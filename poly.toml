[discovery]
exclude = [
    "**/*.freezed.dart",
    "**/*.g.dart",
    "**/*.jinja",
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    ".alef/**",
    "artifacts/**",
    "dist/**",
    "docs/assets/**",
    "docs/snippets/**",
    "fixtures/**",
    "node_modules/**",
    "readme_templates/**",
    "target/**",
    "templates/readme/**",
    "test_documents/**",
    "vendor/**",
    "**/Cargo.toml",
    "crates/spikard-ffi/include/spikard.h",
    "crates/spikard-node/service_http_additions.ts",
    "packages/go/include/spikard.h",
]

[lint.markdown.rumdl]
disable = ["MD012", "MD013", "MD024", "MD033", "MD036", "MD041", "MD046", "MD051", "MD076"]

[fmt.markdown.rumdl]
disable = ["MD012", "MD013", "MD024", "MD033", "MD036", "MD041", "MD046", "MD051", "MD076"]

[lint.python.ruff]
select = ["ALL"]
ignore = [
    "ANN401",
    "ASYNC109",
    "ASYNC110",
    "BLE001",
    "COM812",
    "D100",
    "D104",
    "D107",
    "D205",
    "E501",
    "EM",
    "FBT",
    "FIX",
    "ISC001",
    "PD011",
    "PGH003",
    "PLR2004",
    "PLW0603",
    "S104",
    "S110",
    "S603",
    "TD",
    "TRY",
]
mccabe_max_complexity = 15
pydocstyle_convention = "google"
pylint_max_args = 10
pylint_max_branches = 15
pylint_max_returns = 10

[lint.php.mago]
select = ["correctness", "security"]
ignore = ["strict-assertions", "use-specific-assertions", "no-redundant-variable", "sensitive-parameter"]
php_version = "8.2"

[lint.typos.extend_words]
Caf = "Caf"
Enumerables = "Enumerables"
FO = "FO"
Fo = "Fo"
Hte = "Hte"
Iz = "Iz"
Jod = "Jod"
ND = "ND"
Parm = "Parm"
Tre = "Tre"
Ue = "Ue"
Userr = "Userr"
bre = "bre"
caf = "caf"
enumerables = "enumerables"
fo = "fo"
fre = "fre"
hte = "hte"
lsit = "lsit"
nam = "nam"
ser = "ser"
tre = "tre"
ure = "ure"
wre = "wre"

[lint.uncomment]
enabled = true
remove_todos = false
remove_fixme = false
remove_docs = false
use_default_ignores = true
preserve_patterns = ["SAFETY", "HACK", "WORKAROUND", "NOTE"]

