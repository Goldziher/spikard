    "packages/dart/rust/src/frb_generated.rs",
    "packages/csharp/src/**",
    "packages/dart/lib/src/spikard_bridge_generated/**",
    "packages/dart/pubspec.yaml",
    "packages/go/include/**",
    "packages/go/service.go",
    "packages/java/*.xml",
    "packages/java/pom.xml",
    "packages/java/src/**",
    "packages/kotlin/build.gradle.kts",
    "packages/kotlin-android/src/main/kotlin/dev/spikard/android/src/main/**",
    "packages/node/@spikard/node/service.ts",
    "packages/php/spikard/Service.php",
    "packages/php/src/**",
    "packages/php/stubs/**",
    "packages/python/pyproject.toml",
    "packages/python/spikard/**",
    "packages/ruby/lib/spikard/native.rb",
    "packages/ruby/lib/spikard/service.rb",
    "packages/ruby/lib/spikard/service_http_additions.rb",
    "packages/ruby/sig/**",
    "packages/swift/Sources/**",
    "packages/zig/src/**",
]

[lint.markdown.rumdl]
disable = ["MD012", "MD013", "MD024", "MD033", "MD036", "MD041", "MD046", "MD051", "MD076"]

[fmt.markdown.rumdl]
disable = ["MD012", "MD013", "MD024", "MD033", "MD036", "MD041", "MD046", "MD051", "MD076"]

[lint.python.ruff]
select = ["ALL"]
ignore = [
    "ANN401",
    "ASYNC109",
    "ASYNC110",
    "BLE001",
    "COM812",
    "D100",
    "D104",
    "D107",
    "D205",
    "E501",
    "EM",
    "FBT",
    "FIX",
    "ISC001",
    "PD011",
    "PGH003",
    "PLR2004",
    "PLW0603",
    "S104",
    "S110",
    "S603",
    "TD",
    "TRY",
]
mccabe_max_complexity = 15
pydocstyle_convention = "google"
pylint_max_args = 10
pylint_max_branches = 15
pylint_max_returns = 10

[lint.php.mago]
select = ["correctness", "security"]
ignore = ["strict-assertions", "use-specific-assertions", "no-redundant-variable", "sensitive-parameter"]
php_version = "8.2"

