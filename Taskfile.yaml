version: "3"

# ============================================================================
# spikard — Root Taskfile
# ============================================================================
# Primary development interface. Rust core tasks delegate to .task/languages/rust.yml.
# Most binding language operations (setup, build, test, lint, format, clean,
# update, upgrade, publish) are handled by alef.
#
# Common entry points:
#   task setup          -> install all dependencies (rust + alef setup + prek)
#   task build          -> build core + bindings (debug)
#   task build:release  -> build core + bindings (release)
#   task test           -> run all tests (rust + alef test)
#   task test:e2e       -> generate + run e2e tests for all bindings
#   task test:cov       -> tests with coverage
#   task format         -> format all code (cargo fmt + alef fmt)
#   task lint           -> run prek (full pre-commit chain)
#   task update         -> compatible dependency updates everywhere
#   task upgrade        -> aggressive upgrades
#   task clean          -> remove all build artifacts
#   task publish:*      -> alef publish validate/prepare/build/package
#   task rust:*         -> Rust-specific tasks (.task/languages/rust.yml)
#   task version:*      -> version sync via alef (.task/tools/version-sync.yml)
# ============================================================================

includes:
  rust:
    taskfile: ./.task/languages/rust.yml
  version:
    taskfile: ./.task/tools/version-sync.yml
  _tools:
    taskfile: ./.task/tools/general.yml
    flatten: true

env:
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: plain

silent: false

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task --list

  # === Setup ===
  setup:
    desc: "Install all dependencies and setup development environment"
    cmds:
      - task: rust:install
      - alef setup
      - task: pre-commit:install

  # === Build ===
  build:
    desc: "Build core Rust library and all language bindings (debug)"
    cmds:
      - task: rust:build:dev
      - alef build

  build:release:
    desc: "Build core Rust library and all language bindings (release)"
    cmds:
      - task: rust:build:release
      - alef build --release

  build:ci:
    desc: "Build all in CI mode"
    cmds:
      - task: rust:build:ci

  build:core:
    desc: "Build Rust core library only"
    cmds:
      - task: rust:build

  build:bindings:
    desc: "Build all language bindings (skip Rust core)"
    cmds:
      - alef build

  build:cli:
    desc: "Build the spikard CLI binary"
    cmds:
      - task: rust:cli:build

  build:http:
    desc: "Build HTTP server binary"
    cmds:
      - cargo build --release --package spikard-http

  # === Test ===
  test:
    desc: "Run all test suites (Rust core + bindings)"
    cmds:
      - task: rust:test
      - alef test

  test:bindings:
    desc: "Run binding test suites only (skip Rust core)"
    cmds:
      - alef test

  test:e2e:
    desc: "Generate and run e2e tests across all bindings"
    cmds:
      - alef e2e generate
      - alef test --e2e

  test:cov:
    desc: "Run all tests with coverage"
    cmds:
      - task: rust:test:ci
      - alef test --coverage

  test:ci:
    desc: "Run all tests with coverage (CI mode, alias for test:cov)"
    cmds:
      - task: test:cov

  # === Lint & Format ===
  lint:
    desc: "Lint all code via prek (pre-commit framework)"
    cmds:
      - prek run --all-files

  lint:check:
    desc: "Lint all code WITHOUT auto-fix (Rust + bindings)"
    cmds:
      - task: rust:lint:check
      - alef lint

  format:
    desc: "Format all code (Rust + all bindings)"
    cmds:
      - cargo fmt --all
      - alef fmt

  fmt:
    desc: "Format all code (alias for format)"
    cmds:
      - task: format

  format:check:
    desc: "Check code formatting without modifications"
    cmds:
      - task: rust:format:check

  check:
    desc: "Run all checks (format + lint, no modifications)"
    cmds:
      - task: format:check
      - task: lint:check

  # === Update / Upgrade ===
  update:
    desc: "Update dependencies (compatible only)"
    cmds:
      - task: rust:update
      - alef update
      - prek autoupdate

  upgrade:
    desc: "Upgrade dependencies aggressively (cargo upgrade --incompatible, pnpm up --latest, uv sync --upgrade, etc.)"
    cmds:
      - rustup update stable
      - task: rust:upgrade
      - alef update --latest
      - prek autoupdate

  # === Coverage ===
  cov:rust:
    desc: "Generate Rust coverage report"
    cmds:
      - task: rust:test:ci

  cov:all:
    desc: "Generate coverage for all languages"
    cmds:
      - task: rust:test:ci
      - alef test --coverage

  verify:coverage:
    desc: "Verify code coverage thresholds across all language bindings"
    cmds:
      - python3 scripts/verify_coverage.py

  # === Version ===
  versions:sync:
    desc: "Synchronize version from Cargo.toml to all package manifests"
    cmds:
      - task: version:sync

  # === Alef lifecycle ===
  alef:generate:
    desc: "Run full alef pipeline (generate + stubs + scaffold + readme + docs + e2e)"
    cmds:
      - alef all --clean

  alef:verify:
    desc: "Check bindings are up-to-date (CI mode)"
    cmds:
      - alef verify --exit-code

  alef:build:
    desc: "Build all language bindings"
    cmds:
      - alef build

  alef:sync:
    desc: "Sync version from Cargo.toml to all manifests"
    cmds:
      - alef sync-versions

  alef:docs:
    desc: "Generate API reference documentation"
    cmds:
      - alef docs

  alef:extract:
    desc: "Extract API surface from Rust source"
    cmds:
      - alef extract

  alef:scaffold:
    desc: "Generate package scaffolding (Cargo.toml, pyproject.toml, etc.)"
    cmds:
      - alef scaffold

  # === E2E tests ===
  e2e:generate:
    desc: "Generate E2E tests for all languages from fixtures"
    cmds:
      - alef e2e generate

  e2e:test:
    desc: "Run E2E tests for all languages (alias for test:e2e)"
    cmds:
      - task: test:e2e

  verify:tests:
    desc: "Verify generated e2e tests are up to date"
    cmds:
      - alef e2e generate
      - git diff --exit-code e2e/

  # === Publish ===
  publish:validate:
    desc: "Validate publish manifests are consistent"
    cmds:
      - alef publish validate

  publish:prepare:
    desc: "Prepare packages for publishing (vendor deps, stage FFI)"
    cmds:
      - alef publish prepare

  publish:build:
    desc: "Build release artifacts for all languages"
    cmds:
      - alef publish build

  publish:package:
    desc: "Package built artifacts into distributable archives"
    cmds:
      - alef publish package -o dist/

  # === PHP release (kept; no alef equivalent) ===
  release:php:dry-run:
    desc: "Test PHP release workflow without publishing (dry-run)"
    cmds:
      - echo "Triggering dry-run release for PHP bindings..."
      - gh workflow run release-php.yml --ref {{.REF}} -f tag={{.TAG}} -f dry_run=true
    vars:
      TAG: '{{.TAG | default "v0.1.3-test"}}'
      REF: '{{.REF | default "main"}}'
    preconditions:
      - sh: command -v gh
        msg: "GitHub CLI (gh) is required for release workflows"

  release:php:
    desc: "Trigger PHP release workflow (requires git tag)"
    cmds:
      - ./scripts/php/trigger-release.sh "{{.TAG}}"
    preconditions:
      - sh: command -v gh
        msg: "GitHub CLI (gh) is required for release workflows"

  # === Per-language lint/format/test (delegate to alef where possible) ===
  go:lint:
    desc: "Lint Go binding with golangci-lint"
    cmds:
      - golangci-lint run ./...
    dir: packages/go

  ruby:format:
    desc: "Format Ruby binding with rubocop"
    cmds:
      - bundle exec rubocop --autocorrect-all
    dir: packages/ruby

  ruby:lint:
    desc: "Lint Ruby binding with rubocop and steep"
    cmds:
      - bundle exec rubocop
      - bundle exec steep check
    dir: packages/ruby

  php:format:
    desc: "Format PHP binding with php-cs-fixer"
    cmds:
      - composer -d packages/php run format

  php:lint:
    desc: "Lint PHP binding (phpstan + php-cs-fixer)"
    cmds:
      - composer -d packages/php run lint

  csharp:format:
    desc: "Format C# binding with dotnet format"
    cmds:
      - dotnet format
    dir: packages/csharp

  csharp:lint:
    desc: "Lint C# binding with dotnet format --verify-no-changes"
    cmds:
      - dotnet format --verify-no-changes
    dir: packages/csharp

  csharp:build:release:
    desc: "Build the C# binding in Release configuration"
    dir: packages/csharp
    cmds:
      - dotnet build --configuration Release

  csharp:package:
    desc: "Pack the C# binding into a NuGet package"
    dir: packages/csharp
    cmds:
      - dotnet pack --configuration Release {{.CLI_ARGS}}

  java:build:release:
    desc: "Build the Java binding via Maven (mvn package)"
    dir: packages/java
    cmds:
      - mvn -B -DskipTests package

  kotlin:format:
    desc: "Format Kotlin binding with ktlint via gradle"
    cmds:
      - gradle ktlintFormat --no-daemon
    dir: packages/kotlin

  kotlin:lint:
    desc: "Lint Kotlin binding with ktlint via gradle"
    cmds:
      - gradle ktlintCheck --no-daemon
    dir: packages/kotlin

  kotlin:test:
    desc: "Run Kotlin binding tests"
    cmds:
      - cargo build --release -p spikard-ffi
      - gradle test --no-daemon
    dir: packages/kotlin

  dart:format:
    desc: "Format Dart binding with dart format"
    cmds:
      - dart format .
    dir: packages/dart

  dart:lint:
    desc: "Lint Dart binding with dart analyze"
    cmds:
      - dart analyze
    dir: packages/dart

  dart:test:
    desc: "Run Dart binding tests"
    cmds:
      - cargo build --release --manifest-path packages/dart/rust/Cargo.toml
      - dart pub get
      - dart test
    dir: packages/dart

  gleam:format:
    desc: "Format Gleam binding with gleam format"
    cmds:
      - gleam format
    dir: packages/gleam

  gleam:lint:
    desc: "Lint Gleam binding with gleam format --check"
    cmds:
      - gleam format --check
    dir: packages/gleam

  gleam:test:
    desc: "Run Gleam binding tests"
    cmds:
      - cd ../elixir && mix deps.get && mix compile
      - cd ../gleam && gleam test
    dir: packages/gleam

  wasm:build:all:
    desc: "Alias for rust:wasm:build:all (build all WASM targets)"
    deps: [rust:wasm:build:all]

  # === Spikard-specific tasks (preserved; no alef equivalent) ===
  docs:snippets:list:
    desc: "List all discovered documentation snippets"
    cmds:
      - cargo run --package snippet-runner -- list --snippets docs

  docs:snippets:validate:
    desc: "Validate documentation snippets at syntax level"
    cmds:
      - cargo run --package snippet-runner -- validate --snippets docs --level syntax

  docs:build:
    desc: "Build documentation"
    cmds:
      - task: docs:snippets:validate
      - uv run zensical build --clean --strict

  docs:serve:
    desc: "Serve documentation locally"
    cmds:
      - uv run zensical serve

  docs:deploy:
    desc: "Build and deploy documentation"
    cmds:
      - alef docs
      - uv run zensical build --clean --strict

  readme:generate:
    desc: "Generate all README files from templates"
    cmds:
      - alef readme

  readme:validate:
    desc: "Validate that generated READMEs are up to date"
    cmds:
      - alef readme
      - git diff --exit-code

  validate:fixtures:
    desc: "Validate all gRPC streaming fixture files against schema"
    cmds:
      - python3 scripts/validate_fixtures.py

  test:grpc:fixtures:
    desc: "Run gRPC streaming fixture tests across all languages"
    deps:
      - test:grpc:python
      - test:grpc:typescript
      - test:grpc:ruby
      - test:grpc:php

  test:grpc:python:
    desc: "Run Python gRPC streaming fixture tests"
    dir: packages/python
    cmds:
      - uv run pytest tests/test_grpc_fixtures.py -v --cov=spikard --cov-report=term-missing --cov-fail-under=80

  test:grpc:typescript:
    desc: "Run TypeScript gRPC streaming fixture tests"
    dir: packages/node
    cmds:
      - pnpm vitest run tests/grpc_fixtures.spec.ts --coverage

  test:grpc:ruby:
    desc: "Run Ruby gRPC streaming fixture tests"
    dir: packages/ruby
    cmds:
      - bundle exec rspec spec/grpc_fixtures_spec.rb --format documentation

  test:grpc:php:
    desc: "Run PHP gRPC streaming fixture tests"
    dir: packages/php
    cmds:
      - php -d extension=../../target/release/libspikard_php.dylib vendor/bin/phpunit --configuration phpunit.xml --testsuite=grpc_fixtures --coverage-text

  # === OpenAPI client codegen (spikard framework feature) ===
  codegen:python:
    desc: "Generate Python server code from OpenAPI schema"
    deps:
      - build:cli
    cmds:
      - "target/release/spikard generate {{.SCHEMA}} --lang python --output {{.OUTPUT}}"
      - echo "Generated Python code{{.COLON}} {{.OUTPUT}}"
    vars:
      COLON: ":"

  codegen:python:format:
    desc: "Format generated Python code with ruff"
    cmds:
      - uv run ruff format {{.FILE}}
      - uv run ruff check --fix {{.FILE}}

  codegen:python:lint:
    desc: "Lint generated Python code with ruff and mypy"
    cmds:
      - uv run ruff check {{.FILE}}
      - uv run mypy {{.FILE}} --strict --allow-untyped-calls --allow-incomplete-defs

  codegen:python:verify:
    desc: "Generate, format, and validate Python code from OpenAPI schema"
    cmds:
      - task: codegen:python
        vars:
          SCHEMA: "{{.SCHEMA}}"
          OUTPUT: "{{.OUTPUT}}"
      - task: codegen:python:format
        vars:
          FILE: "{{.OUTPUT}}"
      - task: codegen:python:lint
        vars:
          FILE: "{{.OUTPUT}}"
      - echo "Generated Python code validated successfully{{.COLON}} {{.OUTPUT}}"
    vars:
      COLON: ":"

  codegen:typescript:
    desc: "Generate TypeScript server code from OpenAPI schema"
    deps:
      - build:cli
    cmds:
      - "target/release/spikard generate {{.SCHEMA}} --lang type-script --output {{.OUTPUT}}"
      - echo "Generated TypeScript code{{.COLON}} {{.OUTPUT}}"
    vars:
      COLON: ":"

  codegen:typescript:format:
    desc: "Format generated TypeScript code with Biome"
    cmds:
      - cd packages/node && pnpm biome format --write "{{.FILE}}"

  codegen:typescript:lint:
    desc: "Lint generated TypeScript code with oxlint and Biome"
    cmds:
      - cd packages/node && pnpm oxlint "{{.FILE}}"
      - cd packages/node && pnpm biome check "{{.FILE}}"

  codegen:typescript:typecheck:
    desc: "Type check generated TypeScript code with tsc"
    cmds:
      - cd packages/node && pnpm tsc --noEmit "{{.FILE}}"

  codegen:typescript:verify:
    desc: "Generate, format, and validate TypeScript code from OpenAPI schema"
    cmds:
      - task: codegen:typescript
        vars:
          SCHEMA: "{{.SCHEMA}}"
          OUTPUT: "{{.OUTPUT}}"
      - task: codegen:typescript:format
        vars:
          FILE: "{{.OUTPUT}}"
      - task: codegen:typescript:lint
        vars:
          FILE: "{{.OUTPUT}}"
      - task: codegen:typescript:typecheck
        vars:
          FILE: "{{.OUTPUT}}"
      - echo "Generated TypeScript code validated successfully{{.COLON}} {{.OUTPUT}}"
    vars:
      COLON: ":"

  # === Local dev runners ===
  run:cli:
    desc: "Run the CLI tool"
    cmds:
      - cargo run --package spikard-cli -- {{.CLI_ARGS}}

  run:http:
    desc: "Run the HTTP server"
    cmds:
      - cargo run --package spikard-http

  # === Published-package smoke tests ===
  test:apps:python:
    desc: "Run Python published package test app"
    dir: test_apps/python
    cmds:
      - uv sync --all-extras
      - uv run pytest -v

  test:apps:node:
    desc: "Run Node.js published package test app"
    dir: test_apps/node
    cmds:
      - pnpm install --ignore-workspace
      - pnpm test

  test:apps:ruby:
    desc: "Run Ruby published package test app"
    dir: test_apps/ruby
    cmds:
      - bundle install
      - bundle exec rspec

  test:apps:php:
    desc: "Run PHP published package test app"
    dir: test_apps/php
    cmds:
      - composer install --no-interaction
      - composer test

  test:apps:rust:
    desc: "Run Rust published package test app"
    dir: test_apps/rust
    cmds:
      - cargo test --locked

  test:apps:elixir:
    desc: "Run Elixir published package test app"
    dir: test_apps/elixir
    cmds:
      - mix deps.get
      - mix test

  test:apps:all:
    desc: "Run all published package test apps"
    cmds:
      - task: test:apps:python
      - task: test:apps:node
      - task: test:apps:ruby
      - task: test:apps:php
      - task: test:apps:rust
      - task: test:apps:elixir

  test:apps:update-versions:
    desc: "Update all test app package versions"
    cmds:
      - bash test_apps/scripts/update-versions.sh {{.VERSION}}
    vars:
      VERSION: '{{.VERSION | default "0.6.0"}}'

  # === Clean ===
  clean:
    desc: "Remove build artifacts across all languages"
    cmds:
      - cargo clean
      - alef clean
      - rm -rf coverage.lcov dist/ .alef/
      - rm -rf .pytest_cache/ .mypy_cache/ .ruff_cache/
      - find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
      - find . -type f -name "*.pyc" -delete 2>/dev/null || true

  clean:generated:
    desc: "Remove all generated e2e test infrastructure"
    cmds:
      - rm -rf e2e/
