version: "3"

# ============================================================================
# spikard — Root Taskfile
# ============================================================================
# Primary development interface. Rust core tasks delegate to .task/languages/rust.yml.
# Most binding language operations (setup, build, test, lint, format, clean,
# update, upgrade, publish) are handled by alef.
#
# Common entry points:
#   task setup          -> install all dependencies (rust + alef setup + prek)
#   task build          -> build Rust core only (debug)
#   task build:all      -> build core + bindings (debug)
#   task build:release  -> build Rust core only (release)
#   task test           -> run Rust core tests
#   task e2e:all        -> generate + build + run e2e tests for all bindings
#   task test:cov       -> tests with coverage
#   task format         -> format Rust code
#   task alef:format    -> format Alef-managed generated output
#   task lint           -> run prek (full pre-commit chain)
#   task update         -> compatible dependency updates everywhere
#   task upgrade        -> aggressive upgrades
#   task clean          -> remove all build artifacts
#   task publish:*      -> alef publish validate/prepare/build/package
#   task rust:*         -> Rust-specific tasks (.task/languages/rust.yml)
#   task version:*      -> version sync via alef (.task/tools/version-sync.yml)
# ============================================================================

includes:
  rust:
    taskfile: ./.task/languages/rust.yml
  version:
    taskfile: ./.task/tools/version-sync.yml
  _tools:
    taskfile: ./.task/tools/general.yml
    flatten: true

env:
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: plain

silent: false

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task --list

  # === Setup ===
  setup:
    desc: "Install all dependencies and setup development environment"
    cmds:
      - task: rust:install
      - alef setup
      - task: pre-commit:install

  # === Build ===
  build:
    desc: "Build Rust core library only (debug)"
    cmds:
      - task: build:core

  build:release:
    desc: "Build Rust core library only (release)"
    cmds:
      - task: rust:build:release

  build:ci:
    desc: "Build Rust core library in CI mode"
    cmds:
      - task: rust:build:ci

  build:core:
    desc: "Build Rust core library only (debug)"
    cmds:
      - task: rust:build:dev

  build:bindings:
    desc: "Build all language bindings"
    cmds:
      - task: alef:build

  build:all:
    desc: "Build Rust core library and all language bindings (debug)"
    cmds:
      - task: build:core
      - task: build:bindings

  build:cli:
    desc: "Build the spikard CLI binary"
    cmds:
      - task: rust:cli:build

  build:http:
    desc: "Build HTTP server binary"
    cmds:
      - cargo build --locked --release --package spikard-http

  # === Test ===
  test:
    desc: "Run Rust core tests"
    cmds:
      - task: rust:test

  test:all:
    desc: "Run all test suites (Rust core + bindings)"
    cmds:
      - task: test
      - alef test

  test:bindings:
    desc: "Run binding test suites only (skip Rust core)"
    cmds:
      - alef test

  test:cov:
    desc: "Run all tests with coverage"
    cmds:
      - task: rust:test:ci
      - alef test --coverage

  test:ci:
    desc: "Run all tests with coverage (CI mode, alias for test:cov)"
    cmds:
      - task: test:cov

  # === Lint & Format ===
  lint:
    desc: "Lint all code via prek (pre-commit framework)"
    cmds:
      - prek run --all-files

  lint:check:
    desc: "Lint all code WITHOUT auto-fix (Rust + bindings)"
    cmds:
      - task: rust:lint:check
      - alef lint

  format:
    desc: "Format Rust code"
    cmds:
      - task: rust:format

  format:check:
    desc: "Check code formatting without modifications"
    cmds:
      - task: rust:format:check

  check:
    desc: "Run all checks (format + lint, no modifications)"
    cmds:
      - task: format:check
      - task: lint:check

  # === Update / Upgrade ===
  update:
    desc: "Update all dependencies within major versions (minor patches only)"
    cmds:
      - task: rust:update
      - alef update
      - prek autoupdate

  upgrade:
    desc: "Upgrade all dependencies to latest including breaking changes"
    cmds:
      - rustup update stable
      - task: rust:upgrade
      - task: zig:deps:upgrade
      - alef update --latest
      - prek autoupdate
      - cmd: |
          if command -v gau >/dev/null 2>&1; then
            gau --recursive .github/
          else
            echo "gau (gh-actions-updater) not installed; skipping"
          fi
        ignore_error: true

  zig:deps:upgrade:
    desc: "Upgrade zig dependencies in every build.zig.zon (via `zig fetch --save`)"
    cmds:
      - cmd: |
          if ! command -v zig >/dev/null 2>&1; then
            echo "zig not installed; skipping"
            exit 0
          fi
          set -e
          find . -name "build.zig.zon" \
              -not -path "./target/*" \
              -not -path "*/.build/*" \
              -not -path "*/zig-cache/*" \
              -not -path "*/zig-out/*" \
              -not -path "*/test_apps/zig/zig-pkg/*" \
              -print | while read -r zon; do
            urls="$(grep '\.url' "$zon" | cut -d '=' -f 2 | cut -d '#' -f 1 | tr -d '" ,')"
            [ -z "$urls" ] && continue
            dir="$(dirname "$zon")"
            echo "Updating zig deps in $dir"
            for url in $urls; do
              (cd "$dir" && zig fetch --save "$url")
            done
          done

  # === Coverage ===
  cov:rust:
    desc: "Generate Rust coverage report"
    cmds:
      - task: rust:test:ci

  cov:all:
    desc: "Generate coverage for all languages"
    cmds:
      - task: rust:test:ci
      - alef test --coverage

  # === Version ===
  versions:sync:
    desc: "Synchronize version from Cargo.toml to all package manifests"
    cmds:
      - task: version:sync

  # === Alef lifecycle ===
  alef:generate:
    desc: "Regenerate all Alef-managed outputs without formatting or building"
    cmds:
      - cargo run -p spikard-alef --release -- all --clean --format=false
      - cmd: |
          # Invoke cargo build for spikard-dart to trigger FRB codegen and the
          # fix_handler_executor_calls() rewrite. This is necessary because alef's
          # generate phase only regenerates Rust source files; FRB codegen and the
          # rewrite only run during cargo build.
          if command -v cargo >/dev/null 2>&1; then
            cargo build --manifest-path packages/dart/rust/Cargo.toml 2>&1 | grep -v "^warning:" || true
          else
            echo "cargo not available; skipping spikard-dart build"
          fi
        ignore_error: true

  alef:verify:
    desc: "Check Alef-generated files are up to date"
    cmds:
      - cargo run -p spikard-alef --release -- verify --exit-code

  alef:build:
    desc: "Build all language bindings"
    cmds:
      - cargo run -p spikard-alef --release -- build

  alef:format:
    desc: "Format Alef-managed generated output"
    cmds:
      - cargo run -p spikard-alef --release -- fmt

  alef:sync:
    desc: "Sync version from Cargo.toml to all manifests"
    cmds:
      - cargo run -p spikard-alef --release -- sync-versions

  alef:docs:
    desc: "Generate API reference documentation"
    cmds:
      - cargo run -p spikard-alef --release -- docs

  alef:extract:
    desc: "Extract API surface from Rust source"
    cmds:
      - cargo run -p spikard-alef --release -- extract

  alef:scaffold:
    desc: "Generate package scaffolding (Cargo.toml, pyproject.toml, etc.)"
    cmds:
      - alef scaffold

  # === E2E tests ===
  e2e:generate:
    desc: "Generate E2E tests for all languages from fixtures"
    cmds:
      - alef e2e generate

  e2e:build:
    desc: "Build all language bindings used by e2e suites (release)"
    cmds:
      - alef build --release --lang python,node,ruby,php,ffi,go,java,csharp,elixir,wasm,dart,kotlin,swift,zig

  e2e:all:
    desc: "Generate, build, and run all e2e test suites"
    cmds:
      - task: e2e:generate
      - task: e2e:build
      - task: e2e:test

  e2e:test:
    desc: "Run all e2e test suites across all languages"
    cmds:
      - alef test --e2e --lang rust,python,node,ruby,php,go,java,csharp,elixir,wasm,dart,kotlin,swift,zig

  e2e:quick:
    desc: "Run quick Rust e2e tests"
    cmds:
      - alef test --e2e --lang rust

  e2e:lint:
    desc: "Validate e2e fixtures"
    cmds:
      - alef e2e validate

  e2e:verify:
    desc: "Verify generated e2e tests are up to date"
    cmds:
      - alef e2e generate
      - git diff --exit-code e2e/

  rust:e2e:
    desc: "Run Rust e2e tests via alef"
    cmds:
      - alef test --e2e --lang rust

  python:e2e:
    desc: "Run Python e2e tests via alef"
    cmds:
      - alef test --e2e --lang python

  node:e2e:
    desc: "Run Node e2e tests via alef"
    cmds:
      - alef test --e2e --lang node

  ruby:e2e:
    desc: "Run Ruby e2e tests via alef"
    cmds:
      - alef test --e2e --lang ruby

  php:e2e:
    desc: "Run PHP e2e tests via alef"
    cmds:
      - alef test --e2e --lang php

  elixir:e2e:
    desc: "Run Elixir e2e tests via alef"
    cmds:
      - alef test --e2e --lang elixir

  go:e2e:
    desc: "Run Go e2e tests via alef"
    cmds:
      - alef test --e2e --lang go

  java:e2e:
    desc: "Run Java e2e tests via alef"
    cmds:
      - alef test --e2e --lang java

  csharp:e2e:
    desc: "Run C# e2e tests via alef"
    cmds:
      - alef test --e2e --lang csharp

  kotlin:e2e:
    desc: "Run Kotlin e2e tests via alef"
    cmds:
      - alef test --e2e --lang kotlin

  kotlin-android:e2e:
    desc: "Run Kotlin/Android e2e tests via alef"
    cmds:
      - alef test --e2e --lang kotlin

  dart:e2e:
    desc: "Run Dart e2e tests via alef"
    cmds:
      - alef test --e2e --lang dart

  swift:e2e:
    desc: "Run Swift e2e tests via alef"
    cmds:
      - alef test --e2e --lang swift

  zig:e2e:
    desc: "Run Zig e2e tests via alef"
    cmds:
      - alef test --e2e --lang zig

  wasm:e2e:
    desc: "Run WASM e2e tests via alef"
    cmds:
      - alef test --e2e --lang wasm

  verify:tests:
    desc: "Verify generated e2e tests are up to date"
    cmds:
      - alef e2e generate
      - git diff --exit-code e2e/

  # === Publish ===
  publish:validate:
    desc: "Validate publish manifests are consistent"
    cmds:
      - alef publish validate

  publish:prepare:
    desc: "Prepare packages for publishing (vendor deps, stage FFI)"
    cmds:
      - alef publish prepare

  publish:build:
    desc: "Build release artifacts for all languages"
    cmds:
      - alef publish build

  publish:package:
    desc: "Package built artifacts into distributable archives"
    cmds:
      - alef publish package -o dist/

  # === Per-language lint/format/test (delegate to alef where possible) ===
  go:lint:
    desc: "Lint Go binding with golangci-lint"
    cmds:
      - golangci-lint run ./...
    dir: packages/go

  ruby:format:
    desc: "Format Ruby binding with rubocop"
    cmds:
      - bundle exec rubocop --autocorrect-all
    dir: packages/ruby

  ruby:lint:
    desc: "Lint Ruby binding with rubocop and steep"
    cmds:
      - bundle exec rubocop
      - bundle exec steep check
    dir: packages/ruby

  php:format:
    desc: "Format PHP binding with php-cs-fixer"
    cmds:
      - composer -d packages/php run format

  php:lint:
    desc: "Lint PHP binding (phpstan + php-cs-fixer)"
    cmds:
      - composer -d packages/php run lint

  csharp:format:
    desc: "Format C# binding with dotnet format"
    cmds:
      - dotnet format
    dir: packages/csharp

  csharp:lint:
    desc: "Lint C# binding with dotnet format --verify-no-changes"
    cmds:
      - dotnet format --verify-no-changes
    dir: packages/csharp

  csharp:build:release:
    desc: "Build the C# binding in Release configuration"
    dir: packages/csharp
    cmds:
      - dotnet build --configuration Release

  csharp:package:
    desc: "Pack the C# binding into a NuGet package"
    dir: packages/csharp
    cmds:
      - dotnet pack --configuration Release {{.CLI_ARGS}}

  java:build:release:
    desc: "Build the Java binding via Maven (mvn package)"
    dir: packages/java
    cmds:
      - mvn -B -DskipTests package

  kotlin-android:format:
    desc: "Format Kotlin/Android binding with ktlint via gradle"
    cmds:
      - gradle ktlintFormat --no-daemon
    dir: packages/kotlin

  kotlin-android:lint:
    desc: "Lint Kotlin/Android binding with ktlint via gradle"
    cmds:
      - gradle ktlintCheck --no-daemon
    dir: packages/kotlin

  kotlin-android:test:
    desc: "Run Kotlin/Android binding tests"
    cmds:
      - cargo build --locked --release -p spikard-ffi
      - gradle test --no-daemon
    dir: packages/kotlin

  dart:format:
    desc: "Format Dart binding with dart format"
    cmds:
      - dart format .
    dir: packages/dart

  dart:lint:
    desc: "Lint Dart binding with dart analyze"
    cmds:
      - dart analyze
    dir: packages/dart

  dart:test:
    desc: "Run Dart binding tests"
    cmds:
      - cargo build --locked --release --manifest-path packages/dart/rust/Cargo.toml
      - dart pub get
      - dart test
    dir: packages/dart

  swift:format:
    desc: "Format Swift binding with swift format"
    cmds:
      - swift format --in-place --recursive Sources
    dir: packages/swift

  swift:lint:
    desc: "Lint Swift binding with swift format lint"
    cmds:
      - swift format lint --recursive Sources
    dir: packages/swift

  swift:test:
    desc: "Run Swift binding tests"
    cmds:
      - cargo build --locked --release -p spikard-ffi
      - swift test
    dir: packages/swift

  zig:format:
    desc: "Format Zig binding with zig fmt"
    cmds:
      - zig fmt src
    dir: packages/zig

  zig:lint:
    desc: "Lint Zig binding with zig fmt --check"
    cmds:
      - zig fmt --check src
    dir: packages/zig

  zig:test:
    desc: "Run Zig binding tests"
    cmds:
      - zig build test
    dir: packages/zig

  docs:snippets:list:
    desc: "List all discovered documentation snippets"
    cmds:
      - alef snippets list --snippets docs

  docs:snippets:validate:
    desc: "Validate documentation snippets at syntax level"
    cmds:
      - alef snippets audit --docs docs/snippets --snippets docs/snippets
      - alef snippets gaps --docs docs --snippets docs/snippets --include-base-path docs/snippets --include-base-path docs --include-base-path .
      - alef snippets validate --snippets docs/snippets --level syntax

  docs:build:
    desc: "Build documentation"
    cmds:
      - task: docs:snippets:validate
      - uv run zensical build --clean

  docs:serve:
    desc: "Serve documentation locally"
    cmds:
      - uv run zensical serve

  docs:deploy:
    desc: "Build and deploy documentation"
    cmds:
      - alef docs
      - uv run zensical build --clean --strict

  docs:lint:links:
    desc: "Check links in docs and READMEs with lychee"
    cmds:
      - lychee --config .lychee.toml docs/ README.md crates/*/README.md packages/*/README.md

  readme:generate:
    desc: "Generate all README files from templates"
    cmds:
      - alef readme
      - task: readme:root

  readme:validate:
    desc: "Validate that generated READMEs are up to date"
    cmds:
      - alef readme
      - task: readme:root
      - git diff --exit-code

  readme:root:
    desc: "Render the root README from templates/readme/root.md"
    internal: true
    cmds:
      - |
        python3 - <<'PY'
        from pathlib import Path

        template = Path("templates/readme/root.md").read_text()
        badges = Path("templates/readme/partials/badges.html.jinja").read_text()
        rendered = template.replace("{% include 'partials/badges.html.jinja' %}", badges.rstrip())
        Path("README.md").write_text(rendered)
        PY

  # === OpenAPI client codegen (spikard framework feature) ===
  codegen:python:
    desc: "Generate Python server code from OpenAPI schema"
    deps:
      - build:cli
    cmds:
      - "target/release/spikard generate {{.SCHEMA}} --lang python --output {{.OUTPUT}}"
      - echo "Generated Python code{{.COLON}} {{.OUTPUT}}"
    vars:
      COLON: ":"

  codegen:python:format:
    desc: "Format generated Python code with ruff"
    cmds:
      - uv run ruff format {{.FILE}}
      - uv run ruff check --fix {{.FILE}}

  codegen:python:lint:
    desc: "Lint generated Python code with ruff and mypy"
    cmds:
      - uv run ruff check {{.FILE}}
      - uv run mypy {{.FILE}} --strict --allow-untyped-calls --allow-incomplete-defs

  codegen:python:verify:
    desc: "Generate, format, and validate Python code from OpenAPI schema"
    cmds:
      - task: codegen:python
        vars:
          SCHEMA: "{{.SCHEMA}}"
          OUTPUT: "{{.OUTPUT}}"
      - task: codegen:python:format
        vars:
          FILE: "{{.OUTPUT}}"
      - task: codegen:python:lint
        vars:
          FILE: "{{.OUTPUT}}"
      - echo "Generated Python code validated successfully{{.COLON}} {{.OUTPUT}}"
    vars:
      COLON: ":"

  codegen:typescript:
    desc: "Generate TypeScript server code from OpenAPI schema"
    deps:
      - build:cli
    cmds:
      - "target/release/spikard generate {{.SCHEMA}} --lang type-script --output {{.OUTPUT}}"
      - echo "Generated TypeScript code{{.COLON}} {{.OUTPUT}}"
    vars:
      COLON: ":"

  codegen:typescript:format:
    desc: "Format generated TypeScript code with Biome"
    cmds:
      - cd crates/spikard-node && pnpm biome format --write "{{.FILE}}"

  codegen:typescript:lint:
    desc: "Lint generated TypeScript code with oxlint and Biome"
    cmds:
      - cd crates/spikard-node && pnpm oxlint "{{.FILE}}"
      - cd crates/spikard-node && pnpm biome check "{{.FILE}}"

  codegen:typescript:typecheck:
    desc: "Type check generated TypeScript code with tsc"
    cmds:
      - cd crates/spikard-node && pnpm tsc --noEmit "{{.FILE}}"

  codegen:typescript:verify:
    desc: "Generate, format, and validate TypeScript code from OpenAPI schema"
    cmds:
      - task: codegen:typescript
        vars:
          SCHEMA: "{{.SCHEMA}}"
          OUTPUT: "{{.OUTPUT}}"
      - task: codegen:typescript:format
        vars:
          FILE: "{{.OUTPUT}}"
      - task: codegen:typescript:lint
        vars:
          FILE: "{{.OUTPUT}}"
      - task: codegen:typescript:typecheck
        vars:
          FILE: "{{.OUTPUT}}"
      - echo "Generated TypeScript code validated successfully{{.COLON}} {{.OUTPUT}}"
    vars:
      COLON: ":"

  # === Local dev runners ===
  run:cli:
    desc: "Run the CLI tool"
    cmds:
      - cargo run --package spikard-cli -- {{.CLI_ARGS}}

  run:http:
    desc: "Run the HTTP server"
    cmds:
      - cargo run --package spikard-http

  # === Published-package smoke tests ===
  test-apps:mock-server:
    desc: "Build the e2e mock-server that published-package test app harnesses spawn"
    cmds:
      - cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release

  test-apps:python:
    desc: "Run Python published package test app"
    dir: test_apps/python
    cmds:
      - uv sync --all-extras
      - uv run pytest -v

  test-apps:node:
    desc: "Run Node.js published package test app"
    dir: test_apps/node
    cmds:
      - pnpm install --ignore-workspace
      - pnpm test

  test-apps:ruby:
    desc: "Run Ruby published package test app"
    dir: test_apps/ruby
    cmds:
      - bundle install
      - bundle exec rspec

  test-apps:php:
    desc: "Run PHP published package test app"
    dir: test_apps/php
    cmds:
      # The PHP harness bootstrap spawns `mock-server` from
      # test_apps/rust/target/release/. Make sure that binary exists before
      # PHPUnit runs; otherwise every HTTP fixture test fails with
      # `cURL error 7: Failed to connect to localhost port 8080`.
      - cd ../rust && cargo build --release --bin mock-server
      - composer install --no-interaction
      - composer test

  test-apps:rust:
    desc: "Run Rust published package test app"
    dir: test_apps/rust
    cmds:
      # The generated `test_apps/rust/Cargo.toml` is version-bumped by
      # `task version:set`, but the lock file is not — `cargo test --locked`
      # then fails with `cannot update the lock file because --locked was
      # passed`. Drop `--locked` so the lock follows the manifest; the
      # crates.io index is the source of truth either way.
      - cargo test

  test-apps:elixir:
    desc: "Run Elixir published package test app"
    dir: test_apps/elixir
    cmds:
      - mix deps.get
      - mix test

  test-apps:go:
    desc: "Run Go published package test app"
    dir: test_apps/go
    cmds:
      - go test ./...

  test-apps:java:
    desc: "Run Java published package test app"
    deps: [test-apps:mock-server]
    dir: test_apps/java
    cmds:
      - ./mvnw test

  test-apps:csharp:
    desc: "Run C# published package test app"
    deps: [test-apps:mock-server]
    dir: test_apps/csharp
    cmds:
      - dotnet test

  test-apps:dart:
    desc: "Run Dart published package test app"
    dir: test_apps/dart
    cmds:
      - dart pub get
      - dart test

  test-apps:swift:
    desc: "Run Swift published package test app"
    dir: test_apps/swift_e2e
    cmds:
      - swift test

  test-apps:zig:
    desc: "Run Zig published package test app"
    dir: test_apps/zig
    cmds:
      - zig build test

  test-apps:wasm:
    desc: "Run WASM published package test app"
    dir: test_apps/wasm
    cmds:
      - pnpm install --ignore-workspace
      - pnpm test

  test-apps:kotlin:
    desc: "Run Kotlin published package test app"
    dir: test_apps/kotlin
    cmds:
      - ./gradlew test

  test-apps:kotlin_android:
    desc: "Run Kotlin Android published package test app"
    dir: test_apps/kotlin_android
    cmds:
      - ./gradlew test

  test-apps:all:
    desc: "Run all published package test apps"
    cmds:
      - task: test-apps:python
      - task: test-apps:node
      - task: test-apps:ruby
      - task: test-apps:php
      - task: test-apps:rust
      - task: test-apps:elixir
      - task: test-apps:go
      - task: test-apps:java
      - task: test-apps:csharp
      - task: test-apps:dart
      - task: test-apps:swift
      - task: test-apps:zig
      - task: test-apps:wasm
      - task: test-apps:kotlin
      - task: test-apps:kotlin_android

  test-apps:update-versions:
    desc: "Update all test app package versions"
    cmds:
      - bash test_apps/scripts/update-versions.sh {{.VERSION}}
    vars:
      VERSION: '{{.VERSION | default "0.6.0"}}'

  # === Clean ===
  clean:
    desc: "Remove build artifacts across all languages"
    cmds:
      - cargo clean
      - alef clean
      - rm -rf coverage.lcov dist/ .alef/
      - rm -rf .pytest_cache/ .mypy_cache/ .ruff_cache/
      - find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
      - find . -type f -name "*.pyc" -delete 2>/dev/null || true

  clean:generated:
