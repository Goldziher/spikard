codecov:
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 80%
        threshold: 2%
        if_ci_failed: error

    patch:
      default:
        target: 80%
        threshold: 5%

flags:
  rust-core:
    paths:
      - crates/spikard/
      - crates/spikard-core/
      - crates/spikard-http/
      - crates/spikard-bindings-shared/
    target: 80%
    threshold: 2%

  rust-cli:
    paths:
      - crates/spikard-cli/
    target: 75%
    threshold: 3%

  rust-graphql:
    paths:
      - crates/spikard-graphql/
    target: 80%
    threshold: 2%

  python:
    paths:
      - packages/python/spikard/
    target: 80%
    threshold: 2%

  node:
    paths:
      - crates/spikard-node/
    target: 80%
    threshold: 2%

  ruby:
    paths:
      - packages/ruby/lib/
    target: 80%
    threshold: 2%

  php:
    paths:
      - packages/php/src/
    target: 80%
    threshold: 2%

ignore:
  - "**/*_test.rs"
  - "**/*_spec.rs"
  - "**/tests/**"
  - "**/*.spec.ts"
  - "**/*.test.ts"
  - "**/spec/**"

  - "crates/spikard-py/src/**"
  - "crates/spikard-node/src/**"
  - "crates/spikard-rb/src/**"
  - "crates/spikard-php/src/**"
  - "crates/spikard-elixir/src/**"

  - "**/generated/**"
  - "**/target/**"
  - "**/dist/**"
  - "**/build/**"

  - "**/examples/**"
  - "**/tools/**"
  - "**/.github/**"
  - "**/scripts/**"
  - "**/benches/**"

  - "**/vendor/**"
  - "**/node_modules/**"
  - "**/.gems/**"

  - "**/src/main.rs"
  - "**/src/bin/**"

  - "**/version.rb"
  - "**/version.py"

  - "packages/python/spikard/_internal.py"
  - "packages/python/spikard/background.py"
  - "packages/python/spikard/routing.py"
  - "packages/python/spikard/schema.py"
  - "packages/python/spikard/sse.py"
  - "packages/python/spikard/testing.py"
  - "packages/python/spikard/websocket.py"

comment:
  layout: "header, diff, flags, components"
  behavior: default
  require_changes: false
  require_base: no
  require_head: yes
