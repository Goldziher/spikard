[workspace]
alef_version = "0.19.23"
languages = [
  "python",
  "node",
  "ruby",
  "php",
  "elixir",
  "ffi",
  "go",
  "java",
  "csharp",
  "kotlin",
  "dart",
  "swift",
  "zig",
  "wasm",
]

[workspace.dto]
python = "dataclass"
python_output = "typed-dict"
node = "interface"
ruby = "struct"
php = "readonly-class"
elixir = "struct"
go = "struct"
java = "record"
csharp = "record"
kotlin = "data-class"
dart = "class"
swift = "struct"
zig = "struct"

[workspace.format]
enabled = false

[workspace.sync]
extra_paths = []

[[workspace.sync.text_replacements]]
path = "crates/spikard-http/src/lib.rs"
search = 'version = "\d+\.\d+\.\d+"'
replace = 'version = "{version}"'

[[crates]]
name = "spikard"
core_import = "spikard"
sources = []
version_from = "Cargo.toml"
workspace_root = "."
features = ["di"]
auto_path_mappings = false

[[crates.source_crates]]
name = "spikard"
sources = ["crates/spikard/src/upload.rs", "crates/spikard/src/testing.rs"]

[[crates.source_crates]]
name = "spikard-core"
sources = [
  "crates/spikard-core/src/http.rs",
  "crates/spikard-core/src/request_data.rs",
  "crates/spikard-core/src/router.rs",
  "crates/spikard-core/src/lifecycle.rs",
  "crates/spikard-core/src/parameters.rs",
  "crates/spikard-core/src/validation/mod.rs",
  "crates/spikard-core/src/errors.rs",
  "crates/spikard-core/src/problem.rs",
]

[[crates.source_crates]]
name = "spikard-http"
sources = [
  "crates/spikard-http/src/lib.rs",
  "crates/spikard-http/src/handler_trait.rs",
  "crates/spikard-http/src/response.rs",
  "crates/spikard-http/src/auth.rs",
  "crates/spikard-http/src/background.rs",
  "crates/spikard-http/src/openapi/mod.rs",
  "crates/spikard-http/src/sse.rs",
  "crates/spikard-http/src/websocket.rs",
  "crates/spikard-http/src/testing.rs",
  "crates/spikard-http/src/testing/test_client.rs",
]

[[crates.source_crates]]
name = "spikard-graphql"
sources = [
  "crates/spikard-graphql/src/error.rs",
  "crates/spikard-graphql/src/routes.rs",
  "crates/spikard-graphql/src/schema.rs",
]

[crates.extra_dependencies]
spikard-core = { path = "../spikard-core" }
spikard-http = { path = "../spikard-http" }
spikard-graphql = { path = "../spikard-graphql" }

[crates.python]
module_name = "_spikard"
pip_name = "spikard"
release_gil = true
features = ["di"]

[crates.python.stubs]
output = "packages/python/spikard/"

[crates.python.extra_dependencies]
tokio = { version = "1", features = ["full"] }

[crates.build_commands.python]
precondition = "command -v maturin >/dev/null 2>&1"
build = "cd packages/python && maturin develop"
build_release = "cd packages/python && maturin develop --release"

[crates.node]
package_name = "@spikard/node"
features = ["di"]

[crates.node.extra_dependencies]
serde_bytes = "0.11"
tokio = { version = "1", features = ["full"] }

[crates.ruby]
gem_name = "spikard"
features = ["di"]

[crates.ruby.extra_dependencies]
spikard-core = { path = "../../../../../crates/spikard-core" }
spikard-graphql = { path = "../../../../../crates/spikard-graphql" }
spikard-http = { path = "../../../../../crates/spikard-http" }

[crates.ruby.stubs]
output = "packages/ruby/sig/"

[crates.build_commands.ruby]
precondition = "command -v cargo >/dev/null 2>&1"
build = "cargo build --manifest-path packages/ruby/ext/spikard_rb/native/Cargo.toml"
build_release = "cargo build --manifest-path packages/ruby/ext/spikard_rb/native/Cargo.toml --release"

[crates.php]
extension_name = "spikard_php"
feature_gate = "extension-module"
features = ["di"]
# Alef cannot map Option<serde_json::Value> parameters to PHP types — ext-php-rs
# has no FromZval impl for serde_json::Value. TestClient.graphql* methods accept
# Option<Value> variables maps. Exclude the entire class for PHP until alef
# serializes Value params to JSON-string at the PHP boundary; consumers can
# build/run TestClient via the public API in other bindings.
exclude_types = ["TestClient"]

[crates.elixir]
app_name = "spikard"
features = ["di"]
# Alef bug (track upstream):
# - UploadFile: alef emits a local elixir-side UploadFile struct AND From impls
#   that pass the local type to spikard::UploadFile::from, producing a type
#   mismatch. The binding works without it (no Elixir consumer can usefully
#   construct an UploadFile across the BEAM boundary).
# - TestClient: graphql_* methods take Option<serde_json::Value> for variables;
#   alef maps these to Option<String> in the elixir layer, causing a parameter
#   type mismatch. Same shape as the PHP issue.
exclude_types = ["UploadFile", "TestClient"]

[crates.elixir.extra_dependencies]
spikard-core = { path = "../../../../crates/spikard-core" }
spikard-graphql = { path = "../../../../crates/spikard-graphql" }
spikard-http = { path = "../../../../crates/spikard-http" }

[crates.build_commands.elixir]
precondition = "command -v mix >/dev/null 2>&1"
build = "cd packages/elixir && mix compile"
build_release = "cd packages/elixir && MIX_ENV=prod mix compile"

[crates.wasm]
package_name = "@spikard/node-wasm"
core_crate_override = "spikard-http"
exclude_extra_dependencies = ["spikard-core", "spikard-http", "spikard-graphql"]
features = ["di", "wasm"]
source_crate_remaps = ["spikard-core", "spikard"]
custom_rust_modules = ["dispatch"]
exclude_types = [
  "BackgroundJobMetadata",
  "BackgroundTaskConfig",
  "GrpcConfig",
  "GraphQLSubscriptionSnapshot",
  "ResponseSnapshot",
  "SnapshotError",
  "SseEvent",
  "SseEventProducer",
  "StaticFilesConfig",
  "WebSocketHandler",
  "WebSocketMessage",
  # UploadFile lives in the spikard facade (crates/spikard/src/upload.rs); the
  # wasm binding depends on spikard-http directly, which doesn't re-export it.
  "UploadFile",
  # spikard-graphql is not in the wasm dep tree
  "GraphQLError",
  "GraphQLRouteConfig",
  "QueryMutationConfig",
  "QueryOnlyConfig",
]

[crates.wasm.extra_dependencies]
axum = { version = "0.8", default-features = false, features = [
  "http1",
  "json",
  "matched-path",
  "query",
  "tower-log",
] }
getrandom02 = { package = "getrandom", version = "0.2", features = ["js"] }
http-body-util = "0.1"
serde = { version = "1", features = ["derive"] }
serde_bytes = "0.11"
tower = "0.5"

[crates.wasm.exclude_fields]
ServerConfig = ["grpc", "background_tasks", "enable_http_trace"]

[crates.ffi]
prefix = "spikard"
header_name = "spikard.h"
lib_name = "spikard_ffi"
visitor_callbacks = false
exclude_types = [
  "TestClient",
  "ResponseSnapshot",
  "SnapshotError",
  "GraphQLSubscriptionSnapshot",
  "WebSocketMessage",
  "MultipartFilePart",
]

[crates.go]
module = "github.com/Goldziher/spikard"
package_name = "spikard"

[crates.java]
package = "dev.spikard"
ffi_style = "panama"

[crates.dart]
pubspec_name = "spikard"
lib_name = "spikard"
style = "frb"

[crates.dart.extra_dependencies]
spikard-core = { path = "../../../crates/spikard-core" }
spikard-graphql = { path = "../../../crates/spikard-graphql" }
spikard-http = { path = "../../../crates/spikard-http" }

[crates.build_commands.dart]
precondition = "command -v cargo >/dev/null 2>&1"
before = "cd packages/dart && dart pub get"
build = "cargo build --manifest-path packages/dart/rust/Cargo.toml"
build_release = "cargo build --release --manifest-path packages/dart/rust/Cargo.toml"

[crates.kotlin]
package = "dev.spikard"
target = "jvm"

[crates.swift]
module_name = "Spikard"
package_name = "Spikard"

[crates.swift.extra_dependencies]
spikard-core = { path = "../../../crates/spikard-core" }
spikard-graphql = { path = "../../../crates/spikard-graphql" }
spikard-http = { path = "../../../crates/spikard-http" }

[crates.csharp]
namespace = "Spikard"
project_file = "packages/csharp/Spikard/Spikard.csproj"

[crates.build_commands.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
build = "dotnet build packages/csharp/Spikard/Spikard.csproj --configuration Debug --verbosity quiet -p:NuGetAudit=false"
build_release = "dotnet build packages/csharp/Spikard/Spikard.csproj --configuration Release --verbosity quiet -p:NuGetAudit=false"

[crates.build_commands.kotlin]
precondition = "command -v gradle >/dev/null 2>&1"
before = "cargo build -p spikard-ffi"
build = "cd packages/kotlin && gradle build -x test --no-daemon"
build_release = "cd packages/kotlin && gradle build -x test --no-daemon"

[crates.build_commands.swift]
precondition = "command -v swift >/dev/null 2>&1"
build = "INPUT_PACKAGE_DIR=packages/swift INPUT_CRATE_NAME=spikard-swift INPUT_BUILD_PROFILE=dev INPUT_DRY_RUN=false bash ../kreuzberg-dev/actions/build-swift-package/scripts/build.sh && cd packages/swift && CLANG_MODULE_CACHE_PATH=.build/clang-module-cache swift build"
build_release = "INPUT_PACKAGE_DIR=packages/swift INPUT_CRATE_NAME=spikard-swift INPUT_BUILD_PROFILE=release INPUT_DRY_RUN=false bash ../kreuzberg-dev/actions/build-swift-package/scripts/build.sh && cd packages/swift && CLANG_MODULE_CACHE_PATH=.build/clang-module-cache swift build -c release"

[crates.build_commands.zig]
precondition = "command -v zig >/dev/null 2>&1"
before = "cargo build -p spikard-ffi"
build = "cd packages/zig && zig build -Dffi_path=../../target/debug"
build_release = "cd packages/zig && zig build -Doptimize=ReleaseSafe -Dffi_path=../../target/release"

[crates.zig]
module_name = "spikard"

[crates.output]
python = "crates/spikard-py/src/"
node = "crates/spikard-node/src/"
ruby = "packages/ruby/ext/spikard_rb/src/"
php = "crates/spikard-php/src/"
elixir = "crates/spikard-elixir/src/"
ffi = "crates/spikard-ffi/src/"
wasm = "crates/spikard-wasm/src/"
go = "packages/go/"
java = "packages/java/src/main/java/"
csharp = "packages/csharp/src/"
kotlin = "packages/kotlin/src/main/kotlin/dev/spikard/kt/"
dart = "packages/dart/lib/src/"
swift = "packages/swift/Sources/Spikard/"
zig = "packages/zig/src/"

[crates.exclude]
methods = [
  # std::io trait impls — require trait in scope, &mut [u8] params
  "UploadFile.read",
  "UploadFile.seek",
  # Methods with unknown external types (StatusCode, axum::Response, etc.)
  "ProblemDetails.status_code",
  "ProblemDetails.with_extension",
  "ProblemDetails.with_extensions",
  "ProblemDetails.from_validation_error",
  "ProblemDetails.internal_server_error_debug",
  "GraphQLError.to_graphql_response",
  "GraphQLError.to_http_response",
  # Methods returning type aliases or excluded types
  "SchemaConfig.validate",
  "SchemaConfig.set_introspection_enabled",
  "SchemaConfig.set_complexity_limit",
  "SchemaConfig.set_depth_limit",
  "ServerConfig.builder",
  # Methods with complex params not auto-delegatable
  "Route.from_metadata",
  "Route.with_jsonrpc_method",
  "Response.with_status",
  "SseEvent.with_type",
  # TestClient: from_router takes axum::Router (opaque external type — bindings use
  # test_client_from_app free function instead). http_server returns Arc<TestServer>
  # (internal axum-test type).
  "TestClient.from_router",
  "TestClient.http_server",
  # WebSocketConnection: new() takes TestWebSocket (axum-test internal type).
  # send_json/receive_json use generic type params that can't cross FFI.
  # send_message/receive_message use WsMessage (axum-test external enum).
  "WebSocketConnection.new",
  "WebSocketConnection.send_json",
  "WebSocketConnection.receive_json",
  "WebSocketConnection.send_message",
  "WebSocketConnection.receive_message",
  # TestServer (spikard wrapper): from_router takes axum::Router; call takes
  # axum::http::Request<Body>. The binding entry point is test_client_from_app.
  "TestServer.from_router",
  "TestServer.from_app",
  "TestServer.call",
  "TestServer.connect_websocket",
  # Alef Value-return-type misclassification bug (track upstream): methods returning
  # Result<serde_json::Value, _> are inferred as Result<String, _>, producing a
  # mismatched-types error at the binding boundary. Remove once alef maps Value
  # returns to the per-language JSON type (dict/object/Hash/etc.).
  "ResponseSnapshot.json",
  "ResponseSnapshot.graphql_data",
  "ResponseSnapshot.graphql_errors",
  "TestingSseEvent.as_json",
]
types = [
  # Not part of public API — closures, Arc<dyn Handler>, internal protocol types
  "Route",
  "RouteMetadata",
  "BackgroundHandle",
  "BackgroundJobError",
  "Claims",
  "GrpcRequestData",
  "GrpcResponseData",
  "JsonRpcRequestOrBatch",
  "JsonRpcResponseType",
  "ValidatedParams",
  # Internal implementation types — pub(crate) in source, but alef extracts
  # them via re-exports/use paths; keep listed until alef respects the original
  # visibility on disambiguated names.
  "BackgroundJobFuture",
  "BackgroundRuntime",
  "BackgroundShutdownError",
  "ContentTypeKind",
  "Dependency",
  "DependencyContainer",
  "DependencyGraph",
  "DependencyInjectingHandler",
  "ErrorCondition",
  "ErrorMapper",
  "FactoryDependency",
  "FactoryDependencyBuilder",
  "FactoryFn",
  "FastRouter",
  "GenericGrpcService",
  "Handler",
  "HandlerResponse",
  "HandlerResult",
  "IntoHandler",
  "LifecycleHooks",
  "LifecycleHooksBuilder",
  "MessageStream",
  "MethodExample",
  "MethodMetadata",
  "PreParsedJson",
  "PreReadBody",
  "RegistryError",
  "ResolvedDependencies",
  "RouteInfo",
  "RpcMode",
  "SchemaBuilder",
  "SseState",
  "ValidatingHandler",
  "WebSocketState",
  "WithoutBodyExtractionOptions",
  # Internal bindings types
  "RawResponse",
  "StaticAsset",
  "StructuredError",
  # AsyncApiState is pub(crate); alef extracts it via re-export. Keep until
  # visibility filter is reliable on disambiguated names.
  "AsyncApiState",
  # Internal protocol types
  "JsonRpcState",
  "JsonRpcMethodRegistry",
  "JsonRpcRequest",
  "JsonRpcResponse",
  "JsonRpcError",
  "JsonRpcErrorResponse",
  "JsonRpcRouter",
  # Internal gRPC types
  "GrpcHandlerResult",
  "GrpcHandler",
  "GrpcRegistry",
  "StreamingRequest",
  # Internal server types
  "Server",
  "ServerConfigBuilder",
  "StaticResponseHandler",
  "StaticResponse",
  "RouteHandler",
  "Router",
  "SchemaRegistry",
  # Opaque validators (can't cross FFI usefully)
  "SchemaValidator",
  "ParameterValidator",
  "ValidationError",
  "ValidationErrorDetail",
  # Traits (can't be instantiated in bindings)
  "SseEventProducer",
  "WebSocketHandler",
  # Internal enums with wrong module paths
  "ParameterSource",
  "BackgroundSpawnError",
  # Types causing residual errors
  "RequestData",
  # TestServer is the internal axum-test-based server (uses TestWebSocket etc.);
  # bindings use TestClient + test_client_from_app instead.
  "TestServer",
  # WebSocketConnection wraps axum-test's TestWebSocket; its async receive_* methods
  # hold a MutexGuard across await (not Send), causing compile errors in PyO3 bindings.
  # GraphQL subscriptions are covered by TestClient.graphql_subscription instead.
  "WebSocketConnection",
  # SseStream.events() returns spikard_http::testing::SseEvent (data: String) which
  # conflicts with the binding's SseEvent type (mapped from spikard_http::SseEvent,
  # data: Value). Excluded until alef can map the two SseEvent variants independently.
  "SseStream",
  # Alef re-export deduplication bug (track upstream): a type reachable via both
  # a `pub use` re-export and its original module path gets extracted twice and
  # disambiguated with a numeric suffix or module prefix, escaping the user's
  # exclude entry for the original name. Remove these once alef merges re-exports
  # to their definition site.
  "LifecycleHooks2",
  "LifecycleHooksBuilder2",
  "RequestData2",
  "WebSocketMessage2",
  "Method2",
  "HandlerResponse2",
  "ErrorMapperErrorCondition",
  "TestingWebSocketMessage",
  # Alef visibility/disambiguation bug (track upstream): pub(crate) GrpcRegistry
  # gets emitted as GrpcGrpcRegistry (parent-module-prefixed) despite the original
  # being excluded AND non-pub. Remove once alef respects pub(crate) on
  # disambiguated names.
  "GrpcGrpcRegistry",
]
functions = [
  "request_hook",
  "response_hook",
  "shield_panic",
  "add_cors_headers",
  "api_key_auth_middleware",
  "assemble_openapi_spec",
  "auto_generate_parameter_schema",
  "build_graphql_body",
  "build_router_with_handlers",
  "build_router_with_handlers_and_config",
  "build_router_with_handlers_and_config_and_grpc",
  "build_server_runtime",
  "call_test_server",
  "connect_websocket",
  "convert_string_to_json_value",
  "copy_metadata",
  "create_request_data_with_body",
  "create_request_data_without_body",
  "empty_message_stream",
  "encode_grpc_message",
  "error_stream",
  "execute_with_lifecycle_hooks",
  "extract_cookies",
  "extract_headers",
  "extract_parameters_from_schema",
  "extract_path_param_names",
  "extract_query_params",
  "extract_raw_query_params",
  "generate_openapi_spec",
  "generate_openrpc_spec",
  "grpc_response_to_tonic",
  "handle_jsonrpc",
  "handle_preflight",
  "init",
  "is_enabled",
  "is_form_urlencoded",
  "is_grpc_request",
  "is_json_content_type",
  "is_json_like",
  "is_json_like_str",
  "is_multipart_form_data",
  "is_server_error",
  "json_schema_to_request_body",
  "json_schema_to_response",
  "json_value_to_schema",
  "jwt_auth_middleware",
  "merge_parameter_schemas",
  "message_stream_from_vec",
  "parse_grpc_client_stream",
  "parse_grpc_path",
  "parse_multipart_to_json",
  "parse_query_pairs_to_json",
  "parse_query_string",
  "parse_query_string_to_json",
  "parse_type_hints",
  "parse_unary_grpc_message",
  "parse_urlencoded_to_json",
  "route_grpc_request",
  "security_scheme_info_to_openapi",
  "single_message_stream",
  "snapshot_http_response",
  "snapshot_http_response_allow_body_errors",
  "snapshot_response",
  "strip_type_hints",
  "type_hint_to_schema",
  "validate_content_length",
  "validate_content_type_headers",
  "validate_content_type_headers_and_classify",
  "validate_content_type_middleware",
  "validate_cors_request",
  "validate_json_content_type",
  "validate_jsonrpc_method_name",
  "validate_method_name",
  # Internal testing helpers — low-level plumbing, not part of the binding surface
  "build_multipart_body",
  "encode_urlencoded_body",
  # test_client_from_app takes App (a Rust-only builder with closure handlers);
  # bindings cannot construct App — each binding exposes its own factory method
  # (language-native handler registration → TestClient) in the packages/ wrapper.
  "test_client_from_app",
  # AsyncAPI axum handler functions: take axum extractors (Json, State) that alef
  # cannot map to binding types. These are route handlers, not user-facing API.
  "handle_asyncapi_validate",
  "handle_asyncapi_json",
  "handle_asyncapi_parse",
  # AsyncAPI helpers: internal implementation; not user-facing API.
  "parse_asyncapi_value",
  "validate_message",
]

[crates.lint.python]
precondition = "command -v ruff >/dev/null 2>&1"
format = "ruff format packages/python/"
check = "ruff check packages/python/"
typecheck = "mypy packages/python/"

[crates.lint.node]
precondition = "command -v pnpm >/dev/null 2>&1"
format = "pnpm dlx oxfmt crates/spikard-node"
check = "pnpm dlx oxlint --fix crates/spikard-node"
typecheck = "pnpm tsc --noEmit -p crates/spikard-node/tsconfig.json"

[crates.lint.ruby]
precondition = "command -v bundle >/dev/null 2>&1"
format = "cd packages/ruby && bundle exec rubocop -A"
check = "cd packages/ruby && bundle exec rubocop"
typecheck = "cd packages/ruby && bundle exec steep check"

[crates.lint.php]
precondition = "command -v php >/dev/null 2>&1"
format = "cd packages/php && composer run format"
check = "cd packages/php && composer run lint"

[crates.lint.elixir]
precondition = "command -v mix >/dev/null 2>&1"
typecheck = "cd packages/elixir && mix dialyzer"

[crates.lint.go]
precondition = "command -v go >/dev/null 2>&1"
before = "cargo build --release -p spikard-ffi"
check = "cd packages/go && go vet ./..."

[crates.lint.java]
precondition = "command -v mvn >/dev/null 2>&1"
check = "mvn -f packages/java/pom.xml -B -DskipTests verify"

[crates.lint.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
format = "dotnet format packages/csharp/Spikard/Spikard.csproj"
check = "dotnet format packages/csharp/Spikard/Spikard.csproj --verify-no-changes"

[crates.lint.kotlin]
precondition = "command -v gradle >/dev/null 2>&1"
format = "cd packages/kotlin && gradle ktlintFormat --no-daemon"
check = "cd packages/kotlin && gradle ktlintCheck --no-daemon"

[crates.lint.dart]
precondition = "command -v dart >/dev/null 2>&1"
format = "cd packages/dart && dart format ."
check = "cd packages/dart && dart analyze"

[crates.lint.swift]
precondition = "command -v swift >/dev/null 2>&1"
format = "swift format --in-place --recursive packages/swift/Sources"
check = "swift format lint --recursive packages/swift/Sources"

[crates.lint.zig]
precondition = "command -v zig >/dev/null 2>&1"
format = "cd packages/zig && zig fmt src"
check = "cd packages/zig && zig fmt --check src"

[crates.lint.wasm]
precondition = "command -v pnpm >/dev/null 2>&1"
format = "pnpm dlx oxfmt crates/spikard-wasm"
check = "pnpm dlx oxlint --fix crates/spikard-wasm"

[crates.lint.ffi]
precondition = "test -d crates/spikard-ffi/include"
check = "find crates/spikard-ffi/include -name '*.h' | xargs clang-format --dry-run --Werror"

# `--no-install-project`: the uv project lives at crates/spikard-py/src/, but its
# maturin `manifest-path` (../../crates/spikard-py/Cargo.toml) only resolves from the
# deployed packages/python/ dir, so building the extension here fails. An upgrade only
# needs to relock dependencies — the extension is built separately via `maturin develop`.
[crates.update.python]
precondition = "command -v uv >/dev/null 2>&1"
update = "cd crates/spikard-py/src/ && uv sync --all-packages --all-extras --no-install-project"
upgrade = "cd crates/spikard-py/src/ && uv sync --all-packages --all-extras --upgrade --no-install-project"

[crates.update.kotlin]
precondition = "command -v gradle >/dev/null 2>&1"
update = "echo 'kotlin: no-op (versions pinned by generated Gradle files)'"
upgrade = "echo 'kotlin: no-op (versions pinned by generated Gradle files)'"

[crates.update.node]
precondition = "command -v pnpm >/dev/null 2>&1"
update = "pnpm up -r"
upgrade = ["rm -rf node_modules", "pnpm install", "pnpm up --latest -r -w"]

[crates.update.wasm]
precondition = "command -v pnpm >/dev/null 2>&1"
update = "pnpm up -r"
upgrade = ["rm -rf node_modules", "pnpm install", "pnpm up --latest -r -w"]

[crates.update.dart]
precondition = "command -v dart >/dev/null 2>&1"
update = "cd packages/dart && dart pub upgrade"
upgrade = "cd packages/dart && dart pub upgrade --major-versions"

[crates.update.swift]
precondition = "command -v swift >/dev/null 2>&1"
update = "cd packages/swift && swift package update"
upgrade = "cd packages/swift && swift package update"

[crates.update.zig]
precondition = "command -v zig >/dev/null 2>&1"
update = "cd packages/zig && zig build --fetch"
upgrade = "cd packages/zig && zig build --fetch"

[crates.test.rust]
precondition = "command -v cargo >/dev/null 2>&1"
command = "cargo test --manifest-path e2e/rust/Cargo.toml --workspace"
e2e = "cargo test --manifest-path e2e/rust/Cargo.toml --workspace"

[crates.test.python]
precondition = "command -v uv >/dev/null 2>&1"
before = "cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release"
command = "uv run pytest packages/python/tests/"
e2e = "uv run pytest e2e/python/"

[crates.test.node]
precondition = "command -v pnpm >/dev/null 2>&1"
before = "cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release && pnpm install && pnpm --filter @spikard/node exec napi build --platform --release"
command = ":"
e2e = "pnpm --filter @spikard/node-e2e-typescript exec vitest run --config vitest.config.ts --reporter dot"

[crates.test.ruby]
precondition = "command -v bundle >/dev/null 2>&1"
before = "cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release && cd packages/ruby && bundle install --quiet && bundle exec rake compile"
e2e = "cd e2e/ruby && bundle install --quiet && bundle exec rspec"

[crates.test.php]
precondition = "command -v php >/dev/null 2>&1"
before = "cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release"
e2e = "cd e2e/php && composer install --no-interaction --quiet && php run_tests.php"

[crates.test.elixir]
precondition = "command -v mix >/dev/null 2>&1"
before = "cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release"
e2e = "cd e2e/elixir && mix deps.get && RUSTLER_PRECOMPILED_FORCE_BUILD_ALL=1 mix test"

[crates.test.go]
precondition = "command -v go >/dev/null 2>&1"
before = "cargo build --release -p spikard-ffi && cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release"
e2e = "cd e2e/go && go test ./... -count=1"

[crates.test.java]
precondition = "command -v mvn >/dev/null 2>&1"
before = "cargo build --release -p spikard-ffi && cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release && mvn -f packages/java/pom.xml package -DskipTests -q"
command = ":"
e2e = "cd e2e/java && mvn test -q"

[crates.test.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
before = "cargo build --release -p spikard-ffi && cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release"
command = ":"
e2e = "dotnet test e2e/csharp -p:NuGetAudit=false"

[crates.test.kotlin]
precondition = "command -v gradle >/dev/null 2>&1"
before = "cargo build --release -p spikard-ffi && cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release"
command = "cd packages/kotlin && gradle test --no-daemon"
e2e = "cd e2e/kotlin && gradle test --no-daemon"

[crates.test.dart]
precondition = "command -v dart >/dev/null 2>&1"
before = "cargo build --release --manifest-path packages/dart/rust/Cargo.toml && cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release"
command = ":"
e2e = "cd e2e/dart && mkdir -p rust/target/release && DART_LIB_EXT=so; case \"$(uname)\" in Darwin) DART_LIB_EXT=dylib;; MINGW*|MSYS*|CYGWIN*) DART_LIB_EXT=dll;; esac; cp \"../../packages/dart/rust/target/release/libspikard_dart.$DART_LIB_EXT\" rust/target/release/ && dart pub get && rm -f /tmp/alef_dart_ms.log; (tail -f /dev/null | ../rust/target/release/mock-server ../../fixtures) >/tmp/alef_dart_ms.log 2>&1 </dev/null & MS=$!; for i in $(seq 1 100); do U=$(sed -n 's/^MOCK_SERVER_URL=//p' /tmp/alef_dart_ms.log | head -1); [ -n \"$U\" ] && break; sleep 0.1; done; MOCK_SERVER_URL=\"$U\" dart test; RC=$?; kill $MS 2>/dev/null || true; wait $MS 2>/dev/null || true; exit $RC"

[crates.test.swift]
precondition = "command -v swift >/dev/null 2>&1"
before = "cargo build --release -p spikard-swift && cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release"
command = ":"
e2e = "cd e2e/swift_e2e && CLANG_MODULE_CACHE_PATH=.build/clang-module-cache swift test"

[crates.test.zig]
precondition = "command -v zig >/dev/null 2>&1"
before = "cargo build --release -p spikard-ffi && cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release"
command = ":"
e2e = "cd e2e/zig && rm -f /tmp/alef_zig_ms.log; (tail -f /dev/null | ../rust/target/release/mock-server ../../fixtures) >/tmp/alef_zig_ms.log 2>&1 </dev/null & MS=$!; for i in $(seq 1 200); do U=$(sed -n 's/^MOCK_SERVER_URL=//p' /tmp/alef_zig_ms.log | head -1); [ -n \"$U\" ] && break; sleep 0.1; done; echo \"MOCK_SERVER_URL=$U\"; if [ -z \"$U\" ]; then echo '--- mock-server log ---'; cat /tmp/alef_zig_ms.log; kill $MS 2>/dev/null || true; exit 1; fi; MOCK_SERVER_URL=\"$U\" zig build test --summary all; RC=$?; if [ $RC -ne 0 ]; then echo '--- mock-server log ---'; cat /tmp/alef_zig_ms.log; fi; kill $MS 2>/dev/null || true; wait $MS 2>/dev/null || true; exit $RC"

[crates.test.wasm]
precondition = "command -v wasm-pack >/dev/null 2>&1"
before = "cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release && wasm-pack build crates/spikard-wasm --release --target bundler && cd e2e/wasm && pnpm install"
e2e = "cd e2e/wasm && pnpm vitest run"

[crates.publish]
core_crate = "crates/spikard"

# ruby + elixir intentionally use alef's default `Registry` vendor mode: their
# native ext / NIF builds the Rust crate from source on the user's machine and
# pulls spikard from crates.io (path-deps rewritten to registry version-deps).
# The old `core-only` vendoring left an unresolvable `path =` in the shipped
# manifest, which is exactly issue #87 (gem fails to install).
[crates.publish.languages.elixir]
nif_versions = ["2.16", "2.17"]

[crates.e2e]
fixtures = "fixtures"
output = "e2e"
languages = [
  "python",
  "node",
  "ruby",
  "php",
  "elixir",
  "rust",
  "go",
  "java",
  "csharp",
  "kotlin",
  "dart",
  "swift",
  "zig",
  # wasm is included; alef auto-skips HTTP-shaped fixtures (those with
  # `mock_response` or `http.expected_response`) for the wasm target because
  # the wasm binding exports validateJsonSchema + problemDetails only, not the
  # handle_request HTTP adapter. Non-HTTP fixtures still generate runnable tests.
  "wasm",
  # brew: a Homebrew formula test app (registry mode) that installs the published
  # CLI via `brew install` and exercises it, verifying the tap/bottle release.
  "brew",
]

[crates.e2e.call]
result_var = "response"
async = true
method = "POST"

