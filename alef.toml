[workspace]
alef_version = "0.34.10"
languages = [
    "python",
    "node",
    "ruby",
    "php",
    "elixir",
    "ffi",
    "go",
    "java",
    "csharp",
    "kotlin",
    "kotlin_android",
    "dart",
    "swift",
    "zig",
    "wasm",
]

[workspace.dto]
python = "dataclass"
python_output = "typed-dict"
node = "interface"
ruby = "struct"
php = "readonly-class"
elixir = "struct"
go = "struct"
java = "record"
csharp = "record"
kotlin = "data-class"
kotlin_android = "data-class"
dart = "class"
swift = "struct"
zig = "struct"

[workspace.format]
enabled = false

[workspace.sync]
extra_paths = []

[[workspace.sync.text_replacements]]
path = "crates/spikard-http/src/lib.rs"
search = 'version = "\d+\.\d+\.\d+"'
replace = 'version = "{version}"'

[workspace.opaque_types]
# not attempt to model the parameterised type as a `#[wasm_bindgen]` class.
Request = "axum::http::Request<axum::body::Body>"
RequestData = "spikard_http::handler_trait::RequestData"
HandlerResult = "spikard_http::handler_trait::HandlerResult"

[workspace.poly]
exclude = [
    "crates/spikard-ffi/include/spikard.h",
    "crates/spikard-node/service_http_additions.ts",
    "packages/go/include/spikard.h",
]
file-safety-exclude = ["**/*.rs", "**/app_harness.*", "**/run_tests.*"]

[workspace.poly.uncomment]
enabled = true
remove-todos = false
remove-fixme = false
remove-docs = false
use-default-ignores = true
preserve-patterns = ["SAFETY", "HACK", "WORKAROUND", "NOTE"]

[workspace.poly.typos.extend-words]
bre = "bre"
caf = "caf"
Caf = "Caf"
enumerables = "enumerables"
Enumerables = "Enumerables"
fo = "fo"
Fo = "Fo"
FO = "FO"
fre = "fre"
hte = "hte"
Hte = "Hte"
Iz = "Iz"
Jod = "Jod"
lsit = "lsit"
nam = "nam"
ND = "ND"
Parm = "Parm"
ser = "ser"
tre = "tre"
Tre = "Tre"
Ue = "Ue"
ure = "ure"
Userr = "Userr"
wre = "wre"

[workspace.poly.per-file-ignores]
"scripts/**/*.py" = ["RUF100"]
"templates/readme/**" = ["MD057"]
"docs/reference/feature-parity.md" = ["MD057"]
"CHANGELOG.md" = ["MD057"]
"crates/spikard-elixir/**" = ["comment", "doc-comment"]
"crates/spikard-ffi/**" = ["comment", "doc-comment"]
"crates/spikard-node/**" = ["comment", "doc-comment", "no-unused-vars"]
"crates/spikard-php/**" = ["comment", "doc-comment"]
"crates/spikard-py/**" = ["comment", "doc-comment"]
"crates/spikard-wasm/**" = ["comment", "doc-comment"]
"packages/**" = ["comment", "doc-comment", "no-unused-vars"]
"e2e/**" = ["comment", "doc-comment", "D101", "D415", "no-loss-of-precision", "PTH100", "PTH118", "PTH120"]
"test_apps/**" = ["comment", "doc-comment", "no-loss-of-precision"]
"Package.swift" = ["comment", "doc-comment"]

[workspace.poly.pyrefly-sub-configs]
"**/app.py" = ["bad-argument-type"]
"**/schema.py" = ["missing-import"]
"**/datastructures.py" = ["missing-module-attribute"]

[[crates]]
name = "spikard"
core_import = "spikard"
sources = []
version_from = "Cargo.toml"
workspace_root = "."
features = ["di"]
auto_path_mappings = false
suppress_validation_codes = [
    "lossy_sanitized_surface",
    "unknown_named_type",
    "json_value_resolution_ambiguous",
    "backend_stub_path",
]

[[crates.source_crates]]
name = "spikard"
sources = ["crates/spikard/src/lib.rs", "crates/spikard/src/upload.rs", "crates/spikard/src/testing.rs"]

[[crates.source_crates]]
name = "spikard-core"
sources = [
    "crates/spikard-core/src/http.rs",
    "crates/spikard-core/src/request_data.rs",
    "crates/spikard-core/src/router.rs",
    "crates/spikard-core/src/lifecycle.rs",
    "crates/spikard-core/src/parameters.rs",
    "crates/spikard-core/src/validation/mod.rs",
    "crates/spikard-core/src/errors.rs",
    "crates/spikard-core/src/problem.rs",
]

[[crates.source_crates]]
name = "spikard-http"
sources = [
    "crates/spikard-http/src/lib.rs",
    "crates/spikard-http/src/handler_trait.rs",
    "crates/spikard-http/src/response.rs",
    "crates/spikard-http/src/auth.rs",
    "crates/spikard-http/src/background.rs",
    "crates/spikard-http/src/openapi/mod.rs",
    "crates/spikard-http/src/sse.rs",
    "crates/spikard-http/src/websocket.rs",
    "crates/spikard-http/src/testing.rs",
    "crates/spikard-http/src/testing/test_client.rs",
]

[[crates.source_crates]]
name = "spikard-graphql"
sources = [
    "crates/spikard-graphql/src/error.rs",
    "crates/spikard-graphql/src/routes.rs",
    "crates/spikard-graphql/src/schema.rs",
]

[crates.extra_dependencies]
spikard-core = { path = "../spikard-core" }
spikard-http = { path = "../spikard-http" }
spikard-graphql = { path = "../spikard-graphql" }

[crates.python]
module_name = "_spikard"
pip_name = "spikard"
release_gil = true
features = ["di"]

[crates.python.stubs]
output = "packages/python/spikard/"

[crates.python.extra_dependencies]
tokio = { version = "1", features = ["full"] }
axum = { version = "0.8", default-features = false }

[crates.build_commands.python]
precondition = "command -v maturin >/dev/null 2>&1"
build = "cd packages/python && maturin develop"
build_release = "cd packages/python && maturin develop --release"

[crates.node]
package_name = "@spikard/node"
features = ["di"]
exclude_platforms = ["darwin-x64"]

[crates.node.extra_dependencies]
tokio = { version = "1", features = ["full"] }
axum = { version = "0.8", default-features = false }

[crates.ruby]
gem_name = "spikard"
features = ["di"]
exclude_types = ["HandlerResult", "Request", "RequestData"]

[crates.ruby.extra_dependencies]
spikard-core = { path = "../../../../../crates/spikard-core" }
spikard-graphql = { path = "../../../../../crates/spikard-graphql" }
spikard-http = { path = "../../../../../crates/spikard-http" }

[crates.ruby.stubs]
output = "packages/ruby/sig/"

[crates.build_commands.ruby]
precondition = "command -v cargo >/dev/null 2>&1"
build = "cargo build --manifest-path packages/ruby/ext/spikard_rb/native/Cargo.toml"
build_release = "cargo build --manifest-path packages/ruby/ext/spikard_rb/native/Cargo.toml --release"

[crates.php]
extension_name = "spikard_php"
feature_gate = "extension-module"
features = ["di"]
exclude_types = ["TestClient"]

[crates.php.extra_dependencies]
axum = { version = "0.8", default-features = false }

[crates.elixir]
app_name = "spikard"
features = ["di"]
nif_targets = [
    "aarch64-apple-darwin",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
]
exclude_types = ["UploadFile", "TestClient", "HandlerResult", "Request", "RequestData"]

[crates.elixir.extra_dependencies]
spikard-core = { path = "../../../../crates/spikard-core" }
spikard-graphql = { path = "../../../../crates/spikard-graphql" }
spikard-http = { path = "../../../../crates/spikard-http" }

[crates.build_commands.elixir]
precondition = "command -v mix >/dev/null 2>&1"
build = "cd packages/elixir && mix compile"
build_release = "cd packages/elixir && MIX_ENV=prod mix compile"

[crates.wasm]
package_name = "@spikard/node-wasm"
core_crate_override = "spikard-http"
exclude_extra_dependencies = ["spikard-core", "spikard-http", "spikard-graphql"]
features = ["di", "wasm"]
source_crate_remaps = ["spikard-core", "spikard"]
custom_rust_modules = ["dispatch"]
exclude_types = [
    "App",
    "AppError",
    "BackgroundJobMetadata",
    "BackgroundTaskConfig",
    "GrpcConfig",
    "GraphQLSubscriptionSnapshot",
    "ResponseSnapshot",
    "RouteBuilder",
    "SnapshotError",
    "SseEvent",
    "SseEventProducer",
    "StaticFilesConfig",
    "WebSocketHandler",
    "WebSocketMessage",
    "UploadFile",
    "GraphQLError",
    "GraphQLRouteConfig",
    "QueryMutationConfig",
    "QueryOnlyConfig",
    "SchemaConfig",
    "FullSchemaConfig",
    "DynamicSchemaConfig",
    "FieldErrorSpec",
]

[crates.wasm.extra_dependencies]
axum = { version = "0.8", default-features = false, features = ["http1", "json", "matched-path", "query", "tower-log"] }
http-body-util = "0.1"
serde = { version = "1", features = ["derive"] }
serde_bytes = "0.11"
tower = "0.5"

[crates.wasm.exclude_fields]
ServerConfig = ["grpc", "background_tasks", "enable_http_trace"]

[crates.ffi]
prefix = "spikard"
header_name = "spikard.h"
lib_name = "spikard_ffi"
visitor_callbacks = false
exclude_types = [
    "TestClient",
    "ResponseSnapshot",
    "SnapshotError",
    "GraphQLSubscriptionSnapshot",
    "WebSocketMessage",
    "MultipartFilePart",
]

[crates.ffi.extra_dependencies]
axum = { version = "0.8", default-features = false }

[crates.go]
module = "github.com/Goldziher/spikard"
package_name = "spikard"

[crates.java]
package = "dev.spikard"
ffi_style = "panama"

[crates.dart]
pubspec_name = "spikard"
lib_name = "spikard"
style = "frb"

[crates.dart.extra_dependencies]
spikard-core = { path = "../../../crates/spikard-core" }
spikard-graphql = { path = "../../../crates/spikard-graphql" }
spikard-http = { path = "../../../crates/spikard-http" }
axum = { version = "0.8", default-features = false }

[crates.build_commands.dart]
precondition = "command -v cargo >/dev/null 2>&1"
before = "cd packages/dart && dart pub get"
build = "cargo build --manifest-path packages/dart/rust/Cargo.toml"
build_release = "cargo build --release --manifest-path packages/dart/rust/Cargo.toml"

[crates.kotlin]
package = "dev.spikard"
target = "jvm"

[crates.kotlin_android]
package = "dev.spikard"
target = "android"

[crates.swift]
module_name = "Spikard"
package_name = "Spikard"

[crates.swift.extra_dependencies]
spikard-core = { path = "../../../crates/spikard-core" }
spikard-graphql = { path = "../../../crates/spikard-graphql" }
spikard-http = { path = "../../../crates/spikard-http" }
axum = { version = "0.8", default-features = false }

[crates.csharp]
namespace = "Spikard"
project_file = "packages/csharp/Spikard/Spikard.csproj"

[crates.build_commands.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
build = "dotnet build packages/csharp/Spikard/Spikard.csproj --configuration Debug --verbosity quiet -p:NuGetAudit=false"
build_release = "dotnet build packages/csharp/Spikard/Spikard.csproj --configuration Release --verbosity quiet -p:NuGetAudit=false"

[crates.build_commands.kotlin]
precondition = "command -v gradle >/dev/null 2>&1"
before = "cargo build -p spikard-ffi"
build = "cd packages/kotlin && gradle build -x test --no-daemon"
build_release = "cd packages/kotlin && gradle build -x test --no-daemon"

[crates.build_commands.kotlin_android]
precondition = "command -v gradle >/dev/null 2>&1"
before = "cargo build -p spikard-ffi"
build = ":"
build_release = ":"

[crates.build_commands.swift]
precondition = "command -v swift >/dev/null 2>&1"
build = "INPUT_PACKAGE_DIR=packages/swift INPUT_CRATE_NAME=spikard-swift INPUT_BUILD_PROFILE=dev INPUT_DRY_RUN=false bash ../kreuzberg-dev/actions/build-swift-package/scripts/build.sh && cd packages/swift && CLANG_MODULE_CACHE_PATH=.build/clang-module-cache swift build"
build_release = "INPUT_PACKAGE_DIR=packages/swift INPUT_CRATE_NAME=spikard-swift INPUT_BUILD_PROFILE=release INPUT_DRY_RUN=false bash ../kreuzberg-dev/actions/build-swift-package/scripts/build.sh && cd packages/swift && CLANG_MODULE_CACHE_PATH=.build/clang-module-cache swift build -c release"

[crates.build_commands.zig]
precondition = "command -v zig >/dev/null 2>&1"
before = "cargo build -p spikard-ffi"
build = "cd packages/zig && zig build -Dffi_path=../../target/debug"
build_release = "cd packages/zig && zig build -Doptimize=ReleaseSafe -Dffi_path=../../target/release"

[crates.zig]
module_name = "spikard"


[[crates.services]]
owner_type = "App"
constructor = "new"
configurators = ["config"]
skip_languages = ["wasm", "kotlin_android"]
host_app_inner_accessor = "self.inner.lock().expect(\"app mutex poisoned\")"

# NOTE: websocket/sse registrations are temporarily omitted. Their contracts
[[crates.services.registrations]]
method = "route"
callback_param = "handler"
callback_bound = "IntoHandler"
callback_contract = "Handler"

[[crates.services.registrations.variants]]
name = "get"
fixed = { method = "Get" }
doc = "Register a GET route at the given path."
languages = { python = { style = "decorator", handler_shape = "introspect_params" }, node = { style = "verb_decorator", handler_shape = "context_object" }, ruby = { style = "verb_decorator", handler_shape = "request_response" }, php = { style = "verb_decorator", handler_shape = "request_response" }, elixir = { style = "dsl", handler_shape = "context_object" }, go = { style = "verb_decorator", handler_shape = "request_response" }, java = { style = "verb_decorator", handler_shape = "context_object" }, csharp = { style = "attribute", handler_shape = "introspect_params", method_prefix = "Map" }, kotlin = { style = "dsl", handler_shape = "context_object" }, kotlin_android = { style = "dsl", handler_shape = "context_object" }, dart = { style = "verb_decorator", handler_shape = "request_response" }, swift = { style = "verb_decorator", handler_shape = "context_object" }, zig = { style = "verb_decorator", handler_shape = "request_response" } }

