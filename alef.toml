[workspace]
alef_version = "0.24.17"
languages = [
  "python",
  "node",
  "ruby",
  "php",
  "elixir",
  "ffi",
  "go",
  "java",
  "csharp",
  "kotlin",
  "kotlin_android",
  "dart",
  "swift",
  "zig",
  "wasm",
]

[workspace.dto]
python = "dataclass"
python_output = "typed-dict"
node = "interface"
ruby = "struct"
php = "readonly-class"
elixir = "struct"
go = "struct"
java = "record"
csharp = "record"
kotlin = "data-class"
kotlin_android = "data-class"
dart = "class"
swift = "struct"
zig = "struct"

[workspace.format]
enabled = false

[workspace.sync]
extra_paths = []

[[workspace.sync.text_replacements]]
path = "crates/spikard-http/src/lib.rs"
search = 'version = "\d+\.\d+\.\d+"'
replace = 'version = "{version}"'

# These types appear in handler-contract dispatch signatures and the service wire
# types but are not generated as binding types. Declaring them opaque makes alef
# treat them as known (black-box) references so the validator does not emit
# `unknown_named_type` for them.
[workspace.opaque_types]
# `Request` carries axum's `Body` generic; without `<axum::body::Body>` the wasm
# wrapper emits `Arc<axum::http::Request>` (E0107) and the FFI `_free` shim emits
# `*mut axum::http::Request` (E0107). Including the generic in the rust_path also
# triggers alef's "skip wasm wrapper for generic paths" rule so wasm-bindgen does
# not attempt to model the parameterised type as a `#[wasm_bindgen]` class.
Request = "axum::http::Request<axum::body::Body>"
RequestData = "spikard_http::handler_trait::RequestData"
HandlerResult = "spikard_http::handler_trait::HandlerResult"

[[crates]]
name = "spikard"
core_import = "spikard"
sources = []
version_from = "Cargo.toml"
workspace_root = "."
features = ["di"]
auto_path_mappings = false
# Pre-existing surface gaps that alef v0.22.15's hardened validation now flags
# as errors. These types/methods are excluded from bindings via downstream
# config; the underlying surface fixes belong in the workspace cleanup tracked
# separately. Remove entries here once the upstream surface is repaired.
suppress_validation_codes = [
  "lossy_sanitized_surface",
  "unknown_named_type",
  "json_value_resolution_ambiguous",
  "backend_stub_path",
]

[[crates.source_crates]]
name = "spikard"
sources = [
  "crates/spikard/src/lib.rs",
  "crates/spikard/src/upload.rs",
  "crates/spikard/src/testing.rs",
]

[[crates.source_crates]]
name = "spikard-core"
sources = [
  "crates/spikard-core/src/http.rs",
  "crates/spikard-core/src/request_data.rs",
  "crates/spikard-core/src/router.rs",
  "crates/spikard-core/src/lifecycle.rs",
  "crates/spikard-core/src/parameters.rs",
  "crates/spikard-core/src/validation/mod.rs",
  "crates/spikard-core/src/errors.rs",
  "crates/spikard-core/src/problem.rs",
]

[[crates.source_crates]]
name = "spikard-http"
sources = [
  "crates/spikard-http/src/lib.rs",
  "crates/spikard-http/src/handler_trait.rs",
  "crates/spikard-http/src/response.rs",
  "crates/spikard-http/src/auth.rs",
  "crates/spikard-http/src/background.rs",
  "crates/spikard-http/src/openapi/mod.rs",
  "crates/spikard-http/src/sse.rs",
  "crates/spikard-http/src/websocket.rs",
  "crates/spikard-http/src/testing.rs",
  "crates/spikard-http/src/testing/test_client.rs",
]

[[crates.source_crates]]
name = "spikard-graphql"
sources = [
  "crates/spikard-graphql/src/error.rs",
  "crates/spikard-graphql/src/routes.rs",
  "crates/spikard-graphql/src/schema.rs",
]

[crates.extra_dependencies]
spikard-core = { path = "../spikard-core" }
spikard-http = { path = "../spikard-http" }
spikard-graphql = { path = "../spikard-graphql" }

[crates.python]
module_name = "_spikard"
pip_name = "spikard"
release_gil = true
features = ["di"]

[crates.python.stubs]
output = "packages/python/spikard/"

[crates.python.extra_dependencies]
tokio = { version = "1", features = ["full"] }
# Required by the generated service.rs handler bridge: the Handler::call trait
# signature uses axum::http::Request<axum::body::Body> (the bridge ignores the raw
# request and operates on the RequestData wire type, but must match the trait).
axum = { version = "0.8", default-features = false }

[crates.build_commands.python]
precondition = "command -v maturin >/dev/null 2>&1"
build = "cd packages/python && maturin develop"
build_release = "cd packages/python && maturin develop --release"

[crates.node]
package_name = "@spikard/node"
features = ["di"]

[crates.node.extra_dependencies]
serde_bytes = "0.11"
tokio = { version = "1", features = ["full"] }
# Required by alef-generated handler bridges that reference
# `axum::http::Request<axum::body::Body>` (declared opaque type).
axum = { version = "0.8", default-features = false }

[crates.ruby]
gem_name = "spikard"
features = ["di"]
# Magnus `TypedData` requires the wrapped Rust type to be `Send`. The declared
# opaque core types `HandlerResult`, `Request`, `RequestData` (declared in
# `[workspace.opaque_types]`) transitively contain `axum::body::Body` which is
# `!Send`, so emitting `magnus::wrap(class = "Spikard::HandlerResult") pub
# struct HandlerResult { inner: Arc<spikard_http::handler_trait::HandlerResult> }`
# fails to compile with E0277 "the trait `Send` is not implemented for
# `UnsyncBoxBody<Bytes, Error>`". Exclude them at the ruby binding level; Ruby
# consumers drive request handling through the high-level `App.serve` entrypoint
# and never touch raw HandlerResult/Request/RequestData wrappers.
exclude_types = ["HandlerResult", "Request", "RequestData"]

[crates.ruby.extra_dependencies]
spikard-core = { path = "../../../../../crates/spikard-core" }
spikard-graphql = { path = "../../../../../crates/spikard-graphql" }
spikard-http = { path = "../../../../../crates/spikard-http" }

[crates.ruby.stubs]
output = "packages/ruby/sig/"

[crates.build_commands.ruby]
precondition = "command -v cargo >/dev/null 2>&1"
build = "cargo build --manifest-path packages/ruby/ext/spikard_rb/native/Cargo.toml"
build_release = "cargo build --manifest-path packages/ruby/ext/spikard_rb/native/Cargo.toml --release"

[crates.php]
extension_name = "spikard_php"
feature_gate = "extension-module"
features = ["di"]
# Alef cannot map Option<serde_json::Value> parameters to PHP types — ext-php-rs
# has no FromZval impl for serde_json::Value. TestClient.graphql* methods accept
# Option<Value> variables maps. Exclude the entire class for PHP until alef
# serializes Value params to JSON-string at the PHP boundary; consumers can
# build/run TestClient via the public API in other bindings.
exclude_types = ["TestClient"]

[crates.elixir]
app_name = "spikard"
features = ["di"]
nif_targets = [
  "aarch64-apple-darwin",
  "aarch64-unknown-linux-gnu",
  "x86_64-unknown-linux-gnu",
  "x86_64-pc-windows-msvc"
]
# Alef bug (track upstream):
# - UploadFile: alef emits a local elixir-side UploadFile struct AND From impls
#   that pass the local type to spikard::UploadFile::from, producing a type
#   mismatch. The binding works without it (no Elixir consumer can usefully
#   construct an UploadFile across the BEAM boundary).
# - TestClient: graphql_* methods take Option<serde_json::Value> for variables;
#   alef maps these to Option<String> in the elixir layer, causing a parameter
#   type mismatch. Same shape as the PHP issue.
#
# Rustler `Resource: Sized + Send + Sync + 'static` rejects the wrapper structs
# for declared opaque core types (HandlerResult, Request, RequestData) because
# they transitively contain `axum::body::Body` which is `!Send`. Same root cause
# as the magnus exclusion in `[crates.ruby]`; Elixir consumers do not interact
# with these raw handle types directly.
exclude_types = ["UploadFile", "TestClient", "HandlerResult", "Request", "RequestData"]

[crates.elixir.extra_dependencies]
spikard-core = { path = "../../../../crates/spikard-core" }
spikard-graphql = { path = "../../../../crates/spikard-graphql" }
spikard-http = { path = "../../../../crates/spikard-http" }

[crates.build_commands.elixir]
precondition = "command -v mix >/dev/null 2>&1"
build = "cd packages/elixir && mix compile"
build_release = "cd packages/elixir && MIX_ENV=prod mix compile"

[crates.wasm]
package_name = "@spikard/node-wasm"
core_crate_override = "spikard-http"
exclude_extra_dependencies = ["spikard-core", "spikard-http", "spikard-graphql"]
features = ["di", "wasm"]
source_crate_remaps = ["spikard-core", "spikard"]
custom_rust_modules = ["dispatch"]
exclude_types = [
  "App",
  "AppError",
  "BackgroundJobMetadata",
  "BackgroundTaskConfig",
  "GrpcConfig",
  "GraphQLSubscriptionSnapshot",
  "ResponseSnapshot",
  "RouteBuilder",
  "SnapshotError",
  "SseEvent",
  "SseEventProducer",
  "StaticFilesConfig",
  "WebSocketHandler",
  "WebSocketMessage",
  # UploadFile lives in the spikard facade (crates/spikard/src/upload.rs); the
  # wasm binding depends on spikard-http directly, which doesn't re-export it.
  "UploadFile",
  # spikard-graphql is not in the wasm dep tree
  "GraphQLError",
  "GraphQLRouteConfig",
  "QueryMutationConfig",
  "QueryOnlyConfig",
  # SchemaConfig and FullSchemaConfig are from spikard-graphql; they're
  # re-exported via the spikard facade but the wasm crate doesn't use them.
  "SchemaConfig",
  "FullSchemaConfig",
]

[crates.wasm.extra_dependencies]
axum = { version = "0.8", default-features = false, features = [
  "http1",
  "json",
  "matched-path",
  "query",
  "tower-log",
] }
http-body-util = "0.1"
serde = { version = "1", features = ["derive"] }
serde_bytes = "0.11"
tower = "0.5"

[crates.wasm.exclude_fields]
ServerConfig = ["grpc", "background_tasks", "enable_http_trace"]

[crates.ffi]
prefix = "spikard"
header_name = "spikard.h"
lib_name = "spikard_ffi"
visitor_callbacks = false
exclude_types = [
  "TestClient",
  "ResponseSnapshot",
  "SnapshotError",
  "GraphQLSubscriptionSnapshot",
  "WebSocketMessage",
  "MultipartFilePart",
]

# Alef declares `Request = "axum::http::Request"` as a workspace opaque, and its
# FFI codegen emits `_free(ptr: *mut axum::http::Request)` lifecycle symbols so the
# C-side consumers can free handles. The binding crate therefore needs axum as a
# direct dependency.
[crates.ffi.extra_dependencies]
axum = { version = "0.8", default-features = false }

[crates.go]
module = "github.com/Goldziher/spikard"
package_name = "spikard"

[crates.java]
package = "dev.spikard"
ffi_style = "panama"

[crates.dart]
pubspec_name = "spikard"
lib_name = "spikard"
style = "frb"

[crates.dart.extra_dependencies]
spikard-core = { path = "../../../crates/spikard-core" }
spikard-graphql = { path = "../../../crates/spikard-graphql" }
spikard-http = { path = "../../../crates/spikard-http" }
# `Request = "axum::http::Request<axum::body::Body>"` (declared in
# `[workspace.opaque_types]`) generates FFI shims that reference `axum::http`
# and `axum::body` paths. Without axum as a direct dependency, dart-side
# `cargo build` fails with E0433 cannot find module `axum`. Same pattern as
# the FFI/node/swift extra_deps additions.
axum = { version = "0.8", default-features = false }

[crates.build_commands.dart]
precondition = "command -v cargo >/dev/null 2>&1"
before = "cd packages/dart && dart pub get"
build = "cargo build --manifest-path packages/dart/rust/Cargo.toml"
build_release = "cargo build --release --manifest-path packages/dart/rust/Cargo.toml"

[crates.kotlin]
package = "dev.spikard"
target = "jvm"

[crates.kotlin_android]
package = "dev.spikard"
target = "android"

[crates.swift]
module_name = "Spikard"
package_name = "Spikard"

[crates.swift.extra_dependencies]
spikard-core = { path = "../../../crates/spikard-core" }
spikard-graphql = { path = "../../../crates/spikard-graphql" }
spikard-http = { path = "../../../crates/spikard-http" }
# Required by alef-generated handler bridges that reference
# `axum::http::Request<axum::body::Body>` (declared opaque type).
axum = { version = "0.8", default-features = false }

[crates.csharp]
namespace = "Spikard"
project_file = "packages/csharp/Spikard/Spikard.csproj"

[crates.build_commands.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
build = "dotnet build packages/csharp/Spikard/Spikard.csproj --configuration Debug --verbosity quiet -p:NuGetAudit=false"
build_release = "dotnet build packages/csharp/Spikard/Spikard.csproj --configuration Release --verbosity quiet -p:NuGetAudit=false"

[crates.build_commands.kotlin]
precondition = "command -v gradle >/dev/null 2>&1"
before = "cargo build -p spikard-ffi"
build = "cd packages/kotlin && gradle build -x test --no-daemon"
build_release = "cd packages/kotlin && gradle build -x test --no-daemon"

[crates.build_commands.kotlin_android]
# Android library scaffold (packages/kotlin-android/build.gradle.kts + AGP)
# is not yet emitted by alef's kotlin_android backend. Binding code is compiled
# via the cargo-built JNI ffi crate; e2e tests build their own gradle project
# under e2e/kotlin_android/. Binding-level gradle build is a no-op until alef
# emits a full Android library scaffold.
precondition = "command -v gradle >/dev/null 2>&1"
before = "cargo build -p spikard-ffi"
build = ":"
build_release = ":"

[crates.build_commands.swift]
precondition = "command -v swift >/dev/null 2>&1"
build = "INPUT_PACKAGE_DIR=packages/swift INPUT_CRATE_NAME=spikard-swift INPUT_BUILD_PROFILE=dev INPUT_DRY_RUN=false bash ../kreuzberg-dev/actions/build-swift-package/scripts/build.sh && cd packages/swift && CLANG_MODULE_CACHE_PATH=.build/clang-module-cache swift build"
build_release = "INPUT_PACKAGE_DIR=packages/swift INPUT_CRATE_NAME=spikard-swift INPUT_BUILD_PROFILE=release INPUT_DRY_RUN=false bash ../kreuzberg-dev/actions/build-swift-package/scripts/build.sh && cd packages/swift && CLANG_MODULE_CACHE_PATH=.build/clang-module-cache swift build -c release"

[crates.build_commands.zig]
precondition = "command -v zig >/dev/null 2>&1"
before = "cargo build -p spikard-ffi"
build = "cd packages/zig && zig build -Dffi_path=../../target/debug"
build_release = "cd packages/zig && zig build -Doptimize=ReleaseSafe -Dffi_path=../../target/release"

[crates.zig]
module_name = "spikard"

# ---------------------------------------------------------------------------
# Service API — App builder + handler contracts
# ---------------------------------------------------------------------------

[[crates.services]]
owner_type = "App"
constructor = "new"
configurators = ["config"]
skip_languages = ["wasm", "kotlin_android"]
# napi `JsApp` (and the parallel wrappers in other host backends) wrap the real
# owner behind `inner: Arc<Mutex<spikard::App>>`. The verb-method emission needs
# to unlock that mutex before forwarding to the base method on the real owner.
host_app_inner_accessor = "self.inner.lock().expect(\"app mutex poisoned\")"

# NOTE: websocket/sse registrations are temporarily omitted. Their contracts
# (WebSocketHandler/SseEventProducer) use `-> impl Future` (RPITIT) return types and
# are NOT dyn-compatible, so the current `Arc<dyn Contract>` handler-bridge codegen
# cannot wrap them. Re-add once the service-API codegen supports non-object-safe
# contracts via a concrete wrapper struct instead of a trait object.
[[crates.services.registrations]]
method = "route"
callback_param = "handler"
callback_bound = "IntoHandler"
callback_contract = "Handler"

[[crates.services.registrations.variants]]
name = "get"
fixed = { method = "Get" }
doc = "Register a GET route at the given path."
# Per-language emission style and handler-shape overrides.
# Parsed by alef when RegistrationVariantSpec.languages is wired; ignored by
# earlier versions. All verb variants share the same per-language overrides.
languages = { python = { style = "decorator", handler_shape = "introspect_params" }, node = { style = "verb_decorator", handler_shape = "context_object" }, ruby = { style = "verb_decorator", handler_shape = "request_response" }, php = { style = "verb_decorator", handler_shape = "request_response" }, elixir = { style = "dsl", handler_shape = "context_object" }, go = { style = "verb_decorator", handler_shape = "request_response" }, java = { style = "verb_decorator", handler_shape = "context_object" }, csharp = { style = "attribute", handler_shape = "introspect_params", method_prefix = "Map" }, kotlin = { style = "dsl", handler_shape = "context_object" }, kotlin_android = { style = "dsl", handler_shape = "context_object" }, dart = { style = "verb_decorator", handler_shape = "request_response" }, swift = { style = "verb_decorator", handler_shape = "context_object" }, zig = { style = "verb_decorator", handler_shape = "request_response" } }

[[crates.services.registrations.variants]]
