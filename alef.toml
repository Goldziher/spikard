version = "0.11.13"
languages = [
  "python",
  "node",
  "ruby",
  "php",
  "elixir",
  "ffi",
  "go",
  "java",
  "csharp",
  "kotlin",
  "dart",
  "gleam",
  "wasm",
]

[crate]
name = "spikard"
core_import = "spikard"
sources = []
version_from = "Cargo.toml"
workspace_root = "."
features = ["di"]
auto_path_mappings = false

[[crate.source_crates]]
name = "spikard"
sources = ["crates/spikard/src/upload.rs"]

[[crate.source_crates]]
name = "spikard-core"
sources = [
  "crates/spikard-core/src/http.rs",
  "crates/spikard-core/src/request_data.rs",
  "crates/spikard-core/src/router.rs",
  "crates/spikard-core/src/lifecycle.rs",
  "crates/spikard-core/src/parameters.rs",
  "crates/spikard-core/src/validation/mod.rs",
  "crates/spikard-core/src/errors.rs",
  "crates/spikard-core/src/problem.rs",
]

[[crate.source_crates]]
name = "spikard-http"
sources = [
  "crates/spikard-http/src/lib.rs",
  "crates/spikard-http/src/handler_trait.rs",
  "crates/spikard-http/src/response.rs",
  "crates/spikard-http/src/auth.rs",
  "crates/spikard-http/src/background.rs",
  "crates/spikard-http/src/openapi/mod.rs",
  "crates/spikard-http/src/sse.rs",
  "crates/spikard-http/src/websocket.rs",
]

[[crate.source_crates]]
name = "spikard-graphql"
sources = [
  "crates/spikard-graphql/src/error.rs",
  "crates/spikard-graphql/src/routes.rs",
  "crates/spikard-graphql/src/schema.rs",
]

[crate.extra_dependencies]
spikard-core = { path = "../spikard-core" }
spikard-http = { path = "../spikard-http" }
spikard-graphql = { path = "../spikard-graphql" }
anyhow = "1.0"
futures = "0.3"

[exclude]
methods = [
  # std::io trait impls — require trait in scope, &mut [u8] params
  "UploadFile.read",
  "UploadFile.seek",
  # Methods with unknown external types (StatusCode, axum::Response, etc.)
  "ProblemDetails.status_code",
  "ProblemDetails.with_extension",
  "ProblemDetails.with_extensions",
  "ProblemDetails.from_validation_error",
  "ProblemDetails.internal_server_error_debug",
  "GraphQLError.to_graphql_response",
  "GraphQLError.to_http_response",
  # Methods returning type aliases or excluded types
  "SchemaConfig.validate",
  "SchemaConfig.set_introspection_enabled",
  "SchemaConfig.set_complexity_limit",
  "SchemaConfig.set_depth_limit",
  "ServerConfig.builder",
  # Methods with complex params not auto-delegatable
  "Route.from_metadata",
  "Route.with_jsonrpc_method",
  "Response.with_status",
  "SseEvent.with_type",
]
types = [
  # Not part of public API — closures, Arc<dyn Handler>, internal protocol types
  "Route",
  "RouteMetadata",
  "BackgroundHandle",
  "BackgroundJobError",
  "Claims",
  "GrpcRequestData",
  "GrpcResponseData",
  "JsonRpcRequestOrBatch",
  "JsonRpcResponseType",
  "ValidatedParams",
  # Internal implementation types
  "BackgroundJobFuture",
  "BackgroundRuntime",
  "BackgroundShutdownError",
  "ContentTypeKind",
  "Dependency",
  "DependencyContainer",
  "DependencyGraph",
  "DependencyInjectingHandler",
  "ErrorCondition",
  "ErrorMapper",
  "FactoryDependency",
  "FactoryDependencyBuilder",
  "FactoryFn",
  "FastRouter",
  "GenericGrpcService",
  "Handler",
  "HandlerResponse",
  "HandlerResult",
  "IntoHandler",
  "LifecycleHooks",
  "LifecycleHooksBuilder",
  "MessageStream",
  "MethodExample",
  "MethodMetadata",
  "PreParsedJson",
  "PreReadBody",
  "RegistryError",
  "ResolvedDependencies",
  "ResponseBodySize",
  "ResponseSnapshot",
  "RouteInfo",
  "RpcMode",
  "SchemaBuilder",
  "SnapshotError",
  "SseState",
  "SseStream",
  "ValidatingHandler",
  "WebSocketConnection",
  "WebSocketState",
  "WithoutBodyExtractionOptions",
  # Internal bindings types
  "RawResponse",
  "StaticAsset",
  "StructuredError",
  # Internal protocol types
  "JsonRpcState",
  "JsonRpcMethodRegistry",
  "JsonRpcRequest",
  "JsonRpcResponse",
  "JsonRpcError",
  "JsonRpcErrorResponse",
  "JsonRpcRouter",
  # Internal gRPC types
  "GrpcHandlerResult",
  "GrpcHandler",
  "GrpcRegistry",
  "StreamingRequest",
  "StreamingResponse",
  # Internal server types
  "Server",
  "ServerConfigBuilder",
  "StaticResponseHandler",
  "StaticResponse",
  "RouteHandler",
  "Router",
  "SchemaRegistry",
  # Opaque validators (can't cross FFI usefully)
  "SchemaValidator",
  "ParameterValidator",
  "ValidationError",
  "ValidationErrorDetail",
  # Traits (can't be instantiated in bindings)
  "SseEventProducer",
  "WebSocketHandler",
  # Internal enums with wrong module paths
  "ParameterSource",
  "WebSocketMessage",
  "BackgroundSpawnError",
  # Types causing residual errors
  "RequestData",
]
functions = [
  "add_cors_headers",
  "api_key_auth_middleware",
  "assemble_openapi_spec",
  "auto_generate_parameter_schema",
  "build_router_with_handlers",
  "build_router_with_handlers_and_config",
  "build_router_with_handlers_and_config_and_grpc",
  "build_server_runtime",
  "call_test_server",
  "connect_websocket",
  "convert_string_to_json_value",
  "copy_metadata",
  "create_request_data_with_body",
  "create_request_data_without_body",
  "empty_message_stream",
  "encode_grpc_message",
  "error_stream",
  "execute_with_lifecycle_hooks",
  "extract_cookies",
  "extract_headers",
  "extract_parameters_from_schema",
  "extract_path_param_names",
  "extract_query_params",
  "extract_raw_query_params",
  "generate_openapi_spec",
  "generate_openrpc_spec",
  "grpc_response_to_tonic",
  "handle_jsonrpc",
  "handle_preflight",
  "init",
  "is_enabled",
  "is_form_urlencoded",
  "is_grpc_request",
  "is_json_content_type",
  "is_json_like",
  "is_json_like_str",
  "is_multipart_form_data",
  "is_server_error",
  "json_schema_to_request_body",
  "json_schema_to_response",
  "json_value_to_schema",
  "jwt_auth_middleware",
  "merge_parameter_schemas",
  "message_stream_from_vec",
  "parse_grpc_client_stream",
  "parse_grpc_path",
  "parse_multipart_to_json",
  "parse_query_pairs_to_json",
  "parse_query_string",
  "parse_query_string_to_json",
  "parse_type_hints",
  "parse_unary_grpc_message",
  "parse_urlencoded_to_json",
  "route_grpc_request",
  "security_scheme_info_to_openapi",
  "single_message_stream",
  "snapshot_http_response",
  "snapshot_http_response_allow_body_errors",
  "snapshot_response",
  "strip_type_hints",
  "type_hint_to_schema",
  "validate_content_length",
  "validate_content_type_headers",
  "validate_content_type_headers_and_classify",
  "validate_content_type_middleware",
  "validate_cors_request",
  "validate_json_content_type",
  "validate_jsonrpc_method_name",
  "validate_method_name",
]

[output]
python = "crates/spikard-py/src/"
node = "crates/spikard-node/src/"
ruby = "crates/spikard-rb/src/"
php = "crates/spikard-php/src/"
elixir = "crates/spikard-elixir/src/"
ffi = "crates/spikard-ffi/src/"
go = "packages/go/"
java = "packages/java/src/main/java/"
csharp = "packages/csharp/src/"
kotlin = "packages/kotlin/src/main/kotlin/dev/spikard/"
dart = "packages/dart/lib/src/"
gleam = "packages/gleam/src/"
wasm = "crates/spikard-wasm/src/"

[python]
module_name = "_spikard"
pip_name = "spikard"
release_gil = true
features = ["di"]

[python.stubs]
output = "packages/python/spikard/"

[python.extra_dependencies]
tokio = { version = "1", features = ["full"] }

[node]
package_name = "@spikard/node"
features = ["di"]

[node.extra_dependencies]
tokio = { version = "1", features = ["full"] }

[ruby]
gem_name = "spikard"
features = ["di"]

[ruby.stubs]
output = "packages/ruby/sig/"

[php]
extension_name = "spikard_php"
feature_gate = "extension-module"
features = ["di"]

[elixir]
app_name = "spikard"
features = ["di"]

[ffi]
prefix = "spikard"
header_name = "spikard.h"
lib_name = "spikard_ffi"
visitor_callbacks = false

[go]
module = "github.com/Goldziher/spikard"
package_name = "spikard"

[java]
package = "dev.spikard"
ffi_style = "panama"

[csharp]
namespace = "Spikard"

[kotlin]
package = "dev.spikard"
target = "jvm"

[dart]
pubspec_name = "spikard"
lib_name = "spikard"
style = "frb"

[gleam]
app_name = "spikard"
nif_module = "Elixir.Spikard.Native"

[wasm]
# Spikard's server runtime cannot compile to WASM (axum/tokio/socket2 deps);
# scope wasm bindings to DTO + validation surface only. Server/transport types
# are already excluded globally above.

[update.kotlin]
precondition = "command -v gradle >/dev/null 2>&1"
update = "cd packages/kotlin && gradle dependencyUpdates --no-daemon"
upgrade = "cd packages/kotlin && gradle dependencyUpdates --refresh-dependencies --no-daemon"

[update.dart]
precondition = "command -v dart >/dev/null 2>&1"
update = "cd packages/dart && dart pub upgrade"
upgrade = "cd packages/dart && dart pub upgrade --major-versions"

[update.gleam]
precondition = "command -v gleam >/dev/null 2>&1"
update = "cd packages/gleam && gleam update"
upgrade = "cd packages/gleam && gleam update"

[dto]
python = "dataclass"
python_output = "typed-dict"
node = "interface"
ruby = "struct"
php = "readonly-class"
elixir = "struct"
go = "struct"
java = "record"
csharp = "record"
kotlin = "data-class"
dart = "class"
gleam = "type"
wasm = "interface"

[scaffold]
description = "Rust-centric multi-language HTTP framework with polyglot bindings"
license = "MIT"
repository = "https://github.com/Goldziher/spikard"
homepage = "https://github.com/Goldziher/spikard"
authors = ["Na'aman Hirschfeld <nhirschfeld@gmail.com>"]
keywords = ["http", "web", "framework", "polyglot", "rust"]

[readme]
discord_url = ""
banner_url = ""

[publish]
core_crate = "crates/spikard"

[publish.languages.ruby]
vendor_mode = "core-only"

[publish.languages.elixir]
vendor_mode = "core-only"
nif_versions = ["2.16", "2.17"]

[sync]
extra_paths = []

[[sync.text_replacements]]
path = "crates/spikard-http/src/lib.rs"
search = 'version = "\d+\.\d+\.\d+"'
replace = 'version = "{version}"'

[lint.python]
precondition = "command -v ruff >/dev/null 2>&1"
format = "ruff format packages/python/"
check = "ruff check packages/python/"
typecheck = "mypy packages/python/"

[lint.node]
precondition = "command -v pnpm >/dev/null 2>&1"
format = "pnpm biome format --write packages/node/"
check = "pnpm biome lint packages/node/"
typecheck = "pnpm tsc --noEmit -p packages/node/tsconfig.json"

[lint.ruby]
precondition = "command -v bundle >/dev/null 2>&1"
format = "cd packages/ruby && bundle exec rubocop -A"
check = "cd packages/ruby && bundle exec rubocop"
typecheck = "cd packages/ruby && bundle exec steep check"

[lint.php]
precondition = "command -v php >/dev/null 2>&1"
format = "cd packages/php && vendor/bin/php-cs-fixer fix"
check = "cd packages/php && vendor/bin/phpstan analyse"

[lint.elixir]
precondition = "command -v mix >/dev/null 2>&1"
typecheck = "cd packages/elixir && mix dialyzer"

[lint.go]
precondition = "command -v go >/dev/null 2>&1"
before = "cargo build --release -p spikard-ffi"
check = "cd packages/go && go vet ./..."

[lint.java]
precondition = "command -v mvn >/dev/null 2>&1"
check = "mvn -f packages/java/pom.xml -B -DskipTests verify"

[lint.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
format = "cd packages/csharp && dotnet format"
check = "cd packages/csharp && dotnet format --verify-no-changes"

[lint.kotlin]
precondition = "command -v gradle >/dev/null 2>&1"
format = "cd packages/kotlin && gradle ktlintFormat --no-daemon"
check = "cd packages/kotlin && gradle ktlintCheck --no-daemon"

[lint.dart]
precondition = "command -v dart >/dev/null 2>&1"
format = "cd packages/dart && dart format ."
check = "cd packages/dart && dart analyze"

[lint.gleam]
precondition = "command -v gleam >/dev/null 2>&1"
format = "cd packages/gleam && gleam format"
check = "cd packages/gleam && gleam format --check"

[lint.ffi]
precondition = "test -d crates/spikard-ffi/include"
check = "find crates/spikard-ffi/include -name '*.h' | xargs clang-format --dry-run --Werror"

[lint.wasm]
precondition = "test -d crates/spikard-wasm"
check = "cargo check -p spikard-wasm --target wasm32-unknown-unknown"

[test.python]
precondition = "command -v uv >/dev/null 2>&1"
command = "uv run pytest packages/python/tests/"
e2e = "uv run pytest e2e/python/"

[test.node]
precondition = "command -v pnpm >/dev/null 2>&1"
command = "pnpm --filter @spikard/node test"
e2e = "pnpm --filter @spikard/e2e-node test"

[test.ruby]
precondition = "command -v bundle >/dev/null 2>&1"
e2e = "cd e2e/ruby && bundle exec rspec"

[test.php]
precondition = "command -v php >/dev/null 2>&1"
command = "cd packages/php && vendor/bin/phpunit"
e2e = "cd e2e/php && vendor/bin/phpunit"

[test.elixir]
precondition = "command -v mix >/dev/null 2>&1"
e2e = "cd e2e/elixir && mix test"

[test.go]
precondition = "command -v go >/dev/null 2>&1"
before = "cargo build --release -p spikard-ffi"
e2e = "cd e2e/go && go test ./... -count=1"

[test.java]
precondition = "command -v mvn >/dev/null 2>&1"
before = "cargo build --release -p spikard-ffi"
command = "cd e2e/java && mvn test -q"
e2e = "cd e2e/java && mvn test -q"

[test.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
before = "cargo build --release -p spikard-ffi"
command = "dotnet test e2e/csharp"
e2e = "dotnet test e2e/csharp"

[test.kotlin]
precondition = "command -v gradle >/dev/null 2>&1"
before = "cargo build --release -p spikard-ffi"
command = "cd packages/kotlin && gradle test --no-daemon"
e2e = "cd e2e/kotlin && gradle test --no-daemon"

[test.dart]
precondition = "command -v dart >/dev/null 2>&1"
before = "cargo build --release -p spikard-ffi"
command = "cd packages/dart && dart pub get && dart test"
e2e = "cd e2e/dart && dart pub get && dart test"

[test.gleam]
precondition = "command -v gleam >/dev/null 2>&1"
before = "cd packages/elixir && mix deps.get && mix compile"
command = "cd packages/gleam && gleam test"
e2e = "cd e2e/gleam && gleam test"

[test.wasm]
precondition = "command -v wasm-pack >/dev/null 2>&1"
before = "wasm-pack build crates/spikard-wasm --release --target bundler"
e2e = "cd e2e/wasm && npm test"

[e2e]
fixtures = "fixtures"
output = "e2e"
languages = [
  "python",
  "node",
  "ruby",
  "php",
  "elixir",
  "go",
  "java",
  "csharp",
  "kotlin",
  "dart",
  "gleam",
  "wasm",
]

[e2e.call]
function = "handle_request"
module = "spikard"
result_var = "response"
async = true
method = "POST"

[e2e.packages.python]
name = "spikard"
path = "../../packages/python"

[e2e.packages.node]
name = "@spikard/node"
path = "../../packages/node"

[e2e.packages.ruby]
name = "spikard"
path = "../../packages/ruby"

[e2e.packages.php]
name = "spikard/spikard"
path = "../../packages/php"

[e2e.packages.elixir]
name = "spikard"
path = "../../packages/elixir"

[e2e.packages.go]
module = "github.com/Goldziher/spikard"
path = "../../packages/go"

[e2e.packages.java]
module = "dev.spikard"
path = "../../packages/java"

[e2e.packages.csharp]
name = "Spikard"
path = "../../packages/csharp/Spikard.csproj"

[e2e.packages.kotlin]
module = "dev.spikard"
path = "../../packages/kotlin"

[e2e.packages.dart]
name = "spikard"
path = "../../packages/dart"

[e2e.packages.gleam]
name = "spikard"
path = "../../packages/gleam"

[e2e.packages.wasm]
name = "@spikard/wasm"
path = "../../crates/spikard-wasm"

[e2e.registry]
output = "test_apps"
github_repo = "https://github.com/Goldziher/spikard"

[e2e.registry.packages.python]
name = "spikard"

[e2e.registry.packages.node]
name = "@spikard/node"

[e2e.registry.packages.ruby]
name = "spikard"

