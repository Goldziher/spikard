languages = ["python", "node", "ruby", "php", "elixir"]

[crate]
name = "spikard"
sources = []
version_from = "Cargo.toml"
workspace_root = "."
features = ["di"]
auto_path_mappings = false

[[crate.source_crates]]
name = "spikard"
sources = ["crates/spikard/src/upload.rs"]

[[crate.source_crates]]
name = "spikard-core"
sources = [
  "crates/spikard-core/src/http.rs",
  "crates/spikard-core/src/request_data.rs",
  "crates/spikard-core/src/router.rs",
  "crates/spikard-core/src/lifecycle.rs",
  "crates/spikard-core/src/parameters.rs",
  "crates/spikard-core/src/validation/mod.rs",
  "crates/spikard-core/src/errors.rs",
  "crates/spikard-core/src/problem.rs",
]

[[crate.source_crates]]
name = "spikard-http"
sources = [
  "crates/spikard-http/src/lib.rs",
  "crates/spikard-http/src/handler_trait.rs",
  "crates/spikard-http/src/response.rs",
  "crates/spikard-http/src/auth.rs",
  "crates/spikard-http/src/background.rs",
  "crates/spikard-http/src/openapi/mod.rs",
  "crates/spikard-http/src/sse.rs",
  "crates/spikard-http/src/websocket.rs",
]

[[crate.source_crates]]
name = "spikard-graphql"
sources = [
  "crates/spikard-graphql/src/error.rs",
  "crates/spikard-graphql/src/routes.rs",
  "crates/spikard-graphql/src/schema.rs",
]

[exclude]
types = [
  "BackgroundRuntime",
  "BackgroundShutdownError",
  "FastRouter",
  "GenericGrpcService",
  "HandlerResponse",
  "LifecycleHooks",
  "LifecycleHooksBuilder",
  "ResponseBodySize",
  "RouteInfo",
  "SchemaBuilder",
  "SseState",
  "SseStream",
  "ValidatingHandler",
  "WebSocketConnection",
  "WebSocketState",
  "WithoutBodyExtractionOptions",
  "PreReadBody",
  "PreParsedJson",
  "IntoHandler",
  "Handler",
  "Dependency",
]
functions = [
  "api_key_auth_middleware",
  "assemble_openapi_spec",
  "auto_generate_parameter_schema",
  "build_router_with_handlers",
  "build_router_with_handlers_and_config",
  "build_router_with_handlers_and_config_and_grpc",
  "build_server_runtime",
  "call_test_server",
  "connect_websocket",
  "convert_string_to_json_value",
  "copy_metadata",
  "create_request_data_with_body",
  "create_request_data_without_body",
  "empty_message_stream",
  "encode_grpc_message",
  "error_stream",
  "execute_with_lifecycle_hooks",
  "extract_cookies",
  "extract_headers",
  "extract_parameters_from_schema",
  "extract_path_param_names",
  "extract_query_params",
  "extract_raw_query_params",
  "generate_openapi_spec",
  "generate_openrpc_spec",
  "grpc_response_to_tonic",
  "handle_jsonrpc",
  "handle_preflight",
  "init",
  "is_enabled",
  "is_form_urlencoded",
  "is_grpc_request",
  "is_json_content_type",
  "is_json_like",
  "is_json_like_str",
  "is_multipart_form_data",
  "is_server_error",
  "json_schema_to_request_body",
  "json_schema_to_response",
  "json_value_to_schema",
  "jwt_auth_middleware",
  "merge_parameter_schemas",
  "message_stream_from_vec",
  "parse_grpc_client_stream",
  "parse_grpc_path",
  "parse_multipart_to_json",
  "parse_query_pairs_to_json",
  "parse_query_string",
  "parse_query_string_to_json",
  "parse_type_hints",
  "parse_unary_grpc_message",
  "parse_urlencoded_to_json",
  "route_grpc_request",
  "security_scheme_info_to_openapi",
  "single_message_stream",
  "snapshot_http_response",
  "snapshot_http_response_allow_body_errors",
  "snapshot_response",
  "strip_type_hints",
  "type_hint_to_schema",
  "validate_content_length",
  "validate_content_type_headers",
  "validate_content_type_headers_and_classify",
  "validate_content_type_middleware",
  "validate_cors_request",
  "validate_json_content_type",
  "validate_jsonrpc_method_name",
  "validate_method_name",
]

[crate.extra_dependencies]
spikard-core = { path = "../spikard-core" }
spikard-http = { path = "../spikard-http" }
spikard-graphql = { path = "../spikard-graphql" }
anyhow = "1.0"
futures = "0.3"

[python.extra_dependencies]
tokio = { version = "1", features = ["full"] }

[node.extra_dependencies]
tokio = { version = "1", features = ["full"] }

[output]
python = "crates/spikard-py/src/"
node = "crates/spikard-node/src/"
ruby = "crates/spikard-rb/src/"
php = "crates/spikard-php/src/"
elixir = "crates/spikard-elixir/src/"

[python]
module_name = "_spikard"
pip_name = "spikard"
release_gil = true
features = ["di"]

[python.stubs]
output = "packages/python/spikard/"

[node]
package_name = "@spikard/node"
features = ["di"]

[ruby]
gem_name = "spikard"
features = ["di"]

[ruby.stubs]
output = "packages/ruby/sig/"

[php]
extension_name = "spikard_php"
feature_gate = "extension-module"
features = ["di"]

[elixir]
app_name = "spikard"
features = ["di"]

[dto]
python = "dataclass"
python_output = "typed-dict"
node = "interface"
ruby = "struct"
php = "readonly-class"
elixir = "struct"

[scaffold]
description = "Rust-centric multi-language HTTP framework with polyglot bindings"
license = "MIT"
repository = "https://github.com/Goldziher/spikard"
homepage = "https://github.com/Goldziher/spikard"
authors = ["Na'aman Hirschfeld <nhirschfeld@gmail.com>"]
keywords = ["http", "web", "framework", "polyglot", "rust"]

[readme]
discord_url = ""
banner_url = ""

[sync]
extra_paths = []

[[sync.text_replacements]]
path = "crates/spikard-http/src/lib.rs"
search = "version = \"\\d+\\.\\d+\\.\\d+\""
replace = "version = \"{version}\""

[e2e]
fixtures = "fixtures"
output = "e2e"
languages = ["python", "node", "ruby", "php", "elixir"]

[e2e.call]
function = "handle_request"
module = "spikard"
result_var = "response"
async = true
method = "POST"

[e2e.packages.python]
name = "spikard"
path = "../../packages/python"

[e2e.packages.node]
name = "@spikard/node"
path = "../../packages/node"

[e2e.packages.ruby]
name = "spikard"
path = "../../packages/ruby"

[e2e.packages.php]
name = "spikard/spikard"
path = "../../packages/php"

[e2e.packages.elixir]
name = "spikard"
path = "../../packages/elixir"


[generate]
bindings = true
errors = true
configs = true
async_wrappers = true
type_conversions = true
package_metadata = true
public_api = true
reverse_conversions = true

[test.python]
command = "uv run pytest packages/python/tests/"
e2e = "uv run pytest e2e/python/"

[test.node]
command = "pnpm --filter @spikard/node test"
e2e = "pnpm --filter @spikard/e2e-node test"

[test.ruby]
command = "cd packages/ruby && bundle exec rspec"
e2e = "cd e2e/ruby && bundle exec rspec"

[test.php]
command = "cd packages/php && vendor/bin/phpunit"
e2e = "cd e2e/php && vendor/bin/phpunit"

[test.elixir]
command = "cd packages/elixir && mix test"
e2e = "cd e2e/elixir && mix test"

[lint.python]
format = "ruff format packages/python/"
check = "ruff check packages/python/"
typecheck = "mypy packages/python/"

[lint.node]
format = "pnpm biome format --write packages/node/"
check = "pnpm biome lint packages/node/"
typecheck = "pnpm tsc --noEmit -p packages/node/tsconfig.json"

[lint.ruby]
format = "cd packages/ruby && bundle exec rubocop -A"
check = "cd packages/ruby && bundle exec rubocop"
typecheck = "cd packages/ruby && bundle exec steep check"

[lint.php]
format = "cd packages/php && vendor/bin/php-cs-fixer fix"
check = "cd packages/php && vendor/bin/phpstan analyse"

[lint.elixir]
format = "cd packages/elixir && mix format"
check = "cd packages/elixir && mix credo --strict"
typecheck = "cd packages/elixir && mix dialyzer"
