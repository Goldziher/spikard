[crates.exclude]
methods = [
  # std::io trait impls — require trait in scope, &mut [u8] params
  "UploadFile.read",
  "UploadFile.seek",
  # Methods with unknown external types (StatusCode, axum::Response, etc.)
  "ProblemDetails.status_code",
  "ProblemDetails.with_extension",
  "ProblemDetails.with_extensions",
  "ProblemDetails.from_validation_error",
  "ProblemDetails.internal_server_error_debug",
  "GraphQLError.to_graphql_response",
  "GraphQLError.to_http_response",
  # Methods returning type aliases or excluded types
  "SchemaConfig.validate",
  "SchemaConfig.set_introspection_enabled",
  "SchemaConfig.set_complexity_limit",
  "SchemaConfig.set_depth_limit",
  "ServerConfig.builder",
  # Methods with complex params not auto-delegatable
  "Route.from_metadata",
  "Route.with_jsonrpc_method",
  "Response.with_status",
  "SseEvent.with_type",
  # TestClient: from_router takes axum::Router (opaque external type — bindings use
  # test_client_from_app free function instead). http_server returns Arc<TestServer>
  # (internal axum-test type).
  "TestClient.from_router",
  "TestClient.http_server",
  # WebSocketConnection: new() takes TestWebSocket (axum-test internal type).
  # send_json/receive_json use generic type params that can't cross FFI.
  # send_message/receive_message use WsMessage (axum-test external enum).
  "WebSocketConnection.new",
  "WebSocketConnection.send_json",
  "WebSocketConnection.receive_json",
  "WebSocketConnection.send_message",
  "WebSocketConnection.receive_message",
  # TestServer (spikard wrapper): from_router takes axum::Router; call takes
  # axum::http::Request<Body>. The binding entry point is test_client_from_app.
  "TestServer.from_router",
  "TestServer.from_app",
  "TestServer.call",
  "TestServer.connect_websocket",
  # Alef Value-return-type misclassification bug (track upstream): methods returning
  # Result<serde_json::Value, _> are inferred as Result<String, _>, producing a
  # mismatched-types error at the binding boundary. Remove once alef maps Value
  # returns to the per-language JSON type (dict/object/Hash/etc.).
  "ResponseSnapshot.json",
  "ResponseSnapshot.graphql_data",
  "ResponseSnapshot.graphql_errors",
  "TestingSseEvent.as_json",
  # Generic inherent methods on App / RouteBuilder — bindings drive registration
  # through the JSON-schema variants below; the generic builder methods are Rust-only
  # ergonomics that cannot cross FFI without explicit monomorphization metadata.
  "App.route",
  "App.websocket",
  "App.websocket_with_schemas",
  "App.sse",
  "App.sse_with_schema",
  # `App.config(mut self, ...) -> Self` is non-delegatable through the napi `&self`
  # wrapper (it would consume the Arc<Mutex<App>> inner); configuration is wired via
  # `ServerConfig` builder + `App::new(config)` in the binding-side service entrypoint.
  "App.config",
  # `App.run(self) -> Result<(), AppError>` consumes `self` by value, so the
  # standard alef per-type-method generator cannot auto-delegate it through the
  # napi `&self` wrapper — it would emit a `compile_error!` placeholder body.
  # Listing the method here suppresses that placeholder. Since alef v0.23.62
  # service entrypoints declared under `[[crates.services.entrypoints]]` ignore
  # `exclude.methods` for their three emission sites (free-function shim,
  # wrapper class method, and import line), `app_run(registrations: ...)` and
  # the wrapper's `async run()` method are still emitted via the
  # registration-replay path so the e2e harness can drive the server.
  "App.run",
  # `are_headers_allowed` in `crates/spikard-http/src/cors.rs` is a PRIVATE free
  # function. The alef extractor still associates it with `CorsConfig` via name
  # prefix matching (the function name starts with `are_headers_…` and lives in
  # the same module as `CorsConfig`), even though `extract_function` now skips
  # private *free* functions at the extraction boundary. Until the
  # function→type association heuristic is tightened, keep the exclude here.
  "CorsConfig.are_headers_allowed",
  "RouteBuilder.request_body",
  "RouteBuilder.response_body",
  "RouteBuilder.params",
]
types = [
  # Not part of public API — closures, Arc<dyn Handler>, internal protocol types
  "Route",
  "RouteMetadata",
  # SseEventProducer and WebSocketHandler use RPITIT (`-> impl Future`) on all
  # trait methods. Alef cannot resolve the `Future` return to a known binding
  # type and emits `unknown_named_type`. These traits are also not dyn-compatible,
  # so the Arc<dyn Contract> handler-bridge cannot wrap them. Exclude until alef
  # supports non-object-safe contracts via a concrete wrapper.
  "SseEventProducer",
  "WebSocketHandler",
  "BackgroundHandle",
  "BackgroundJobError",
  "Claims",
  "GrpcRequestData",
  "GrpcResponseData",
  "JsonRpcRequestOrBatch",
  "JsonRpcResponseType",
  "ValidatedParams",
  # Internal implementation types — pub(crate) in source, but alef extracts
  # them via re-exports/use paths; keep listed until alef respects the original
  # visibility on disambiguated names.
  "BackgroundJobFuture",
  "BackgroundRuntime",
  "BackgroundShutdownError",
  "ContentTypeKind",
  "Dependency",
  "DependencyContainer",
  "DependencyGraph",
  "DependencyInjectingHandler",
  "ErrorCondition",
  "ErrorMapper",
  "FactoryDependency",
  "FactoryDependencyBuilder",
  "FactoryFn",
  "FastRouter",
  "GenericGrpcService",
  "HandlerResponse",
  "HandlerResult",
  "LifecycleHooks",
  "LifecycleHooksBuilder",
  "MessageStream",
  "MethodExample",
  "MethodMetadata",
  "PreParsedJson",
  "PreReadBody",
  "RegistryError",
  # RequestContext is the Rust-side handler ergonomic wrapper (holds Request<Body>,
  # returns borrows); it does not cross FFI — handlers receive the RequestData wire
  # type. Pulled into the surface only because App lives in crates/spikard/src/lib.rs.
  "RequestContext",
  # RequestData is the Handler wire-request type, used by-NAME in the service config
  # (wire_request_type) and serialized as the *core* spikard::RequestData in the handler
  # bridge — it is NOT needed as a generated pyclass (and has no Default, which broke codegen).
  "RequestData",
  "ResolvedDependencies",
  "RouteInfo",
  "RpcMode",
  "SchemaBuilder",
  "SseState",
  "ValidatingHandler",
  "WebSocketState",
  "WithoutBodyExtractionOptions",
  # Internal bindings types
  "RawResponse",
  "StaticAsset",
  "StructuredError",
  # AsyncApiState is pub(crate); alef extracts it via re-export. Keep until
  # visibility filter is reliable on disambiguated names.
  "AsyncApiState",
  # Internal protocol types
  "JsonRpcState",
  "JsonRpcMethodRegistry",
  "JsonRpcRequest",
  "JsonRpcResponse",
  "JsonRpcError",
  "JsonRpcErrorResponse",
  "JsonRpcRouter",
  # Internal gRPC types
  "GrpcHandlerResult",
  "GrpcHandler",
  "GrpcRegistry",
  "StreamingRequest",
  # Internal server types
  "Server",
  "ServerConfigBuilder",
  "StaticResponseHandler",
  "StaticResponse",
  "RouteHandler",
  "Router",
  "SchemaRegistry",
  # Opaque validators (can't cross FFI usefully)
  "SchemaValidator",
  "ParameterValidator",
  "ValidationError",
  "ValidationErrorDetail",
  # Internal enums with wrong module paths
  "ParameterSource",
  "BackgroundSpawnError",
  # TestServer is the internal axum-test-based server (uses TestWebSocket etc.);
  # bindings use TestClient + test_client_from_app instead.
  "TestServer",
  # WebSocketConnection wraps axum-test's TestWebSocket; its async receive_* methods
  # hold a MutexGuard across await (not Send), causing compile errors in PyO3 bindings.
  # GraphQL subscriptions are covered by TestClient.graphql_subscription instead.
  "WebSocketConnection",
  # SseStream.events() returns spikard_http::testing::SseEvent (data: String) which
  # conflicts with the binding's SseEvent type (mapped from spikard_http::SseEvent,
  # data: Value). Excluded until alef can map the two SseEvent variants independently.
  "SseStream",
  # Alef re-export deduplication bug (track upstream): a type reachable via both
  # a `pub use` re-export and its original module path gets extracted twice and
  # disambiguated with a numeric suffix or module prefix, escaping the user's
  # exclude entry for the original name. Remove these once alef merges re-exports
  # to their definition site.
  "LifecycleHooks2",
  "LifecycleHooksBuilder2",
  "RequestData2",
  "WebSocketMessage2",
  "Method2",
  "HandlerResponse2",
  "ErrorMapperErrorCondition",
  "TestingWebSocketMessage",
  # Alef visibility/disambiguation bug (track upstream): pub(crate) GrpcRegistry
  # gets emitted as GrpcGrpcRegistry (parent-module-prefixed) despite the original
  # being excluded AND non-pub. Remove once alef respects pub(crate) on
  # disambiguated names.
  "GrpcGrpcRegistry",
  # Public generic items that cannot cross FFI without monomorphization metadata
  # — excluded via fully qualified path so the alef v0.23.0+ `unsupported_generic_item`
  # validator can filter them out before erroring. These are internal helper aliases
  # / lifecycle plumbing that bindings do not need.
  "HookResult",
  "TargetLifecycleHooks",
  "NativeLifecycleHook",
  "LocalLifecycleHook",
  "spikard_graphql::error::Result",
  "spikard_graphql::schema::SchemaResult",
]
functions = [
  "request_hook",
  "response_hook",
  "shield_panic",
  # Public generic axum handler builders — not part of the polyglot binding surface
