e2e = "cd e2e/wasm && pnpm vitest run"

[crates.publish]
core_crate = "crates/spikard"

# ruby + elixir intentionally use alef's default `Registry` vendor mode: their
# native ext / NIF builds the Rust crate from source on the user's machine and
# pulls spikard from crates.io (path-deps rewritten to registry version-deps).
# The old `core-only` vendoring left an unresolvable `path =` in the shipped
# manifest, which is exactly issue #87 (gem fails to install).
[crates.publish.languages.elixir]
nif_versions = ["2.16", "2.17"]

[crates.e2e]
fixtures = "fixtures"
output = "e2e"
languages = [
  "python",
  "node",
  "ruby",
  "php",
  "elixir",
  "rust",
  "go",
  "java",
  "csharp",
  "kotlin",
  "kotlin_android",
  "dart",
  "swift",
  "zig",
  # wasm is included; alef auto-skips HTTP-shaped fixtures (those with
  # `mock_response` or `http.expected_response`) for the wasm target because
  # the wasm binding exports validateJsonSchema + problemDetails only, not the
  # handle_request HTTP adapter. Non-HTTP fixtures still generate runnable tests.
  "wasm",
  # brew: a Homebrew formula test app (registry mode) that installs the published
  # CLI via `brew install` and exercises it, verifying the tap/bottle release.
  "brew",
]

[crates.e2e.harness]
# Server-pattern harness config for HTTP fixtures.
# When HTTP fixtures are present, the harness spawns the SUT app and registers
# handlers per fixture, returning canned expected responses.
#
# `register_method = "route"` is the canonical 'register a route' verb that
# every binding's App class exposes. Alef applies per-language identifier
# casing (snake_case for python/ruby/elixir/rust/php, camelCase for node /
# wasm / java / swift / dart / kotlin, PascalCase for go / csharp), so the
# canonical lowercase `route` round-trips unchanged in every language.
imports = ["spikard"]
app_class = "App"
# alef v0.22.27+ ruby harness accepts FQDN paths; spikard gem's Ruby App lives
# at `Spikard::App` not the top-level `::App`. The override here resolves it.
register_method = "route"
run_method = "run"
# spikard's Response struct names the body payload `content`, not `body`.
response_body_field = "content"
host = "127.0.0.1"
port = 8000

[crates.e2e.harness.overrides.node]
# Node binding ships as @spikard/node, not bare spikard.
imports = ["@spikard/node"]

[crates.e2e.harness.overrides.ruby]
# The Ruby spikard gem nests its app class under the `Spikard` module
# (`Spikard::App`). alef v0.22.27+ ruby harness uses the configured `app_class`
# verbatim (without prefixing `::`), so the FQDN is required.
app_class = "Spikard::App"

[crates.e2e.harness.overrides.swift]
# Swift module names are PascalCase (capitalized). The base config specifies
# lowercase "spikard", but Swift requires `import Spikard` (uppercase).
imports = ["Spikard"]

[crates.e2e.call]
result_var = "response"
async = true
method = "POST"

