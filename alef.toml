snippets_dir = "docs/snippets"
output_pattern = "packages/{language}/README.md"

[crates.readme.languages.python]
template = "python.md"
name = "Spikard"
package_name = "spikard"
badge_url = "https://img.shields.io/pypi/v/spikard?label=Python&color=007ec6"
docs_url = "https://github.com/Goldziher/spikard"
description = "Rust-centric polyglot HTTP framework with OpenAPI/AsyncAPI/GraphQL/JSON-RPC codegen, tower-http middleware, and fixture-driven cross-language testing. Native Python bindings with async/await support."
package_manager = ["pip"]
snippets = { quickstart = "quickstart_routes.md", hello_route = "hello_route.md", request_data = "request_data.md", validation_basic = "validation_basic.md", middleware_basic = "middleware_basic.md", config_server = "config_server.md", run_app = "run_app.md" }

