[package]
name = "spikard_elixir"
version = "0.13.0"
edition = "2024"
authors = ["Na'aman Hirschfeld <nhirschfeld@gmail.com>"]
license = "MIT"
repository = "https://github.com/Goldziher/spikard"
homepage = "https://github.com/Goldziher/spikard"
description = "High-performance Elixir bindings for Spikard HTTP framework via Rustler"
keywords = ["elixir", "bindings", "rustler", "http", "framework"]
categories = ["api-bindings", "web-programming::http-server"]
documentation = "https://docs.rs/spikard-elixir"
readme = "README.md"

[lib]
name = "spikard_elixir"
crate-type = ["cdylib"]

[workspace]


[dependencies]
axum = "0.8"
bytes = "1.11"
http-body-util = "0.1"
once_cell = "1.21"
rustler = "0.37"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
spikard-core = { path = "../../../../crates/spikard-core", features = ["di"] }
spikard-http = { path = "../../../../crates/spikard-http", features = ["di"] }
spikard-bindings-shared = { path = "../../../../crates/spikard-bindings-shared" }
futures = "0.3"
tokio = { version = "1", features = ["full"] }
tonic = { version = "0.14", features = ["transport", "codegen", "gzip"] }
tower = { version = "0.5", features = ["util"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", default-features = false, features = [
  "env-filter",
  "fmt",
  "std",
] }
urlencoding = "2.1"

[package.metadata.cargo-machete]
ignored = ["bytes", "serde", "tracing-subscriber"]
