[package]
name = "spikard_nif"
version = "0.15.6-rc.9"
edition = "2024"
license = "MIT"
description = "Rust-centric multi-language HTTP framework with polyglot bindings"
readme = false
keywords = ["framework", "http", "polyglot", "rust", "web"]
categories = ["text-processing"]

[package.metadata.cargo-machete]
ignored = ["tokio"]

[workspace]

[lib]
name = "spikard_nif"
path = "../../../../packages/elixir/lib/lib.rs"

crate-type = ["cdylib"]

[dependencies]
rustler = "0.38"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
spikard = { version = "0.15.6-rc.9", path = "../../../../crates/spikard", features = ["di"] }
spikard-core = { path = "../../../../crates/spikard-core", version = "0.15.6-rc.9" }
spikard-graphql = { path = "../../../../crates/spikard-graphql", version = "0.15.6-rc.9" }
spikard-http = { path = "../../../../crates/spikard-http", version = "0.15.6-rc.9" }
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }
