[package]
name = "spikard_nif"
version = "0.13.0"
edition = "2024"
license = "MIT"
description = "Rust-centric multi-language HTTP framework with polyglot bindings"
readme = false
keywords = ["http", "web", "framework", "polyglot", "rust"]
categories = ["text-processing"]

[package.metadata.cargo-machete]
ignored = ["serde_json", "tokio"]

[lib]
name = "spikard_nif"
path = "../../../../crates/spikard-elixir/src/lib.rs"
crate-type = ["cdylib"]

[dependencies]
spikard = { path = "../../../../crates/spikard", features = ["di"] }
rustler = "0.37"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
