[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "spikard"
version = "0.13.0"
description = "Polyglot web framework powered by Rust"
license = "MIT"
requires-python = ">=3.9"
authors = [
    { name = "Kreuzberg Team" }
]
keywords = ["web", "framework", "http", "api"]
[project.urls]
repository = "https://github.com/kreuzberg-dev/spikard"

[tool.maturin]
module-name = "_spikard"
features = ["pyo3/extension-module"]

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "W"]
