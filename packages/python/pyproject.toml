[build-system]
build-backend = "maturin"
requires = [ "maturin>=1,<2" ]

[project]
name = "spikard"
version = "0.17.0rc3"
description = "Rust-centric multi-language HTTP framework with polyglot bindings"
keywords = [ "framework", "http", "polyglot", "rust", "web" ]
license = "MIT"
license-files = [ "LICENSE" ]
authors = [ { name = "Na'aman Hirschfeld <nhirschfeld@gmail.com>" } ]
requires-python = ">=3.10"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
urls.repository = "https://github.com/Goldziher/spikard"
homepage = "https://github.com/Goldziher/spikard"

[dependency-groups]
dev = [ "pyrefly>=1.1.1", "ruff>=0.14.8" ]

[tool.maturin]
profile = "release"
module-name = "spikard._spikard"
manifest-path = "../../crates/spikard-py/Cargo.toml"
# abi3-py310 produces a single wheel per platform that loads on Python 3.10+,
# avoiding a per-Python-version build matrix.
features = [ "pyo3/extension-module", "pyo3/abi3-py310" ]
python-packages = [ "spikard" ]

[tool.pyrefly]
python-version = "3.10"
preset = "strict"
# The alef-emitted `api.py` wrapper has a structural mismatch between its
# `options.*` dataclass signatures and the `_internal_bindings.*` pyclass types
# pyo3 accepts/returns at runtime. pyo3 reconciles them dynamically via
# FromPyObject — the Python e2e suite exercises the runtime path — but a static
# checker sees only the discrepancy. Suppress the errors it raises on the
# wrapper until the codegen emits matching `_to_rust_*` calls and casts the
# return values.
[[tool.pyrefly.sub-config]]
matches = "**/api.py"
[tool.pyrefly.sub-config.errors]
bad-argument-type = false
bad-argument-count = false
bad-return = false
not-iterable = false
missing-attribute = false

[[tool.pyrefly.sub-config]]
matches = "**/app.py"
[tool.pyrefly.sub-config.errors]
bad-argument-type = false

[[tool.pyrefly.sub-config]]
matches = "**/datastructures.py"
[tool.pyrefly.sub-config.errors]
missing-module-attribute = false

[[tool.pyrefly.sub-config]]
matches = "**/schema.py"
[tool.pyrefly.sub-config.errors]
missing-import = false
