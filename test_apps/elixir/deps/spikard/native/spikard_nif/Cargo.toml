[package]
name = "spikard_nif"
version = "0.15.6-rc.4"
edition = "2024"
license = "MIT"
description = "Rust-centric multi-language HTTP framework with polyglot bindings"
readme = false
keywords = ["http", "web", "framework", "polyglot", "rust"]
categories = ["text-processing"]

[workspace]

[lib]
name = "spikard_nif"
path = "../../../../crates/spikard-elixir/src/lib.rs"

crate-type = ["cdylib"]

[dependencies]
rustler = "0.37"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
spikard = { version = "0.15.6-rc.4", features = ["di"] }
spikard-core = { version = "0.15.6-rc.4" }
spikard-graphql = { version = "0.15.6-rc.4" }
spikard-http = { version = "0.15.6-rc.4" }
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }
