default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^docs/snippets/|vendor/|node_modules/|target/|invalid*|dist/|artifacts/|test_documents/|test_apps/|scripts/ci/|packages/.*/tools/vendor-

repos:
  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # AI-Rulez: validate config and auto-generate AI assistant configuration files
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v4.1.0
    hooks:
      - id: ai-rulez-validate
      - id: ai-rulez-generate

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: uv.lock
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.21.1"
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/DevinR528/cargo-sort
    rev: "v2.1.4"
    hooks:
      - id: cargo-sort
        args: [-w]

  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
        exclude: "pyproject.toml|Cargo.toml"

  # Python: ruff (linting + formatting) + mypy (type checking)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        exclude: "e2e/|scripts/|examples/|tests/test_apps/|benchmarks/|tools/"

  # Rust: formatting, linting, and license checking
  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 0.5.0
    hooks:
      - id: cargo-fmt
        args: ["--all"]
        types: [rust]
      # Clippy: split by compilation unit so only changed code recompiles
      - id: cargo-clippy
        args: [
          "--fix",
          "--allow-dirty",
          "--allow-staged",
          "--workspace",
          "--exclude=spikard-php",
          "--exclude=spikard-py",
          "--exclude=spikard-node",
          "--exclude=spikard-rb",
          "--exclude=spikard-rb-macros",
          "--exclude=spikard-elixir",
          "--exclude=spikard-ffi",
          "--exclude=benchmark-harness",
          "--all-features",
          "--all-targets",
          "--",
          "-D",
          "warnings",
        ]

  - repo: https://github.com/bnjbvr/cargo-machete
    rev: v0.9.2
    hooks:
      - id: cargo-machete

  - repo: https://github.com/EmbarkStudios/cargo-deny
    rev: 0.19.4
    hooks:
      - id: cargo-deny
        args: ["check"]

  # JavaScript/TypeScript/JSON/CSS: biome (formatting + linting with autofixes)
  # e2e/ is excluded — those files are alef-generated and already formatted by
  # alef's own biome pass; running biome-format here a second time produces
  # subtly different output (string escape handling) and breaks alef-verify.
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.13
    hooks:
      - id: biome-format
        exclude: ^(tools/benchmark-harness/fixtures/|e2e/)
      - id: biome-lint
        exclude: ^e2e/

  # Shell scripts: formatting and linting
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: ["-w", "-i", "2"]

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: ['-x']
        exclude: ^test_apps/docker/tests/

  # Markdown: linting
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: "v0.1.84"
    hooks:
      - id: rumdl-fmt
        exclude: '^(test_apps/|tools/benchmark-harness/vendored/|docs/index\.md|docs/getting-started/installation\.md)'

  # Spelling: fast Rust-based spell checker
  - repo: https://github.com/crate-ci/typos
    rev: v1.45.2
    hooks:
      - id: typos
        args: [--force-exclude]

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Local hooks for unsupported languages (Ruby, Java, C#, PHP, Elixir, R) and custom configurations
  - repo: local
    hooks:
      # Ruby
      - id: ruby-format
        name: Ruby formatting (rubocop)
        entry: task ruby:format
        language: system
        files: \.rb$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      - id: ruby-lint
        name: Ruby linting (rubocop + steep)
        entry: task ruby:lint
        language: system
        files: \.(rb|rbs)$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      # PHP
      - id: php-format
        name: PHP formatting (php-cs-fixer)
        entry: task php:format
        language: system
        files: \.php$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      - id: php-lint
        name: PHP linting (phpstan + php-cs-fixer)
        entry: task php:lint
        language: system
        files: \.php$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      # Elixir
      - id: mix-credo
        name: mix credo
        entry: bash -c 'cd packages/elixir && MIX_ENV=dev mix credo --strict'
        language: system
        files: ^packages/elixir/
        pass_filenames: false

      - id: mix-format
        name: mix format
        entry: bash -c 'cd packages/elixir && MIX_ENV=dev mix format --check-formatted'
        language: system
        files: ^packages/elixir/
        pass_filenames: false

      # Go
      - id: go-lint
        name: Go linting (golangci-lint)
        entry: bash -c 'command -v golangci-lint >/dev/null 2>&1 && task go:lint || echo "skip - golangci-lint missing"'
        language: system
        files: \.go$
        pass_filenames: false

      # Java
      - id: java-verify
        name: maven verify (java)
        entry: bash -lc 'if [ -f "$HOME/.sdkman/bin/sdkman-init.sh" ]; then source "$HOME/.sdkman/bin/sdkman-init.sh" && sdk env; fi; command -v mvn >/dev/null 2>&1 && MAVEN_OPTS="${MAVEN_OPTS:-} --enable-native-access=ALL-UNNAMED -Dsun.misc.unsafe.memory.access=allow" mvn -f packages/java/pom.xml -B -DskipTests -Dgpg.skip=true -Dskip.rust.ffi=true verify || echo "skip - mvn missing"'
        language: system
        files: ^packages/java/
        pass_filenames: false

      # C#
      - id: csharp-format
        name: C# formatting (dotnet format)
        entry: bash -c 'command -v dotnet >/dev/null 2>&1 && task csharp:format || echo "skip - dotnet missing"'
        language: system
        files: \.cs$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      - id: csharp-lint
        name: C# linting (dotnet format --verify-no-changes)
        entry: bash -c 'command -v dotnet >/dev/null 2>&1 && task csharp:lint || echo "skip - dotnet missing"'
        language: system
        files: \.cs$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      # Kotlin
      - id: kotlin-format
        name: Kotlin formatting (ktlint via gradle)
        entry: bash -c 'command -v gradle >/dev/null 2>&1 && cd packages/kotlin && gradle ktlintFormat --no-daemon || echo "skip - gradle missing"'
        language: system
        files: ^packages/kotlin/.*\.kt$
        pass_filenames: false

      - id: kotlin-lint
        name: Kotlin linting (ktlint via gradle)
        entry: bash -c 'command -v gradle >/dev/null 2>&1 && cd packages/kotlin && gradle ktlintCheck --no-daemon || echo "skip - gradle missing"'
        language: system
        files: ^packages/kotlin/.*\.kt$
        pass_filenames: false

      # Dart
      - id: dart-format
        name: Dart formatting (dart format)
        entry: bash -c 'command -v dart >/dev/null 2>&1 && cd packages/dart && dart format . || echo "skip - dart missing"'
        language: system
        files: ^packages/dart/.*\.dart$
        pass_filenames: false

      - id: dart-lint
        name: Dart linting (dart analyze)
        entry: bash -c 'command -v dart >/dev/null 2>&1 && cd packages/dart && dart analyze || echo "skip - dart missing"'
        language: system
        files: ^packages/dart/.*\.dart$
        pass_filenames: false

      # Gleam
      - id: gleam-format
        name: Gleam formatting (gleam format)
        entry: bash -c 'command -v gleam >/dev/null 2>&1 && cd packages/gleam && gleam format || echo "skip - gleam missing"'
        language: system
        files: ^packages/gleam/.*\.gleam$
        pass_filenames: false

      - id: gleam-lint
        name: Gleam check (gleam format --check)
        entry: bash -c 'command -v gleam >/dev/null 2>&1 && cd packages/gleam && gleam format --check || echo "skip - gleam missing"'
        language: system
        files: ^packages/gleam/.*\.gleam$
        pass_filenames: false

  # Alef: verify generated bindings are up to date and sync package versions
  - repo: https://github.com/kreuzberg-dev/alef
    rev: v0.11.18
    hooks:
      - id: alef-verify
      - id: alef-sync-versions
