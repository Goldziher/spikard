default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^docs/snippets/|vendor/|node_modules/|target/|invalid*|dist/|artifacts/|test_documents/|test_apps/|scripts/ci/|^e2e/|\.cache/|\.venv/

repos:
  # AI-Rulez: auto-generate AI assistant configuration files
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v4.2.1
    hooks:
      - id: ai-rulez-generate

  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: uv.lock
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.21.2"
    hooks:
      - id: pyproject-fmt

  # Python
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Shared kreuzberg-dev polyglot hooks
  - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
    rev: v1.1.18
    hooks:
      - id: cargo-sort
        exclude: ^(crates/spikard-(wasm|node|py|php|ffi)|packages/(dart|swift)/rust|packages/ruby/ext/spikard_rb/native)/Cargo\.toml$
      - id: cargo-fmt
        args: ["--all"]
      - id: cargo-check
        args:
          [
            "--workspace",
            "--exclude=spikard-ffi",
            "--exclude=spikard-py",
            "--exclude=spikard-node",
            "--exclude=spikard-php",
            "--exclude=spikard-wasm",
            "--all-features",
            "--all-targets",
          ]
      - id: cargo-clippy
        args:
          [
            "--fix",
            "--allow-dirty",
            "--allow-staged",
            "--workspace",
            "--exclude=spikard-ffi",
            "--exclude=spikard-py",
            "--exclude=spikard-node",
            "--exclude=spikard-php",
            "--exclude=spikard-wasm",
            "--all-features",
            "--all-targets",
            "--",
            "-D",
            "warnings",
          ]
      - id: cargo-machete
        args:
          [
            "crates/spikard",
            "crates/spikard-core",
            "crates/spikard-http",
            "crates/spikard-graphql",
            "crates/spikard-codegen",
            "crates/spikard-cli",
          ]
        exclude: ^e2e/
      - id: cargo-deny
        args: ["check"]
      - id: rustdoc-lint
        args: ["--package", "spikard"]
        pass_filenames: false
        files: ^crates/spikard/.*\.rs$
        exclude: ^crates/spikard/tests/
      - id: pydocstyle
        files: ^packages/python/spikard/.*\.py$
      # tsdoc-lint disabled: the generated TypeScript/WASM wrappers use oxlint
      # and oxfmt, and the shared hook expects an eslint toolchain that this
      # package intentionally does not carry.
      # - id: tsdoc-lint
      #   files: ^packages/(typescript|wasm)/src/.*\.ts$
      #   exclude: \.d\.ts$
      - id: alef-docs-fresh
      # yard-coverage disabled: the root Ruby test path does not provide a
      # YARD toolchain for the generated native wrapper.
      # - id: yard-coverage
      #   files: ^packages/ruby/lib/.*\.rb$
      #   exclude: ^packages/ruby/lib/spikard/native\.rb$
      # godoc-lint disabled: shared hook v1.1.2 invokes the removed
      # golangci-lint v1 --disable-all flag against golangci-lint v2.
      # - id: godoc-lint
      #   files: ^packages/go/.*\.go$
      #   exclude: ^(e2e/|test_apps/)
      #   env:
      #     KREUZBERG_GO_MOD_DIRS: "packages/go"
      - id: javadoc-lint
        files: ^packages/java/src/main/java/dev/spikard/.*\.java$
      - id: cs-xmldoc-lint
        files: ^packages/csharp/src/Spikard/.*\.cs$
      - id: ex-doc-coverage
        files: ^(packages/elixir/.*\.exs?|crates/spikard-elixir/src/.*\.ex)$
        args: ["packages/elixir/mix.exs"]
        env:
          MIX_ENV: "dev"
          SPIKARD_BUILD: "1"
      - id: phpdoc-lint
        files: ^packages/php/src/.*\.php$
      - id: dart-doc-lint
        files: ^packages/dart/lib/.*\.dart$
        exclude: ^packages/dart/lib/src/spikard_bridge_generated/
      - id: swift-doc-coverage
        files: ^packages/swift/Sources/Spikard/.*\.swift$
      - id: zig-doc-lint
        files: ^packages/zig/src/.*\.zig$
      - id: shfmt
        args: ["-w", "-i", "2"]
      - id: shellcheck
        args: ["-x"]
      - id: mypy
        files: ^(packages/python|tools|scripts)/.*\.py$
        exclude: "e2e/|tests/|scripts/publish/"
      - id: go-fmt
        exclude: ^(e2e/|test_apps/|tools/)
      - id: golangci-lint
        exclude: ^(e2e/|test_apps/|tools/)
      - id: govulncheck
        exclude: ^(e2e/|test_apps/|tools/)
      - id: rubocop
        files: ^packages/ruby/.*\.rb$
      - id: rubocop-lint
        files: ^packages/ruby/.*\.(rb|rbs)$
      - id: steep
        files: ^packages/ruby/.*\.(rb|rbs)$
      - id: dotnet-format
        files: ^packages/csharp/.*\.cs$
      - id: dotnet-format-check
        files: ^packages/csharp/.*\.cs$
      - id: php-cs-fixer
        files: ^packages/php/.*\.php$
        exclude: ^packages/php/stubs/
      - id: phpstan
        files: ^packages/php/(src|tests)/.*\.php$
        args: ["analyse", "--no-progress", "--configuration", "packages/php/phpstan.neon"]
      - id: mix-format
        files: ^packages/elixir/
      - id: mix-credo
        files: ^packages/elixir/
      - id: java-verify
        files: ^packages/java/
      # ktfmt disabled: ktfmt 0.62 formats Gradle Kotlin scripts with
      # indentation that ktlint 1.8 rejects. Use ktlint as the single Kotlin
      # formatter/linter for this package.
      # - id: ktfmt
      #   files: ^packages/kotlin/.*\.kts?$
      - id: detekt
        args: ["--build-upon-default-config"]
        files: ^packages/kotlin/.*\.kts?$
      - id: ktlint
        files: ^packages/kotlin/.*\.kts?$
      - id: swift-format
        files: ^packages/swift/.*\.swift$
      - id: swiftlint
        files: ^packages/swift/.*\.swift$
      - id: dart-format
        files: ^packages/dart/.*\.dart$
      - id: dart-analyze
        files: ^packages/dart/.*\.dart$
      - id: zig-fmt
        files: ^packages/zig/.*\.zig$
      - id: zig-build-check
        files: ^packages/zig/.*\.zig$
      - id: oxlint
      - id: oxfmt
      - id: textlint
        files: ^docs/.*\.md$
        exclude: ^docs/(reference/|snippets/)
        args: ["--fix", "--config", ".textlintrc.json"]
      - id: rumdl-fmt
        exclude: ^templates/
      - id: cpd
        args: ["--minimum-tokens=120"]
        exclude: ^packages/java/src/main/java/dev/spikard/

  # Alef: verify generated bindings are up to date and sync package versions
  - repo: https://github.com/kreuzberg-dev/alef
    rev: v0.19.0
    hooks:
      - id: alef-verify
      - id: alef-sync-versions

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # GitHub Actions: check refs are up to date
  - repo: https://github.com/Goldziher/gh-actions-updater
    rev: v0.1.3
    hooks:
      - id: gh-actions-updater

  # Spelling: fast Rust-based spell checker (last — runs after all formatters)
  - repo: https://github.com/crate-ci/typos
    rev: v1.46.3
    hooks:
      - id: typos
        args: [--force-exclude]
