default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^docs/snippets/|vendor/|node_modules/|target/|invalid*|dist/|artifacts/|test_documents/|test_apps/|scripts/ci/|^e2e/|\.cache/|\.venv/|service_http_additions\.

repos:
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  - repo: https://github.com/xberg-io/pre-commit-hooks
    rev: v3.0.0
    hooks:
      # Alef verification
      - id: alef-verify

      # Cargo / Rust
      - id: cargo-clippy
        args:
          [
            "--fix",
            "--allow-dirty",
            "--allow-staged",
            "--workspace",
            "--exclude=spikard-ffi",
            "--exclude=spikard-py",
            "--exclude=spikard-node",
            "--exclude=spikard-php",
            "--exclude=spikard-wasm",
            "--all-features",
            "--all-targets",
            "--",
            "-D",
            "warnings",
          ]
      - id: cargo-sort
        args: ["-w"]
        exclude: ^(crates/spikard-(wasm|node|py|php|ffi)|packages/(dart|swift)/rust|packages/ruby/ext/spikard_rb/native)/Cargo\.toml$
      - id: cargo-machete
        args:
          [
            "crates/spikard",
            "crates/spikard-core",
            "crates/spikard-http",
            "crates/spikard-graphql",
            "crates/spikard-codegen",
            "crates/spikard-cli",
          ]
        exclude: ^e2e/
      - id: cargo-deny
        args: ["check"]
      - id: rustdoc-lint
        args: ["--package", "spikard"]
        pass_filenames: false
        files: ^crates/spikard/.*\.rs$
        exclude: ^crates/spikard/tests/
      - id: rust-max-lines
        args: ["--max=1000"]
        # Remediation backlog: existing files over the 1,000-LOC ceiling. New
        # files are subject to the cap. Shrink this list when files are split.
        exclude: ^(crates/spikard-cli/src/codegen/graphql/generators/ruby\.rs|crates/spikard-cli/src/codegen/graphql/spec_parser\.rs|crates/spikard-cli/src/codegen/php\.rs|crates/spikard-cli/src/codegen/protobuf/generators/python\.rs|crates/spikard-cli/src/codegen/python\.rs|crates/spikard-cli/src/codegen/quality/validator\.rs|crates/spikard-cli/src/codegen/ruby\.rs|crates/spikard-cli/src/mcp/server\.rs|crates/spikard-core/src/lifecycle\.rs|crates/spikard-core/src/parameters\.rs|crates/spikard-core/src/request_data\.rs|crates/spikard-ffi/src/lib\.rs|crates/spikard-http/src/background\.rs|crates/spikard-http/src/cors\.rs|crates/spikard-http/src/di_handler\.rs|crates/spikard-http/src/handler_trait\.rs|crates/spikard-http/src/jsonrpc/protocol\.rs|crates/spikard-http/src/jsonrpc/router\.rs|crates/spikard-http/src/lifecycle\.rs|crates/spikard-http/src/openapi/schema_conversion\.rs|crates/spikard-http/src/server/grpc_routing\.rs|crates/spikard-http/src/server/handler\.rs|crates/spikard-http/src/server/mod\.rs|crates/spikard-http/src/sse\.rs|crates/spikard-http/src/websocket\.rs|crates/spikard-node/src/lib\.rs|crates/spikard-php/src/lib\.rs|crates/spikard-py/src/lib\.rs|crates/spikard-wasm/src/lib\.rs|packages/dart/rust/src/frb_generated\.rs|packages/dart/rust/src/lib\.rs|packages/elixir/lib/lib\.rs|packages/ruby/ext/spikard_rb/src/lib\.rs|packages/swift/rust/src/lib\.rs)$

      # Linters and checks
      - id: ai-rulez-generate
      - id: ai-rulez-validate

      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: (Cargo\.lock|uv\.lock)
      - id: detect-private-key
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: typos
        args: ["--force-exclude"]
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml

      - id: actionlint
      - id: gh-actions-updater

      - id: shellcheck
        args: ["-x"]
        exclude: (^|/)gradlew$

      - id: markdownlint-rumdl-strict
        exclude: ^(docs/|CONTRIBUTING\.md$|CHANGELOG\.md$|(crates|packages)/[^/]+/README\.md$|templates/readme/|testing_data/|skills/|README\.md$|\.ai-rulez/)
      - id: textlint
        files: ^docs/.*\.md$
        exclude: ^docs/(reference/|snippets/)
        args: ["--fix", "--config", ".textlintrc.json"]

      - id: ruff
      - id: mypy
        files: ^(packages/python|tools|scripts)/.*\.py$
        exclude: "e2e/|tests/|scripts/publish/"
      - id: pydocstyle
        files: ^packages/python/spikard/.*\.py$

      # JS/TS
      - id: oxlint
      - id: tsc-typecheck
      - id: tsdoc-lint
        files: ^packages/(typescript|wasm)/src/.*\.ts$
        exclude: \.d\.ts$

      # Go — packages/go is excluded from golangci-lint/godoc-lint because alef's
      # HTTP-service go generator emits non-idiomatic, lint-failing code in
      # packages/go/service.go (revive var-naming `c_config`/`new_owner`,
      # errcheck, goconst). Re-enable with XBERG_GO_MOD_DIRS once alef emits
      # golangci-clean go (alef batch).
      - id: golangci-lint
        exclude: ^(e2e/|test_apps/|tools/|packages/go/)
      - id: govulncheck
        exclude: ^(e2e/|test_apps/|tools/|packages/go/)
      # - id: godoc-lint
      #   files: ^packages/go/.*\.go$
      #   exclude: ^(e2e/|test_apps/)
      #   env:
      #     XBERG_GO_MOD_DIRS: "packages/go"

      - id: checkstyle
      - id: pmd
        args: ["check", "-R", "packages/java/pmd-ruleset.xml", "-f", "text"]
        exclude: ^test_native_load\.java$
      - id: cpd
        args: ["--minimum-tokens=120"]
        exclude: ^packages/java/src/main/java/dev/spikard/
      - id: java-verify
        files: ^packages/java/
      - id: javadoc-lint
        files: ^packages/java/src/main/java/dev/spikard/.*\.java$

      # NOTE: spikard uses ktlint (not the canonical ktfmt) as its single Kotlin
      # formatter/linter, because `task alef:format` formats kotlin via the
      # gradle ktlintFormat task. ktfmt 0.62 formats Gradle Kotlin scripts with
      # indentation that ktlint 1.8 rejects, so mixing them fights alef:format.
      - id: detekt
        args: ["--build-upon-default-config"]
        files: ^packages/kotlin/.*\.kts?$
      - id: ktlint
        files: ^packages/kotlin/.*\.kts?$
      - id: kotlin-dokka

      # Ruby
      - id: rubocop-lint
        files: ^packages/ruby/.*\.(rb|rbs)$
        exclude: ^packages/ruby/ext/
      - id: steep
        files: ^packages/ruby/.*\.(rb|rbs)$
      # yard-coverage disabled: alef's HTTP-service ruby generator emits
      # packages/ruby/lib/spikard/service.rb (Spikard::App#get/post/route/...)
      # without YARD doc comments, so the coverage gate fails on generated
      # public methods. Re-enable once alef emits ruby doc comments (alef batch).
      # - id: yard-coverage
      #   files: ^packages/ruby/lib/.*\.rb$
      #   exclude: ^packages/ruby/lib/spikard/native\.rb$

      - id: dotnet-format-check
        files: ^packages/csharp/.*\.cs$
      - id: cs-xmldoc-lint
        files: ^packages/csharp/src/Spikard/.*\.cs$

      - id: phpstan
        files: ^packages/php/(src|tests)/.*\.php$
        args: ["analyse", "--no-progress", "--configuration", "packages/php/phpstan.neon"]
      - id: phpdoc-lint
        files: ^packages/php/src/.*\.php$

      - id: mix-credo
        files: ^packages/elixir/
      # ex-doc-coverage disabled: ExDoc 0.40.3 crashes (FunctionClauseError in
      # ExDoc.Formatter.HTML.Assets.extract_filename!/1 on an empty asset list)
      # because packages/elixir/mix.exs carries no `docs:`/assets config, so the
      # hook can never run to completion. Not a CI gate (ci-validate runs only
      # actionlint/check-yaml/check-toml/check-json). Re-enable once mix.exs gains
      # a docs config and/or ExDoc is pinned to a working version.
      # - id: ex-doc-coverage
      #   files: ^(packages/elixir/.*\.exs?|crates/spikard-elixir/src/.*\.ex)$
      #   args: ["packages/elixir/mix.exs"]
      #   env:
      #     MIX_ENV: "dev"
      #     SPIKARD_BUILD: "1"

      - id: swiftlint
        files: ^packages/swift/.*\.swift$
      - id: swift-doc-coverage
        files: ^packages/swift/Sources/Spikard/.*\.swift$
      - id: dart-analyze
        files: ^packages/dart/.*\.dart$
      - id: dart-doc-lint
        files: ^packages/dart/lib/.*\.dart$
        exclude: ^packages/dart/lib/src/spikard_bridge_generated/

      - id: zig-build-check
        files: ^packages/zig/.*\.zig$
      - id: zig-doc-lint
        files: ^packages/zig/src/.*\.zig$

      - id: hadolint

      - id: alef-docs-fresh
        # spikard verifies with spikard-alef (registers the HTTP-domain IR
        # extension); the generic alef on PATH computes a different inputs-hash
        # and would report every binding stale.
        args: ["cargo", "run", "--quiet", "--release", "-p", "spikard-alef", "--"]
      - id: alef-snippets-validate

      # Formatters
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: shfmt
        args: ["-w", "-i", "2"]
      - id: rumdl-fmt
        exclude: ^templates/
      - id: cargo-fmt
        args: ["--all"]
      - id: pyproject-fmt
        # alef emits packages/python/pyproject.toml with a specific classifier
        # list, per-file-ignores ordering, and tool.mypy overrides block;
        # pyproject-fmt re-orders/collapses these, breaking the CI
        # `git diff --exit-code` freshness check after alef re-emits.
        exclude: ^packages/python/pyproject\.toml$
      - id: ruff-format
      - id: oxfmt
        # The napi-rs bootstrap shim (index.js) is re-emitted by napi build in a
        # form oxfmt would reformat, and the ai-rulez manifest is owned by the
        # ai-rulez-generate hook; oxfmt would fight both generators and break the
        # CI `git diff --exit-code` check.
        exclude: |
          (?x)^(
            crates/spikard-node/index\.js$|
            \.ai-rulez/\.generated-manifest\.json$
          )
      - id: go-fmt
        exclude: ^(e2e/|test_apps/|tools/|packages/go/)
      - id: palantir-java-format
      - id: rubocop
        files: ^packages/ruby/.*\.rb$
        exclude: ^packages/ruby/ext/
      - id: dotnet-format
        files: ^packages/csharp/.*\.cs$
      - id: php-cs-fixer
        files: ^packages/php/.*\.php$
        exclude: ^packages/php/stubs/
      - id: mix-format
        files: ^packages/elixir/
      - id: swift-format
        # alef emits Package.swift with a single-line URL; swift-format wraps it
        # to the next line, breaking the CI `git diff --exit-code` check.
        files: ^packages/swift/.*\.swift$
        exclude: (^|/)Package\.swift$
      - id: dart-format
        files: ^packages/dart/.*\.dart$
      - id: zig-fmt
        # alef emits build.zig `b.option(...)` args multi-line for column
        # alignment; zig-fmt collapses them, breaking the CI
        # `git diff --exit-code` check after alef re-runs sync-versions.
        files: ^packages/zig/.*\.zig$
        exclude: ^packages/zig/build\.zig$
