default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^docs/snippets/|vendor/|node_modules/|target/|invalid*|dist/|artifacts/|test_documents/|test_apps/|scripts/ci/|^e2e/|\.cache/|\.venv/

repos:
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
    rev: v2.1.6
    hooks:
      # Alef verification
      - id: alef-verify

      # Cargo / Rust
      - id: cargo-clippy
        args:
          [
            "--fix",
            "--allow-dirty",
            "--allow-staged",
            "--workspace",
            "--exclude=spikard-ffi",
            "--exclude=spikard-py",
            "--exclude=spikard-node",
            "--exclude=spikard-php",
            "--exclude=spikard-wasm",
            "--all-features",
            "--all-targets",
            "--",
            "-D",
            "warnings",
          ]
      - id: cargo-sort
        exclude: ^(crates/spikard-(wasm|node|py|php|ffi)|packages/(dart|swift)/rust|packages/ruby/ext/spikard_rb/native)/Cargo\.toml$
      - id: cargo-machete
        args:
          [
            "crates/spikard",
            "crates/spikard-core",
            "crates/spikard-http",
            "crates/spikard-graphql",
            "crates/spikard-codegen",
            "crates/spikard-cli",
          ]
        exclude: ^e2e/
      - id: cargo-deny
        args: ["check"]
      - id: rustdoc-lint
        args: ["--package", "spikard"]
        pass_filenames: false
        files: ^crates/spikard/.*\.rs$
        exclude: ^crates/spikard/tests/
      - id: rust-max-lines
        args: ["--max=1000"]
        # Remediation backlog: existing files over the 1,000-LOC ceiling. New
        # files are subject to the cap. Shrink this list when files are split.
        exclude: ^(crates/spikard-cli/src/codegen/graphql/generators/ruby\.rs|crates/spikard-cli/src/codegen/graphql/spec_parser\.rs|crates/spikard-cli/src/codegen/php\.rs|crates/spikard-cli/src/codegen/protobuf/generators/python\.rs|crates/spikard-cli/src/codegen/python\.rs|crates/spikard-cli/src/codegen/quality/validator\.rs|crates/spikard-cli/src/codegen/ruby\.rs|crates/spikard-cli/src/mcp/server\.rs|crates/spikard-core/src/lifecycle\.rs|crates/spikard-core/src/parameters\.rs|crates/spikard-core/src/request_data\.rs|crates/spikard-ffi/src/lib\.rs|crates/spikard-http/src/background\.rs|crates/spikard-http/src/cors\.rs|crates/spikard-http/src/di_handler\.rs|crates/spikard-http/src/handler_trait\.rs|crates/spikard-http/src/jsonrpc/protocol\.rs|crates/spikard-http/src/jsonrpc/router\.rs|crates/spikard-http/src/lifecycle\.rs|crates/spikard-http/src/openapi/schema_conversion\.rs|crates/spikard-http/src/server/grpc_routing\.rs|crates/spikard-http/src/server/handler\.rs|crates/spikard-http/src/server/mod\.rs|crates/spikard-http/src/sse\.rs|crates/spikard-http/src/websocket\.rs|crates/spikard-node/src/lib\.rs|crates/spikard-php/src/lib\.rs|crates/spikard-py/src/lib\.rs|crates/spikard-wasm/src/lib\.rs|packages/dart/rust/src/frb_generated\.rs|packages/dart/rust/src/lib\.rs|packages/elixir/lib/lib\.rs|packages/ruby/ext/spikard_rb/src/lib\.rs|packages/swift/rust/src/lib\.rs)$

      # Linters and checks
      - id: ai-rulez-generate

      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: uv.lock
      - id: detect-private-key
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: typos
        args: ["--force-exclude"]
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml

      - id: actionlint
      - id: gh-actions-updater

      - id: shellcheck
        args: ["-x"]

      - id: markdownlint-rumdl-strict
        exclude: ^docs/reference/
      - id: textlint
        files: ^docs/.*\.md$
        exclude: ^docs/(reference/|snippets/)
        args: ["--fix", "--config", ".textlintrc.json"]

      - id: ruff
      - id: mypy
        files: ^(packages/python|tools|scripts)/.*\.py$
        exclude: "e2e/|tests/|scripts/publish/"
      - id: pydocstyle
        files: ^packages/python/spikard/.*\.py$

      # JS/TS — preserve any commented-out exclusions verbatim (e.g. tsdoc-lint)
      - id: oxlint
      - id: tsc-typecheck
      # tsdoc-lint disabled: the generated TypeScript/WASM wrappers use oxlint
      # and oxfmt, and the shared hook expects an eslint toolchain that this
      # package intentionally does not carry.
      # - id: tsdoc-lint
      #   files: ^packages/(typescript|wasm)/src/.*\.ts$
      #   exclude: \.d\.ts$

      # Go — preserve any commented-out exclusions verbatim (e.g. godoc-lint)
      - id: golangci-lint
        exclude: ^(e2e/|test_apps/|tools/|packages/go/)
      - id: govulncheck
        exclude: ^(e2e/|test_apps/|tools/|packages/go/)
      # godoc-lint disabled: shared hook v1.1.2 invokes the removed
      # golangci-lint v1 --disable-all flag against golangci-lint v2.
      # - id: godoc-lint
      #   files: ^packages/go/.*\.go$
      #   exclude: ^(e2e/|test_apps/)
      #   env:
      #     KREUZBERG_GO_MOD_DIRS: "packages/go"

      - id: checkstyle
      - id: pmd
        exclude: ^test_native_load\.java$
      - id: cpd
        args: ["--minimum-tokens=120"]
        exclude: ^packages/java/src/main/java/dev/spikard/
      - id: java-verify
        files: ^packages/java/
      - id: javadoc-lint
        files: ^packages/java/src/main/java/dev/spikard/.*\.java$

      # ktfmt disabled: ktfmt 0.62 formats Gradle Kotlin scripts with
      # indentation that ktlint 1.8 rejects. Use ktlint as the single Kotlin
      # formatter/linter for this package.
      # - id: ktfmt
      #   files: ^packages/kotlin/.*\.kts?$
      - id: detekt
        args: ["--build-upon-default-config"]
        files: ^packages/kotlin/.*\.kts?$
      - id: ktlint
        files: ^packages/kotlin/.*\.kts?$
      - id: kotlin-dokka

      # Ruby — preserve any commented-out exclusions verbatim (e.g. yard-coverage)
      - id: rubocop-lint
        files: ^packages/ruby/.*\.(rb|rbs)$
      - id: steep
        files: ^packages/ruby/.*\.(rb|rbs)$
      # yard-coverage disabled: the root Ruby test path does not provide a
      # YARD toolchain for the generated native wrapper.
      # - id: yard-coverage
      #   files: ^packages/ruby/lib/.*\.rb$
      #   exclude: ^packages/ruby/lib/spikard/native\.rb$

      - id: dotnet-format-check
        files: ^packages/csharp/.*\.cs$
      - id: cs-xmldoc-lint
        files: ^packages/csharp/src/Spikard/.*\.cs$

      - id: phpstan
        files: ^packages/php/(src|tests)/.*\.php$
        args: ["analyse", "--no-progress", "--configuration", "packages/php/phpstan.neon"]
      - id: phpdoc-lint
        files: ^packages/php/src/.*\.php$

      - id: mix-credo
        files: ^packages/elixir/
      - id: ex-doc-coverage
        files: ^(packages/elixir/.*\.exs?|crates/spikard-elixir/src/.*\.ex)$
        args: ["packages/elixir/mix.exs"]
        env:
          MIX_ENV: "dev"
          SPIKARD_BUILD: "1"

      - id: swiftlint
        files: ^packages/swift/.*\.swift$
      - id: swift-doc-coverage
        files: ^packages/swift/Sources/Spikard/.*\.swift$
      - id: dart-analyze
        files: ^packages/dart/.*\.dart$
      - id: dart-doc-lint
        files: ^packages/dart/lib/.*\.dart$
        exclude: ^packages/dart/lib/src/spikard_bridge_generated/

      - id: zig-build-check
        files: ^packages/zig/.*\.zig$
      - id: zig-doc-lint
        files: ^packages/zig/src/.*\.zig$

      - id: alef-docs-fresh
      - id: alef-snippets-validate

      # Formatters
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: shfmt
        args: ["-w", "-i", "2"]
      - id: rumdl-fmt
        exclude: ^templates/
      - id: cargo-fmt
        args: ["--all"]
      - id: pyproject-fmt
      - id: ruff-format
      - id: oxfmt
      - id: go-fmt
        exclude: ^(e2e/|test_apps/|tools/|packages/go/)
      - id: palantir-java-format
      - id: rubocop
        files: ^packages/ruby/.*\.rb$
      - id: dotnet-format
        files: ^packages/csharp/.*\.cs$
      - id: php-cs-fixer
        files: ^packages/php/.*\.php$
        exclude: ^packages/php/stubs/
      - id: mix-format
        files: ^packages/elixir/
      - id: swift-format
        files: ^packages/swift/.*\.swift$
      - id: dart-format
        files: ^packages/dart/.*\.dart$
      - id: zig-fmt
        files: ^packages/zig/.*\.zig$
