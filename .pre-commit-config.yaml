default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^docs/snippets/|vendor/|node_modules/|target/|invalid*|dist/|artifacts/|test_documents/|test_apps/|scripts/ci/|packages/.*/tools/vendor-

repos:
  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # AI-Rulez: validate config and auto-generate AI assistant configuration files
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v3.14.2
    hooks:
      - id: ai-rulez-validate
      - id: ai-rulez-generate

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: uv.lock
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.21.1"
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/DevinR528/cargo-sort
    rev: "v2.1.3"
    hooks:
      - id: cargo-sort
        args: [-w]

  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
        exclude: "pyproject.toml|Cargo.toml"

  # Python: ruff (linting + formatting) + mypy (type checking)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        exclude: "e2e/|scripts/|examples/|tests/test_apps/|benchmarks/|tools/"

  # Rust: formatting, linting, and license checking
  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 0.5.0
    hooks:
      - id: cargo-fmt
        args: ["--all"]
        types: [rust]
      # Clippy: split by compilation unit so only changed code recompiles
      - id: cargo-clippy
        args: [
          "--fix",
          "--allow-dirty",
          "--allow-staged",
          "--workspace",
          "--exclude=spikard-php",
          "--exclude=spikard-py",
          "--exclude=spikard-node",
          "--exclude=spikard-rb",
          "--exclude=spikard-rb-macros",
          "--exclude=spikard-elixir",
          "--exclude=benchmark-harness",
          "--all-features",
          "--all-targets",
          "--",
          "-D",
          "warnings",
        ]

  - repo: https://github.com/bnjbvr/cargo-machete
    rev: v0.9.2
    hooks:
      - id: cargo-machete

  - repo: https://github.com/EmbarkStudios/cargo-deny
    rev: 0.19.4
    hooks:
      - id: cargo-deny
        args: ["check"]

  # JavaScript/TypeScript/JSON/CSS: biome (formatting + linting with autofixes)
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.12
    hooks:
      - id: biome-format
        exclude: ^tools/benchmark-harness/fixtures/
      - id: biome-lint

  # Shell scripts: formatting and linting
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: ["-w", "-i", "2"]

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: ['-x']
        exclude: ^test_apps/docker/tests/

  # Markdown: linting
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: "v0.1.78"
    hooks:
      - id: rumdl-fmt
        exclude: '^(test_apps/|tools/benchmark-harness/vendored/|docs/index\.md|docs/getting-started/installation\.md)'

  # Spelling: fast Rust-based spell checker
  - repo: https://github.com/crate-ci/typos
    rev: v1.45.1
    hooks:
      - id: typos
        args: [--force-exclude]

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Local hooks for unsupported languages (Ruby, Java, C#, PHP, Elixir, R) and custom configurations
  - repo: local
    hooks:
      # Ruby
      - id: ruby-format
        name: Ruby formatting (rubocop)
        entry: task ruby:format
        language: system
        files: \.rb$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      - id: ruby-lint
        name: Ruby linting (rubocop + steep)
        entry: task ruby:lint
        language: system
        files: \.(rb|rbs)$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      # PHP
      - id: php-format
        name: PHP formatting (php-cs-fixer)
        entry: task php:format
        language: system
        files: \.php$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      - id: php-lint
        name: PHP linting (phpstan + php-cs-fixer)
        entry: task php:lint
        language: system
        files: \.php$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      # Elixir
      - id: mix-credo
        name: mix credo
        entry: bash -c 'cd packages/elixir && MIX_ENV=dev mix credo --strict'
        language: system
        files: ^packages/elixir/
        pass_filenames: false

      - id: mix-format
        name: mix format
        entry: bash -c 'cd packages/elixir && MIX_ENV=dev mix format --check-formatted'
        language: system
        files: ^packages/elixir/
        pass_filenames: false

      # Alef
      - id: alef-verify
        name: Verify alef-generated bindings are up to date
        entry: alef verify
        language: system
        files: (alef\.toml|crates/spikard.*/src/.*\.rs)
        pass_filenames: false
