default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^docs/snippets/|vendor/|node_modules/|target/|invalid*|dist/|artifacts/|test_documents/|test_apps/|scripts/ci/|^e2e/|\.cache/|\.venv/

repos:
  # AI-Rulez: auto-generate AI assistant configuration files
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v4.1.6
    hooks:
      - id: ai-rulez-generate

  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: uv.lock
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.21.2"
    hooks:
      - id: pyproject-fmt

  # Python
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Shared kreuzberg-dev polyglot hooks
  - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
    rev: v1.0.10
    hooks:
      - id: cargo-sort
        exclude: ^(crates/spikard-(wasm|node|py|php|ffi)|packages/(dart|swift)/rust|packages/ruby/ext/spikard_rb/native)/Cargo\.toml$
      - id: cargo-fmt
        args: ["--all"]
      - id: cargo-check
        args:
          [
            "--workspace",
            "--exclude=spikard-ffi",
            "--exclude=spikard-py",
            "--exclude=spikard-node",
            "--exclude=spikard-php",
            "--exclude=spikard-wasm",
            "--all-features",
            "--all-targets",
          ]
      - id: cargo-clippy
        args:
          [
            "--fix",
            "--allow-dirty",
            "--allow-staged",
            "--workspace",
            "--exclude=spikard-ffi",
            "--exclude=spikard-py",
            "--exclude=spikard-node",
            "--exclude=spikard-php",
            "--exclude=spikard-wasm",
            "--all-features",
            "--all-targets",
            "--",
            "-D",
            "warnings",
          ]
      - id: cargo-machete
        args: ["crates/", "packages/", "tools/"]
        exclude: ^e2e/
      - id: cargo-deny
        args: ["check"]
      - id: shfmt
        args: ["-w", "-i", "2"]
      - id: shellcheck
        args: ["-x"]
      - id: mypy
        files: ^(packages/python|tools|scripts)/.*\.py$
        exclude: "e2e/|tests/|scripts/publish/"
      - id: go-fmt
        exclude: ^(e2e/|test_apps/|tools/)
      - id: golangci-lint
        exclude: ^(e2e/|test_apps/|tools/)
      - id: govulncheck
        exclude: ^(e2e/|test_apps/|tools/)
      - id: rubocop
        files: ^packages/ruby/.*\.rb$
      - id: rubocop-lint
        files: ^packages/ruby/.*\.(rb|rbs)$
      - id: steep
        files: ^packages/ruby/.*\.(rb|rbs)$
      - id: dotnet-format
        files: ^packages/csharp/.*\.cs$
      - id: dotnet-format-check
        files: ^packages/csharp/.*\.cs$
      - id: php-cs-fixer
        files: ^packages/php/.*\.php$
      - id: phpstan
        files: ^packages/php/.*\.php$
      - id: mix-format
        files: ^packages/elixir/
      - id: mix-credo
        files: ^packages/elixir/
      - id: ktfmt
        args: ["--kotlinlang-style"]
        files: ^packages/kotlin/.*\.kts?$
      - id: detekt
        args: ["--build-upon-default-config"]
        files: ^packages/kotlin/.*\.kts?$
      - id: swift-format
        files: ^packages/swift/.*\.swift$
      - id: swiftlint
        files: ^packages/swift/.*\.swift$
      - id: dart-format
        files: ^packages/dart/.*\.dart$
      - id: dart-analyze
        files: ^packages/dart/.*\.dart$
      - id: zig-fmt
        files: ^packages/zig/.*\.zig$
      - id: zig-build-check
        files: ^packages/zig/.*\.zig$
      - id: oxlint
      - id: oxfmt
      - id: rumdl-fmt
        exclude: ^templates/
      - id: cpd

  # Alef: verify generated bindings are up to date and sync package versions
  - repo: https://github.com/kreuzberg-dev/alef
    rev: v0.16.6
    hooks:
      - id: alef-verify
      - id: alef-sync-versions

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Spelling: fast Rust-based spell checker (last — runs after all formatters)
  - repo: https://github.com/crate-ci/typos
    rev: v1.46.1
    hooks:
      - id: typos
        args: [--force-exclude]
