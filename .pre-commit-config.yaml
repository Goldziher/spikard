default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: vendor/|node_modules/|target/|dist/|artifacts/

repos:
  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: uv.lock
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.21.0
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
        exclude: "pyproject.toml"

  # Python: ruff (linting + formatting) + mypy (type checking)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        exclude: "e2e/|scripts/|examples/|tests/test_apps/|benchmarks/|tools/"

  # Rust: formatting, linting, and license checking
  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 0.5.0
    hooks:
      - id: cargo-fmt
        args: ["--all"]
      - id: cargo-clippy
        args: [
          "--fix",
          "--allow-dirty",
          "--allow-staged",
          "--workspace",
          "--exclude=spikard-php",
          "--exclude=spikard-py",
          "--exclude=spikard-node",
          "--exclude=spikard-rb",
          "--exclude=spikard-rb-macros",
          "--exclude=spikard-elixir",
          "--exclude=benchmark-harness",
          "--all-features",
          "--all-targets",
          "--",
          "-D",
          "warnings",
        ]

  - repo: https://github.com/bnjbvr/cargo-machete
    rev: v0.9.1
    hooks:
      - id: cargo-machete

  - repo: https://github.com/EmbarkStudios/cargo-deny
    rev: 0.19.0
    hooks:
      - id: cargo-deny
        args: ["check"]

  # JavaScript/TypeScript/JSON/CSS: biome (formatting + linting with autofixes)
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.10
    hooks:
      - id: biome-format
        exclude: ^tools/benchmark-harness/fixtures/
      - id: biome-lint

  # Shell scripts: formatting and linting
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.0-1
    hooks:
      - id: shfmt
        args: ["-w", "-i", "2"]

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Local hooks for languages not covered by prek
  - repo: local
    hooks:
      # Ruby
      - id: ruby-format
        name: Ruby formatting (rubocop)
        entry: task ruby:format
        language: system
        files: ^packages/ruby/.*\.(rb|rbs)$|^packages/ruby/spikard\.gemspec$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      - id: ruby-lint
        name: Ruby linting (rubocop + steep)
        entry: task ruby:lint
        language: system
        files: ^packages/ruby/.*\.(rb|rbs)$|^packages/ruby/spikard\.gemspec$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      # Shell scripts
      - id: shellcheck
        name: Shell linting (shellcheck)
        entry: shellcheck
        language: system
        types: [shell]
        stages: [commit]

      # PHP
      - id: php-format
        name: PHP formatting (php-cs-fixer)
        entry: task php:format
        language: system
        files: ^packages/php/.*\.php$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      - id: php-lint
        name: PHP linting (phpstan + php-cs-fixer)
        entry: task php:lint
        language: system
        files: ^packages/php/.*\.php$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      # Elixir
      - id: elixir-format
        name: Elixir formatting (mix format)
        entry: task elixir:format
        language: system
        files: ^packages/elixir/.*\.(ex|exs|heex)$|^packages/elixir/mix\.exs$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      - id: elixir-lint
        name: Elixir linting (credo)
        entry: task elixir:lint
        language: system
        files: ^packages/elixir/.*\.(ex|exs|heex)$|^packages/elixir/mix\.exs$
        pass_filenames: false
        require_serial: true
        stages: [commit]

      # TypeScript - type checking
      - id: typescript-typecheck
        name: Check TypeScript types
        entry: pnpm --filter @spikard/node run typecheck
        language: system
        files: ^(packages/node|crates/spikard-node|e2e/node|examples/node|examples/node-simple|examples/graphql-node|tests/test_apps/node)/.*\.(ts|tsx)$
        pass_filenames: false
        require_serial: true
        stages: [commit]
