<feComposite in2="soft" operator="in" result="glow"/>
<feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="taglineGlow" x="-20%" y="-80%" width="140%" height="220%">
<feGaussianBlur in="SourceAlpha" stdDeviation="2" result="soft"/>
<feFlood flood-color="#00e7ff" flood-opacity="0.72"/>
<feComposite in2="soft" operator="in" result="glow"/>
<feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<clipPath id="clip"><rect width="1200" height="340" rx="18"/></clipPath>
