languages = ["python", "node", "ruby", "php", "elixir"]

[crate]
name = "spikard"
core_import = "spikard"
sources = ["crates/spikard/src/lib.rs"]
version_from = "Cargo.toml"
workspace_root = "."
skip_core_import = true

# Spikard's binding types are defined in custom modules, not extracted.
# Use sentinel to prevent generating extracted types.
[include]
types = ["__none__"]
functions = ["__none__"]

[python]
module_name = "_spikard"

[python.stubs]
output = "packages/python/spikard/"

[node]
package_name = "@spikard/node"

[ruby]
gem_name = "spikard"

[ruby.stubs]
output = "packages/ruby/sig/"

[php]
extension_name = "spikard"

[elixir]
app_name = "spikard"

[custom_modules]
python = ["server", "handler", "handler_request", "request", "response", "response_interpreter", "lifecycle", "di", "websocket", "sse", "testing", "background", "conversion", "grpc", "graphql"]
node = ["server", "background", "conversion_tests", "di", "graphql", "grpc", "handler", "handler_input", "handler_output", "lifecycle", "response", "test_client", "test_sse", "test_websocket", "testing", "websocket"]
ruby = ["app", "background", "config", "conversion", "di", "grpc", "gvl", "handler", "integration", "lifecycle", "metadata", "request", "runtime", "server", "sse", "testing", "websocket"]
elixir = ["atoms", "conversion", "error", "grpc", "handler", "lifecycle", "server", "testing", "websocket"]

[custom_registrations.python]
classes = [
    "request::PyRequest",
    "handler_request::PyHandlerRequest",
    "response::Response",
    "response::StreamingResponse",
    "testing::client::TestClient",
    "testing::client::TestResponse",
    "testing::websocket::WebSocketTestConnection",
    "testing::websocket::WebSocketMessage",
    "testing::sse::SseStream",
    "testing::sse::SseEvent",
]
functions = [
    "server::create_test_client",
    "server::run_server",
    "server::run_server_async",
    "server::process",
    "background::background_run",
]
init_calls = [
    "grpc::init_module(m)?;",
]

# Generate handler bridge — implements LanguageHandler trait for each language
[[adapters]]
name = "handler"
pattern = "callback_bridge"
core_path = "spikard_bindings_shared::handler_base::LanguageHandler"
trait_name = "LanguageHandler"
trait_method = "invoke_handler"
params = [{ name = "input", type = "Self::Input" }]
returns = "Self::Output"
error_type = "HandlerError"
detect_async = true

[scaffold]
description = "Polyglot web framework powered by Rust"
license = "MIT"
repository = "https://github.com/kreuzberg-dev/spikard"
authors = ["Kreuzberg Team"]
keywords = ["web", "framework", "http", "api"]
