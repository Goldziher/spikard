version: "3"
internal: true

includes:
  platforms: ../config/platforms.yml

vars:
  ALEF: "cargo run -p spikard-alef --release --"

tasks:
  sync:
    desc: "Synchronize version across all package manifests and regenerate everything"
    cmds:
      - "{{.ALEF}} sync-versions"
      - "{{.ALEF}} readme"
      - "{{.ALEF}} docs"
      - "{{.ALEF}} generate --clean"
      - "cargo build -p spikard-ffi"
      - "{{.ALEF}} scaffold"
      - "{{.ALEF}} stubs"
      - "{{.ALEF}} e2e generate"
      - "{{.ALEF}} test-apps generate"
      - cmd: |
          set -e
          version=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          for manifest in packages/dart/rust packages/ruby/ext/spikard_rb/native test_apps/rust; do
            cargo update --manifest-path "$manifest/Cargo.toml" -p spikard --precise "$version" >/dev/null 2>&1 || true
          done

  check:
    desc: "Check if versions are synchronized (dry-run)"
    cmds:
      - cmd: grep -m 1 'version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/'
        silent: false

  bump:major:
    desc: "Bump major version (X.0.0) and sync"
    cmds:
      - "{{.ALEF}} sync-versions --bump major"
      - task: sync

  bump:minor:
    desc: "Bump minor version (0.X.0) and sync"
    cmds:
      - "{{.ALEF}} sync-versions --bump minor"
      - task: sync

  bump:patch:
    desc: "Bump patch version (0.0.X) and sync"
    cmds:
      - "{{.ALEF}} sync-versions --bump patch"
      - task: sync

  set:
    desc: "Set explicit version and sync (usage: task version:set -- 0.7.0-rc.1)"
    requires:
      vars: [CLI_ARGS]
    cmds:
      - "{{.ALEF}} sync-versions --set {{.CLI_ARGS}}"
      - task: sync

  show:
    desc: "Show current version from Cargo.toml"
    cmds:
      - cmd: grep -m 1 'version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/'
        silent: false
