version: "3"
internal: true

includes:
  platforms: ../config/platforms.yml

# Use the project's extension-aware binary (spikard-alef registers the HTTP +
# e2e-http extensions). The stock `alef` binary lacks Extension::emit_e2e and
# would delete the server-pattern e2e harness files on `generate`/`e2e generate`.
vars:
  ALEF: "cargo run -p spikard-alef --release --"

tasks:
  sync:
    desc: "Synchronize version across all package manifests and regenerate everything"
    cmds:
      - "{{.ALEF}} sync-versions"
      - "{{.ALEF}} readme"
      - "{{.ALEF}} docs"
      - "{{.ALEF}} generate --clean"
      # scaffold re-emits package manifests (e.g. the napi platform
      # optionalDependencies) at the new version; without it a version bump
      # leaves crates/spikard-node/package.json pinned to the prior version.
      - "{{.ALEF}} scaffold"
      - "{{.ALEF}} stubs"
      - "{{.ALEF}} e2e generate"

  check:
    desc: "Check if versions are synchronized (dry-run)"
    cmds:
      - cmd: grep -m 1 'version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/'
        silent: false

  bump:major:
    desc: "Bump major version (X.0.0) and sync"
    cmds:
      - "{{.ALEF}} sync-versions --bump major"
      - task: sync

  bump:minor:
    desc: "Bump minor version (0.X.0) and sync"
    cmds:
      - "{{.ALEF}} sync-versions --bump minor"
      - task: sync

  bump:patch:
    desc: "Bump patch version (0.0.X) and sync"
    cmds:
      - "{{.ALEF}} sync-versions --bump patch"
      - task: sync

  set:
    desc: "Set explicit version and sync (usage: task version:set -- 0.7.0-rc.1)"
    requires:
      vars: [CLI_ARGS]
    cmds:
      - "{{.ALEF}} sync-versions --set {{.CLI_ARGS}}"
      - task: sync

  show:
    desc: "Show current version from Cargo.toml"
    cmds:
      - cmd: grep -m 1 'version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/'
        silent: false
